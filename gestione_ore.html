<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nexus — Gestione Ore</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#14532d">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
:root{
  --p:#14532d;--pm:#166534;--pl:#22c55e;--acc:#e8a020;
  --sfondo:#f0faf4;--bianco:#fff;--testo:#14532d;--grigio:#6b8f72;
  --bordo:#bbf7d0;--verde:#15803d;--rosso:#b83228;--arancio:#c97010;
  --blu:#1d4ed8;--viola:#7c3aed;
  --mono:'Courier New',monospace;
  --shadow:0 1px 4px rgba(0,0,0,0.08);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--sfondo);color:var(--testo);min-height:100vh;font-size:14px;}

/* LOGIN */
#login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;background:linear-gradient(135deg,#14532d 0%,#166534 50%,#15803d 100%);}
.lbox{background:white;border-radius:16px;padding:40px 36px;width:100%;max-width:380px;box-shadow:0 20px 60px rgba(0,0,0,0.3);}
.lbox .logo{display:flex;align-items:center;gap:10px;margin-bottom:24px;}
.lbox .logo-icon{width:44px;height:44px;background:var(--p);border-radius:10px;display:flex;align-items:center;justify-content:center;}
.lbox .logo-icon svg{width:24px;height:24px;fill:none;stroke:white;stroke-width:2;}
.lbox h1{font-size:1.3rem;font-weight:800;color:var(--p);}
.lbox .sub{font-size:0.78rem;color:var(--grigio);margin-top:2px;}
.lbox .divider{height:1px;background:var(--bordo);margin:20px 0;}
.lbox .fg{display:flex;flex-direction:column;gap:5px;margin-bottom:14px;}
.lbox label{font-size:0.7rem;font-weight:700;color:var(--grigio);text-transform:uppercase;letter-spacing:0.06em;}
.lbox input{border:1.5px solid var(--bordo);border-radius:8px;padding:11px 14px;font-size:0.92rem;background:var(--sfondo);transition:border-color 0.15s;}
.lbox input:focus{outline:none;border-color:var(--pl);background:white;}
.lbox .lbtn{width:100%;padding:12px;background:var(--p);color:white;border:none;border-radius:8px;font-size:0.92rem;font-weight:700;cursor:pointer;margin-top:6px;transition:background 0.15s;}
.lbox .lbtn:hover{background:var(--pm);}
#lerr{color:var(--rosso);font-size:0.8rem;font-weight:600;margin-top:10px;min-height:18px;}

/* APP */
#app{display:none;}
header{background:var(--p);color:white;height:56px;display:flex;align-items:center;justify-content:space-between;padding:0 20px;position:sticky;top:0;z-index:200;box-shadow:0 2px 12px rgba(0,0,0,0.3);}
.hlogo{display:flex;align-items:center;gap:10px;}
.hlogo-icon{width:32px;height:32px;background:rgba(255,255,255,0.15);border-radius:7px;display:flex;align-items:center;justify-content:center;}
.hlogo-icon svg{width:18px;height:18px;fill:none;stroke:white;stroke-width:2.2;}
header h1{font-size:0.95rem;font-weight:800;letter-spacing:0.05em;text-transform:uppercase;}
.hright{display:flex;align-items:center;gap:10px;}
.rbadge{font-size:0.7rem;font-weight:700;padding:3px 10px;border-radius:20px;background:var(--acc);color:var(--p);}
.logoutbtn{background:rgba(255,255,255,0.12);border:1px solid rgba(255,255,255,0.2);color:white;padding:5px 12px;border-radius:6px;font-size:0.76rem;cursor:pointer;font-weight:600;}
.logoutbtn:hover{background:rgba(255,255,255,0.22);}

nav{background:var(--pm);display:flex;padding:0 16px;overflow-x:auto;gap:0;}
nav::-webkit-scrollbar{height:2px;}
nav button{background:none;border:none;color:rgba(255,255,255,0.5);padding:12px 16px;font-size:0.78rem;font-weight:700;cursor:pointer;border-bottom:3px solid transparent;white-space:nowrap;transition:color 0.12s;display:flex;align-items:center;gap:6px;}
nav button svg{width:15px;height:15px;fill:none;stroke:currentColor;stroke-width:2;}
nav button:hover{color:rgba(255,255,255,0.85);}
nav button.on{color:var(--acc);border-bottom-color:var(--acc);}

main{padding:20px 16px;max-width:1100px;margin:0 auto;}
.tab{display:none;}.tab.on{display:block;}

.card{background:var(--bianco);border:1px solid var(--bordo);border-radius:10px;padding:18px;margin-bottom:16px;box-shadow:var(--shadow);}
.ct{font-size:0.68rem;font-weight:800;color:var(--grigio);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:14px;padding-bottom:8px;border-bottom:1px solid var(--sfondo);display:flex;align-items:center;gap:6px;}
.ct svg{width:14px;height:14px;fill:none;stroke:var(--grigio);stroke-width:2;}

.fg{display:flex;flex-direction:column;gap:4px;}
.fg label{font-size:0.67rem;font-weight:700;color:var(--grigio);text-transform:uppercase;letter-spacing:0.05em;}
.fg input,.fg select{border:1.5px solid var(--bordo);border-radius:6px;padding:8px 10px;font-size:0.88rem;color:var(--testo);background:var(--sfondo);transition:all 0.12s;}
.fg input:focus,.fg select:focus{outline:none;border-color:var(--pl);background:white;box-shadow:0 0 0 3px rgba(34,197,94,0.1);}
.fg input[readonly]{background:#e8f5ef;cursor:default;color:var(--grigio);}
.g2{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;}
.g5{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;}
.ga{grid-column:1/-1;}

.btn{padding:8px 16px;border:none;border-radius:6px;font-size:0.81rem;font-weight:700;cursor:pointer;transition:all 0.12s;display:inline-flex;align-items:center;gap:5px;}
.btn svg{width:14px;height:14px;fill:none;stroke:currentColor;stroke-width:2.2;}
.btn:hover{filter:brightness(0.92);}
.bp{background:var(--p);color:white;}
.bv{background:var(--verde);color:white;}
.br{background:var(--rosso);color:white;padding:5px 10px;font-size:0.73rem;}
.ba{background:var(--acc);color:var(--p);}
.bo{background:transparent;border:1.5px solid var(--bordo);color:var(--testo);}
.bo:hover{border-color:var(--pl);color:var(--verde);filter:none;}
.bsm{padding:4px 10px;font-size:0.73rem;}
.brow{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap;align-items:center;}

.tw{overflow-x:auto;}
table{width:100%;border-collapse:collapse;font-size:0.81rem;}
th{background:var(--sfondo);color:var(--grigio);font-size:0.64rem;font-weight:800;text-transform:uppercase;letter-spacing:0.07em;padding:8px 10px;text-align:left;border-bottom:2px solid var(--bordo);white-space:nowrap;}
td{padding:8px 10px;border-bottom:1px solid var(--bordo);vertical-align:middle;}
tr:last-child td{border-bottom:none;}
tr:hover td{background:#f5fbf7;}

.bid{font-family:var(--mono);font-size:0.72rem;background:var(--p);color:white;padding:2px 7px;border-radius:4px;font-weight:700;}
.bmov{font-family:var(--mono);font-size:0.72rem;background:var(--pm);color:white;padding:2px 7px;border-radius:4px;}
.pill{display:inline-block;padding:2px 9px;border-radius:20px;font-size:0.69rem;font-weight:700;}
.pg{background:#d3f0e3;color:var(--verde);}
.py{background:#fdefd3;color:var(--arancio);}
.pb{background:#dbeafe;color:var(--blu);}
.pr{background:#fde3e1;color:var(--rosso);}
.pv{background:#ede9fe;color:var(--viola);}
.po{background:#fff0d3;color:var(--arancio);}

.alert{padding:9px 13px;border-radius:6px;font-size:0.82rem;font-weight:600;margin-bottom:12px;}
.aok{background:#d3f0e3;color:var(--verde);border:1px solid #a5d9be;}
.aerr{background:#fde3e1;color:var(--rosso);border:1px solid #f4b0ab;}
.awarn{background:#fdefd3;color:var(--arancio);border:1px solid #f5d494;}

#toast{position:fixed;bottom:20px;right:20px;z-index:999;padding:11px 18px;border-radius:8px;font-size:0.84rem;font-weight:600;box-shadow:0 4px 20px rgba(0,0,0,0.25);opacity:0;transform:translateY(8px);transition:opacity 0.2s,transform 0.2s;pointer-events:none;max-width:300px;}
#toast.show{opacity:1;transform:translateY(0);}

.ore-bar{display:flex;align-items:center;gap:12px;padding:12px 14px;border-radius:8px;margin:10px 0;background:var(--sfondo);border:1px solid var(--bordo);}
.ore-bar .num{font-size:1.3rem;font-weight:800;font-family:var(--mono);}
.num.ok{color:var(--verde);}.num.warn{color:var(--arancio);}.num.err{color:var(--rosso);}

.qrow{display:grid;grid-template-columns:30px 2fr 2fr 90px 1fr 70px;gap:8px;align-items:end;padding:8px 10px;border-radius:6px;background:var(--sfondo);border:1px solid var(--bordo);margin-bottom:6px;}
.prow{display:grid;grid-template-columns:auto 2fr 2fr 80px;gap:8px;align-items:center;padding:7px 10px;border-radius:5px;background:#fff9ec;border:1px solid #f5d494;margin-bottom:5px;font-size:0.82rem;}

/* STATS */
.stats{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:10px;margin-bottom:16px;}
.stat{background:var(--bianco);border:1px solid var(--bordo);border-radius:8px;padding:14px;text-align:center;}
.stat .n{font-size:1.5rem;font-weight:900;color:var(--p);font-variant-numeric:tabular-nums;}
.stat .l{font-size:0.65rem;color:var(--grigio);text-transform:uppercase;letter-spacing:0.05em;margin-top:3px;}

/* REPORT CARDS */
.rep-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:14px;margin-bottom:16px;}
.rep-card{background:var(--bianco);border:1px solid var(--bordo);border-radius:10px;padding:16px;box-shadow:var(--shadow);}
.rep-card .rc-title{font-size:0.68rem;font-weight:800;color:var(--grigio);text-transform:uppercase;letter-spacing:0.07em;margin-bottom:12px;}
.rep-card .rc-val{font-size:2rem;font-weight:900;font-variant-numeric:tabular-nums;color:var(--p);}
.rep-card .rc-sub{font-size:0.78rem;color:var(--grigio);margin-top:4px;}
.rc-green{border-top:3px solid var(--verde);}
.rc-orange{border-top:3px solid var(--arancio);}
.rc-red{border-top:3px solid var(--rosso);}
.rc-blue{border-top:3px solid var(--blu);}
.rc-viola{border-top:3px solid var(--viola);}

.empty{text-align:center;color:var(--grigio);padding:28px;font-size:0.84rem;}
.loading{text-align:center;color:var(--grigio);padding:20px;font-size:0.82rem;}

/* UPLOAD AREA */
.upload-area{border:2px dashed var(--bordo);border-radius:8px;padding:24px;text-align:center;cursor:pointer;transition:all 0.15s;background:var(--sfondo);}
.upload-area:hover{border-color:var(--pl);background:#f0fdf4;}
.upload-area svg{width:32px;height:32px;stroke:var(--grigio);fill:none;stroke-width:1.5;margin-bottom:8px;}
.upload-area p{font-size:0.84rem;color:var(--grigio);}
.upload-area input{display:none;}

@media(max-width:640px){
  .g4,.g5,.g3{grid-template-columns:1fr 1fr;}
  .ga{grid-column:1/-1;}
  .qrow{grid-template-columns:25px 1fr 1fr 70px;}
  .rep-grid{grid-template-columns:1fr;}
}
</style>
</head>
<body>
<div id="toast"></div>

<!-- LOGIN -->
<div id="login-screen">
  <div class="lbox">
    <div class="logo">
      <div class="logo-icon">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
      </div>
      <div>
        <div class="h1" style="font-size:1.3rem;font-weight:800;color:var(--p);">Nexus</div>
        <div class="sub">Gestione Ore & Produzione</div>
      </div>
    </div>
    <div class="divider"></div>
    <div class="fg"><label>Username</label><input id="lu" type="text" autocomplete="username" placeholder="Inserisci username"></div>
    <div class="fg"><label>Password</label><input id="lp" type="password" autocomplete="current-password" placeholder="Inserisci password"></div>
    <button class="lbtn" onclick="doLogin()">Accedi</button>
    <div id="lerr"></div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <header>
    <div class="hlogo">
      <div class="hlogo-icon">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
      </div>
      <h1>Nexus — Gestione Ore <span style="font-size:0.65rem;font-weight:700;background:rgba(255,255,255,0.18);border-radius:4px;padding:2px 7px;letter-spacing:0.04em;vertical-align:middle;">v34</span></h1>
    </div>
    <div class="hright">
      <span class="rbadge" id="rbadge">—</span>
      <button class="logoutbtn" onclick="doLogout()">
        <svg style="width:12px;height:12px;fill:none;stroke:currentColor;stroke-width:2;vertical-align:middle;" viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        Esci
      </button>
    </div>
  </header>
  <nav id="mnav"></nav>
  <main id="mc"><div class="loading">Caricamento...</div></main>
</div>

<script>
const SB_URL='https://eqtyfnluswalfassmlxd.supabase.co';
const SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVxdHlmbmx1c3dhbGZhc3NtbHhkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEwMzE4NzksImV4cCI6MjA5NjYwNzg3OX0.bkTpKYduJV_PVNxEt6xgu0dWHy8kjmkMExlhBaCZSyk';
const sb=supabase.createClient(SB_URL,SB_KEY);

let ME=null;
let _righe=[],_preBatt=[];
let _dips=[],_reparti=[],_attivita=[],_contratti=[],_livelli=[],_tipiProd=[];

// UTILS
const oggi=()=>new Date().toISOString().split('T')[0];
function calcOre(ini,fin){
  if(!ini||!fin)return 0;
  const[h1,m1]=ini.split(':').map(Number),[h2,m2]=fin.split(':').map(Number);
  let d=(h2*60+m2)-(h1*60+m1);
  if(d<=0)d+=1440;
  return Math.round(d/60*100)/100;
}
function fmtEuro(n){return n!=null?'€'+Number(n).toFixed(2):'—';}
function fmtN(n,dec=2){return n!=null?Number(n).toFixed(dec):'—';}

function toast(msg,tipo='ok'){
  const el=document.getElementById('toast');
  el.textContent=msg;
  el.style.background=tipo==='ok'?'#15803d':tipo==='warn'?'#c97010':'#b83228';
  el.style.color='white';
  el.classList.add('show');
  clearTimeout(el._t);
  el._t=setTimeout(()=>el.classList.remove('show'),2800);
}

function nomeDip(id){const d=_dips.find(x=>x.ID_Dipendente==id);return d?d.Nome:id;}
function nomeRep(id){const r=_reparti.find(x=>x.ID_Reparto==id);return r?r.NomeReparto:id;}
function nomeAtt(id){const a=_attivita.find(x=>x.ID_Attivita==id);return a?a.NomeAttivita:id;}
function nomeCont(id){const c=_contratti.find(x=>x.ID_Contratto==id);return c?c.NomeContratto:id;}
function nomeLiv(id){const l=_livelli.find(x=>x.ID_Livello==id);return l?l.NomeLivello:id;}
function nomeTipoProd(id){const t=_tipiProd.find(x=>x.ID_TipoProduzione==id);return t?t.TipoProduzione:id;}

async function caricaDatiBase(){
  const[{data:d},{data:r},{data:a},{data:c},{data:l},{data:t}]=await Promise.all([
    sb.from('Dipendenti').select('*').order('Nome'), // tutti (attivi e non) — serve per report storici
    sb.from('Reparti').select('*').order('NomeReparto'),
    sb.from('Attivita').select('*').order('NomeAttivita'),
    sb.from('Contratti').select('*'),
    sb.from('Livelli').select('*'),
    sb.from('TipiProduzione').select('*').order('TipoProduzione')
  ]);
  _dips=d||[];_reparti=r||[];_attivita=a||[];
  _contratti=c||[];_livelli=l||[];_tipiProd=t||[];
}

// LOGIN
document.getElementById('lp').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});
async function doLogin(){
  const user=document.getElementById('lu').value.trim();
  const pass=document.getElementById('lp').value.trim();
  const err=document.getElementById('lerr');
  err.textContent='Verifica...';
  try{
    const{data,error}=await sb.from('Utenti').select('*').eq('Username',user).eq('Password',pass);
    if(error)throw error;
    if(!data||!data.length){err.textContent='Username o password errati.';return;}
    ME={username:data[0].Username,ruolo:data[0].Ruolo};
    err.textContent='';
    await caricaDatiBase();
    document.getElementById('login-screen').style.display='none';
    document.getElementById('app').style.display='block';
    document.getElementById('rbadge').textContent=ME.ruolo==='admin'?'👑 Amministratore':'🔧 Responsabile';
    buildNav();showFirstTab();
  }catch(e){err.textContent='Errore: '+e.message;}
}
function doLogout(){
  ME=null;
  document.getElementById('login-screen').style.display='flex';
  document.getElementById('app').style.display='none';
  document.getElementById('lp').value='';
  document.getElementById('lu').value='';
}

// NAV
const TABS_ADMIN=[
  ['ti',`<svg viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>`,'Inserimento'],
  ['tr',`<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>`,'Ore Rapide'],
  ['tprod',`<svg viewBox="0 0 24 24"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>`,'Produzione'],
  ['treport',`<svg viewBox="0 0 24 24"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>`,'Report'],
  ['tprodreport',`<svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/></svg>`,'Rep. Produzione'],
  ['ta',`<svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>`,'Archivio'],
  ['tconf',`<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>`,'Configurazione'],
  ['timport',`<svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>`,'Importa'],
  ['texport',`<svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>`,'Esporta']
];
const TABS_RESP=[
  ['tr',`<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>`,'Ore Rapide']
];

function buildNav(){
  const tabs=ME.ruolo==='admin'?TABS_ADMIN:TABS_RESP;
  document.getElementById('mnav').innerHTML=tabs.map(([id,icon,label])=>
    `<button id="nb-${id}" onclick="showTab('${id}')">${icon}${label}</button>`).join('');
}
function showFirstTab(){showTab(ME.ruolo==='admin'?'ti':'tr');}
async function showTab(id){
  document.querySelectorAll('nav button').forEach(b=>b.classList.remove('on'));
  const nb=document.getElementById('nb-'+id);if(nb)nb.classList.add('on');
  document.getElementById('mc').innerHTML='<div class="loading">⏳ Caricamento...</div>';
  await caricaDatiBase();
  if(id==='ti')renderInserimento();
  else if(id==='tr')renderRapido();
  else if(id==='tprod')renderProduzione();
  else if(id==='treport')renderReport();

function calcT(){
  const ini=document.getElementById('i-ini')?.value;
  const fin=document.getElementById('i-fin')?.value;
  if(!ini||!fin)return;
  const tot=calcOre(ini,fin);
  const notturno=fin<ini;
  const[h1,m1]=ini.split(':').map(Number);
  const oreA=notturno?Math.round((24*60-(h1*60+m1))/60*100)/100:tot;
  const oreB=notturno?Math.round((tot-oreA)*100)/100:0;
  const el=document.getElementById('i-oretot');
  if(el)el.value=`${oreA}h + ${oreB}h = ${tot}h${notturno?' (+1gg)':''}`;
  aggBar();
}

async function caricaPreAdmin(){
  const id=document.getElementById('i-dip')?.value;
  const data=document.getElementById('i-data')?.value;
  if(!id||!data)return;
  const{data:pre}=await sb.from('BattesimiPreTurno').select('*').eq('ID_Dipendente',id).eq('Data',data);
  _preBatt=pre||[];
  const box=document.getElementById('prebatt-box');
  if(!box)return;
  if(!_preBatt.length){box.innerHTML='';return;}
  box.innerHTML=`<div style="margin-bottom:10px;">
    <div style="font-size:0.67rem;font-weight:800;color:var(--arancio);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:6px;">
      ⚠ ${_preBatt.length} ore pre-battezzate dal responsabile — incluse automaticamente
    </div>
    ${_preBatt.map(m=>`<div class="prow">
      <span class="pill po">resp.</span>
      <span><span class="pill py">${nomeRep(m.ID_Reparto)}</span></span>
      <span><span class="pill pg">${nomeAtt(m.ID_Attivita)}</span></span>
      <strong>${m.OreBattezzate}h</strong>
    </div>`).join('')}
  </div>`;
  aggBar();
}

async function avanzaBatt(){
  const id=document.getElementById('i-dip')?.value;
  const data=document.getElementById('i-data')?.value;
  const ini=document.getElementById('i-ini')?.value;
  const fin=document.getElementById('i-fin')?.value;
  const msg=document.getElementById('imsg');
  if(!id||!data||!ini||!fin){msg.innerHTML='<div class="alert aerr">Compila tutti i campi.</div>';return;}
  if(calcOre(ini,fin)<=0){msg.innerHTML='<div class="alert aerr">Orario non valido.</div>';return;}
  await caricaPreAdmin();
  document.getElementById('cbatt').style.display='block';
  document.getElementById('bavanza').style.display='none';
  _righe=[];
  if(!_preBatt.length)addRiga();
  else renderRighe();
  aggBar();
}

function addRiga(){_righe.push({ID_Reparto:'',ID_Attivita:'',OreBattezzate:'',Note:''});renderRighe();aggBar();}
function removeRiga(i){if(_righe.length<=1)return;_righe.splice(i,1);renderRighe();aggBar();}
function rigaRepChange(i,idRep){
  _righe[i].ID_Reparto=idRep;_righe[i].ID_Attivita='';
  const el=document.getElementById('ratt-'+i);
  if(el)el.innerHTML=`<option value="">— Seleziona —</option>${optAtts(idRep)}`;
  aggBar();
}

function renderRighe(){
  const wrap=document.getElementById('righe-ore');if(!wrap)return;
  wrap.innerHTML=_righe.map((r,i)=>`
    <div class="qrow">
      <div style="font-family:var(--mono);font-size:0.76rem;color:var(--grigio);padding-top:22px;font-weight:700;">${i+1}</div>
      <div class="fg"><label>Reparto</label>
        <select onchange="rigaRepChange(${i},this.value)">
          <option value="">— Seleziona —</option>${optReps(r.ID_Reparto)}
        </select>
      </div>
      <div class="fg"><label>Attività</label>
        <select id="ratt-${i}" onchange="_righe[${i}].ID_Attivita=this.value;aggBar()">
          <option value="">— Seleziona —</option>${optAtts(r.ID_Reparto,r.ID_Attivita)}
        </select>
      </div>
      <div class="fg"><label>Ore</label>
        <input type="number" min="0.5" max="24" step="0.5" value="${r.OreBattezzate||''}" placeholder="0"
          oninput="_righe[${i}].OreBattezzate=parseFloat(this.value)||0;aggBar()">
      </div>
      <div class="fg"><label>Note</label>
        <input type="text" value="${r.Note||''}" placeholder="opz." oninput="_righe[${i}].Note=this.value">
      </div>
      <div class="fg" style="align-items:flex-end;"><label>&nbsp;</label>
        <button class="btn br bsm" onclick="removeRiga(${i})" ${_righe.length<=1?'disabled':''}>✕</button>
      </div>
    </div>`).join('');
}

function oreTotN(){return calcOre(document.getElementById('i-ini')?.value,document.getElementById('i-fin')?.value);}
function oreBattN(){
  const fr=_righe.reduce((a,r)=>a+(parseFloat(r.OreBattezzate)||0),0);
  const fp=_preBatt.reduce((a,m)=>a+m.OreBattezzate,0);
  return Math.round((fr+fp)*100)/100;
}
function aggBar(){
  const tot=oreTotN(),batt=oreBattN(),rim=Math.round((tot-batt)*100)/100;
  const pct=tot>0?Math.min(100,Math.round(batt/tot*100)):0;
  const er=document.getElementById('ore-rim'),eb=document.getElementById('ore-batt'),bar=document.getElementById('barra');
  if(!er)return;
  er.textContent=rim+'h';eb.textContent=batt+'h';
  er.className='num '+(rim===0?'ok':rim<0?'err':'warn');
  if(bar){bar.style.width=pct+'%';bar.style.background=rim===0?'#15803d':rim<0?'#b83228':'#c97010';}
}

async function salvaTurno(){
  const ID_Dipendente=document.getElementById('i-dip').value;
  const DataInizio=document.getElementById('i-data').value;
  const OraInizio=document.getElementById('i-ini').value;
  const OraFine=document.getElementById('i-fin').value;
  const msg=document.getElementById('imsg');
  const tot=oreTotN(),batt=oreBattN();
  const notturno=OraFine<OraInizio;
  const[h1,m1]=OraInizio.split(':').map(Number);
  const Ore_A=notturno?Math.round((24*60-(h1*60+m1))/60*100)/100:tot;
  const Ore_B=notturno?Math.round((tot-Ore_A)*100)/100:0;
  for(let i=0;i<_righe.length;i++){
    const r=_righe[i];
    if(!r.ID_Reparto||!r.ID_Attivita||!r.OreBattezzate){msg.innerHTML=`<div class="alert aerr">Riga ${i+1}: completa tutti i campi.</div>`;return;}
  }
  if(Math.abs(tot-batt)>0.01){msg.innerHTML=`<div class="alert aerr">Ore battezzate (${batt}h) ≠ ore totali (${tot}h). Differenza: ${Math.round((tot-batt)*100)/100}h</div>`;return;}
  const{data:old}=await sb.from('TurniGiornalieri').select('ID_Turno').eq('ID_Dipendente',ID_Dipendente).eq('DataInizio',DataInizio).single();
  if(old){
    await sb.from('BattesimiTurno').delete().eq('ID_Turno',old.ID_Turno);
    await sb.from('TurniGiornalieri').delete().eq('ID_Turno',old.ID_Turno);
  }
  const{data:turno,error:et}=await sb.from('TurniGiornalieri').insert({ID_Dipendente,DataInizio,OraInizio,OraFine,Ore_A,Ore_B}).select().single();
  if(et){msg.innerHTML=`<div class="alert aerr">${et.message}</div>`;return;}
  for(let i=0;i<_righe.length;i++){
    const r=_righe[i];
    await sb.from('BattesimiTurno').insert({ID_Turno:turno.ID_Turno,OrdineRiga:i+1,ID_Reparto:r.ID_Reparto,ID_Attivita:r.ID_Attivita,OreBattezzate:parseFloat(r.OreBattezzate),Note:r.Note||''});
  }
  for(const p of _preBatt){
    await sb.from('BattesimiTurno').insert({ID_Turno:turno.ID_Turno,OrdineRiga:99,ID_Reparto:p.ID_Reparto,ID_Attivita:p.ID_Attivita,OreBattezzate:p.OreBattezzate,Note:p.Note||''});
    await sb.from('BattesimiPreTurno').delete().eq('id',p.id);
  }
  toast('✔ Turno salvato');resetIns();showTab('ti');
}

function resetIns(){
  ['i-dip','i-data','i-ini','i-fin','i-oretot'].forEach(x=>{const e=document.getElementById(x);if(e)e.value='';});
  const cb=document.getElementById('cbatt'),bav=document.getElementById('bavanza');
  if(cb)cb.style.display='none';if(bav)bav.style.display='block';
  _righe=[];_preBatt=[];
}
async function modificaTurno(id){
  // Carica testata turno
  const{data:g,error:eg}=await sb.from('TurniGiornalieri').select('*').eq('ID_Turno',id).single();
  if(eg||!g){toast('Turno non trovato','err');return;}
  // Carica battesimi esistenti (escludi pre-batt OrdineRiga=99)
  const{data:bs}=await sb.from('BattesimiTurno').select('*').eq('ID_Turno',id).order('OrdineRiga');
  const bsNorm=(bs||[]).filter(b=>b.OrdineRiga!==99);

  // Precompila form testata
  const ed=document.getElementById('i-dip');
  const edata=document.getElementById('i-data');
  const eini=document.getElementById('i-ini');
  const efin=document.getElementById('i-fin');
  const msg=document.getElementById('imsg');
  if(!ed){toast('Apri prima il tab Inserimento','warn');return;}
  ed.value=g.ID_Dipendente;
  edata.value=g.DataInizio;
  eini.value=g.OraInizio||'';
  efin.value=g.OraFine||'';
  calcT();
  await caricaPreAdmin();

  // Precompila righe battesimo (solo righe normali, pre-batt gestiti da caricaPreAdmin)
  _righe=bsNorm.map(b=>({ID_Reparto:b.ID_Reparto,ID_Attivita:b.ID_Attivita,OreBattezzate:b.OreBattezzate,Note:b.Note||''}));
  if(!_righe.length)_righe=[{ID_Reparto:'',ID_Attivita:'',OreBattezzate:'',Note:''}];

  // Mostra sezione battesimo
  const cbatt=document.getElementById('cbatt');
  const bavanza=document.getElementById('bavanza');
  if(cbatt)cbatt.style.display='block';
  if(bavanza)bavanza.style.display='none';
  renderRighe();aggBar();

  // Avviso
  if(msg)msg.innerHTML='<div class="alert awarn">⚠ Stai modificando il turno del '+g.DataInizio+' — il salvataggio sostituirà i battesimi esistenti. Le ore totali devono corrispondere agli orari.</div>';

  // Scroll al form
  document.querySelector('.card').scrollIntoView({behavior:'smooth'});
}

async function eliminaTurno(id){
  if(!confirm('Eliminare questo turno e tutti i suoi battesimi?'))return;
  await sb.from('BattesimiTurno').delete().eq('ID_Turno',id);
  await sb.from('TurniGiornalieri').delete().eq('ID_Turno',id);
  toast('Eliminato','warn');showTab('ti');
}

async function importaProduzione(e){
  const file=e.target.files[0];if(!file)return;
  const msg=document.getElementById('import-msg');
  msg.innerHTML='<div class="alert awarn">Elaborazione file...</div>';
  try{
    const{read,utils}=await import('https://cdn.sheetjs.com/xlsx-0.20.1/package/xlsx.mjs');
    const ab=await file.arrayBuffer();
    const wb=read(ab);
    const ws=wb.Sheets[wb.SheetNames[0]];
    const rows=utils.sheet_to_json(ws);
    let ok=0,skip=0;
    for(const row of rows){
      const DataProduzione=row['DataProduzione']||row['Data']||row['data'];
      const CodiceVoice=row['CodiceVoice']||row['codice_voice']||row['Operatore'];
      const Colli=row['Colli']||row['colli'];
      const ID_Attivita=row['ID_Attivita']||row['id_attivita']||15;
      if(!DataProduzione||!CodiceVoice||!Colli){skip++;continue;}
      // normalizza data
      let dataNorm=DataProduzione;
      if(typeof DataProduzione==='number'){
        const d=new Date(Math.round((DataProduzione-25569)*86400*1000));
        dataNorm=d.toISOString().split('T')[0];
      } else if(typeof DataProduzione==='string'&&DataProduzione.includes('/')){
        const p=DataProduzione.split('/');
        dataNorm=`${p[2]}-${p[1].padStart(2,'0')}-${p[0].padStart(2,'0')}`;
      }
      const{error}=await sb.from('ProduzioneOperatori').insert({
        DataProduzione:dataNorm,
        CodiceVoice:parseInt(CodiceVoice),
        ID_Attivita:parseInt(ID_Attivita),
        Colli:parseFloat(Colli)
      });
      if(error)skip++;else ok++;
    }
    msg.innerHTML=`<div class="alert aok">✔ Importati ${ok} record. ${skip>0?`${skip} saltati.`:''}</div>`;
  }catch(err){
    msg.innerHTML=`<div class="alert aerr">Errore importazione: ${err.message}</div>`;
  }
}

// Calcola le ore per tipologia di un singolo battesimo
// basandosi sull'orario di inizio effettivo del battesimo nella timeline del turno
// Cache festivi per evitare ricalcoli ripetuti
const _festiviCache={};
function _isFestivoFast(dateStr){
  if(_festiviCache[dateStr]!==undefined)return _festiviCache[dateStr];
  const d=new Date(dateStr+'T00:00:00');
  if(d.getDay()===0){_festiviCache[dateStr]=true;return true;}
  const mm=String(d.getMonth()+1).padStart(2,'0');
  const dd=String(d.getDate()).padStart(2,'0');
  const fissi=['01-01','06-01','04-25','05-01','06-02','08-15','11-01','12-08','12-25','12-26'];
  if(fissi.includes(mm+'-'+dd)){_festiviCache[dateStr]=true;return true;}
  const y=d.getFullYear();
  const a=y%19,b=Math.floor(y/100),c=y%100,dv=Math.floor(b/4),e=b%4,f=Math.floor((b+8)/25),g=Math.floor((b-f+1)/3),h=(19*a+b-dv-g+15)%30,i=Math.floor(c/4),k=c%4,l=(32+2*e+2*i-h-k)%7,mv=Math.floor((a+11*h+22*l)/451),n=h+l-7*mv+114;
  const pasqua=new Date(y,Math.floor(n/31)-1,(n%31)+1);
  const pasquetta=new Date(pasqua);pasquetta.setDate(pasquetta.getDate()+1);
  const fmt=(dt)=>String(dt.getMonth()+1).padStart(2,'0')+'-'+String(dt.getDate()).padStart(2,'0');
  const r=(mm+'-'+dd)===fmt(pasqua)||(mm+'-'+dd)===fmt(pasquetta);
  _festiviCache[dateStr]=r;return r;
}

// Cache date offset per evitare new Date() ripetuti
const _dateOffsetCache={};
function _dateAddDays(baseStr, days){
  const k=baseStr+'_'+days;
  if(_dateOffsetCache[k])return _dateOffsetCache[k];
  const d=new Date(baseStr+'T00:00:00');
  d.setDate(d.getDate()+days);
  const r=d.toISOString().split('T')[0];
  _dateOffsetCache[k]=r;return r;
}

// Calcolo algebrico per intersezione intervalli — sostituisce il loop minuto per minuto
// Stessa precisione, 100x più veloce
function calcolaOreBattesimoPerTipologia(turno, battesimi_turno_ordinati, idx_battesimo, data_turno){
  const oraInizioTurno=turno.OraInizio;
  if(!oraInizioTurno)return calcolaOreBattesimoProporzione(turno,battesimi_turno_ordinati[idx_battesimo]);

  function toMin(hhmm){if(!hhmm)return 0;const[h,m]=(hhmm||'00:00').split(':').map(Number);return h*60+m;}

  // Posiziona ogni battesimo nella timeline (minuti assoluti dall'inizio turno)
  let cur=toMin(oraInizioTurno);
  const offsets=battesimi_turno_ordinati.map(b=>{
    const s=cur; cur+=(b.OreBattezzate||0)*60; return{s,e:cur};
  });
  const myBat=offsets[idx_battesimo];
  if(!myBat)return{ord:0,notte:0,fest:0,notteFest:0};

  const NOTTE_INI=22*60; // 1320
  const NOTTE_FIN=6*60;  // 360
  const DAY=24*60;        // 1440

  let oreOrd=0,oreNotte=0,oreFest=0,oreNotteFest=0;

  // Calcola intersezione tra due intervalli [a,b) e [c,d) → minuti di sovrapposizione
  function intersect(a,b,c,d){return Math.max(0,Math.min(b,d)-Math.max(a,c));}

  // Suddividi il battesimo in segmenti giornalieri e calcola algebricamente
  const dayStart=Math.floor(myBat.s/DAY);
  const dayEnd=Math.floor((myBat.e-0.001)/DAY);

  for(let g=dayStart;g<=dayEnd;g++){
    const segS=Math.max(myBat.s, g*DAY);
    const segE=Math.min(myBat.e,(g+1)*DAY);
    if(segS>=segE)continue;

    const dateStr=_dateAddDays(data_turno,g);
    const fest=_isFestivoFast(dateStr);

    // Minuti notturni in questo giorno: [0, NOTTE_FIN) e [NOTTE_INI, DAY)
    // espressi come minuti assoluti nel giorno g
    const n1s=g*DAY+0,      n1e=g*DAY+NOTTE_FIN;  // mezzanotte→06:00
    const n2s=g*DAY+NOTTE_INI, n2e=(g+1)*DAY;     // 22:00→mezzanotte

    const minNotte=intersect(segS,segE,n1s,n1e)+intersect(segS,segE,n2s,n2e);
    const minGiorno=(segE-segS)-minNotte;

    const oN=minNotte/60, oG=minGiorno/60;
    if(fest){oreFest+=oG; oreNotteFest+=oN;}
    else{oreOrd+=oG; oreNotte+=oN;}
  }
  return{ord:oreOrd,notte:oreNotte,fest:oreFest,notteFest:oreNotteFest};
}

function calcolaOreBattesimoProporzione(turno, battesimo){
  // fallback senza orario: proporziona le ore dettagliate del turno
  const totTurno=Math.max(1,(turno.Ore_A||0)+(turno.Ore_B||0));
  const ratio=(battesimo.OreBattezzate||0)/totTurno;
  const oreOrdTurno=Math.max(0,totTurno-(turno.OreNotte_A||0)-(turno.OreNotte_B||0)-(turno.OreFestive_A||0)-(turno.OreFestive_B||0)-(turno.OreNotteFestive_A||0)-(turno.OreNotteFestive_B||0));
  return {
    ord: oreOrdTurno*ratio,
    notte: ((turno.OreNotte_A||0)+(turno.OreNotte_B||0))*ratio,
    fest: ((turno.OreFestive_A||0)+(turno.OreFestive_B||0))*ratio,
    notteFest: ((turno.OreNotteFestive_A||0)+(turno.OreNotteFestive_B||0))*ratio
  };
}

async function caricaReport(){
  const dal=document.getElementById('rp-dal').value;
  const al=document.getElementById('rp-al').value;
  const frep=document.getElementById('rp-rep').value;
  const cont=document.getElementById('report-content');
  cont.innerHTML='<div class="loading">⏳ Elaborazione dati...</div>';

  // Numero di giorni del periodo
  const dataD=new Date(dal||'2026-01-01');
  const dataA=new Date(al||oggi());
  const numGiorni=Math.max(1,Math.round((dataA-dataD)/(1000*60*60*24))+1);

  // Carica turni e battesimi separatamente (parallelo) + tariffe
  cont.innerHTML='<div class="loading">⏳ Caricamento dati...</div>';
  let ggs=[], batsAll=[];

  // Step 1: turni con paginazione keyset
  {
    let lastId=0;
    while(true){
      let q=sb.from('TurniGiornalieri').select('*')
        .gt('ID_Turno',lastId)
        .order('ID_Turno',{ascending:true})
        .limit(1000);
      if(dal)q=q.gte('DataInizio',dal);
      if(al)q=q.lte('DataInizio',al);
      const{data:batch,error}=await q;
      if(error||!batch||!batch.length)break;
      ggs=[...ggs,...batch];
      if(batch.length<1000)break;
      lastId=batch[batch.length-1].ID_Turno;
    }
  }
  if(!ggs.length){cont.innerHTML='<div class="empty">Nessun turno nel periodo selezionato.</div>';return;}

  // Step 2: battesimi filtrati per range ID_Turno (min/max del periodo) — una sola query keyset
  {
    const idTurni=ggs.map(g=>g.ID_Turno);
    const minId=Math.min(...idTurni);
    const maxId=Math.max(...idTurni);
    const idSet=new Set(idTurni);
    let lastId=0;
    while(true){
      const{data:batch,error}=await sb.from('BattesimiTurno').select('*')
        .gt('ID_Battesimo',lastId)
        .gte('ID_Turno',minId)
        .lte('ID_Turno',maxId)
        .order('ID_Battesimo',{ascending:true})
        .limit(1000);
      if(error||!batch||!batch.length)break;
      // filtra solo quelli del periodo
      batch.filter(b=>idSet.has(b.ID_Turno)).forEach(b=>batsAll.push(b));
      if(batch.length<1000)break;
      lastId=batch[batch.length-1].ID_Battesimo;
    }
  }
  console.log(`Turni:${ggs.length} Battesimi:${batsAll.length}`);

  // Tariffe e produzione in parallelo
  const[
    {data:tariffeEco},{data:tariffeProd},{data:costiMezzi},{data:prods},{data:prodOp}
  ]=await Promise.all([
    sb.from('TariffeEconomia').select('*'),
    sb.from('TariffeProduzione').select('*'),
    sb.from('CostiMezziReparti').select('*'),
    (()=>{let q=sb.from('ProduzioneReparti').select('*');if(dal)q=q.gte('DataProduzione',dal);if(al)q=q.lte('DataProduzione',al);if(frep)q=q.eq('ID_Reparto',frep);return q;})(),
    sb.from('ProduzioneOperatori').select('*').gte('DataProduzione',dal||'2020-01-01').lte('DataProduzione',al||oggi()).eq('ID_Attivita',15)
  ]);

  // Raggruppa battesimi per turno in ordine cronologico
  const batsByTurno={};
  (batsAll||[]).forEach(b=>{
    if(!batsByTurno[b.ID_Turno])batsByTurno[b.ID_Turno]=[];
    batsByTurno[b.ID_Turno].push(b);
  });
  Object.values(batsByTurno).forEach(arr=>arr.sort((a,b)=>a.OrdineRiga-b.OrdineRiga));

  // =============================================================
  // CALCOLO COSTO E RICAVO PER BATTESIMO (logica cronologica)
  // Ogni battesimo occupa una fetta temporale in sequenza nel turno.
  // Le fasce orarie (ordinaria 06-22, notturna 22-06, festiva, notte-festiva)
  // vengono assegnate minuto per minuto in base all'orario reale.
  // =============================================================
  const costoPerReparto={};
  const ricavoPerReparto={};
  const costoPerDipMap={};
  let costoTotale=0, ricavoTotale=0;

  (ggs||[]).forEach(turno=>{
    const bats=batsByTurno[turno.ID_Turno]||[];
    if(!bats.length)return;
    const d=_dips.find(x=>x.ID_Dipendente==turno.ID_Dipendente);
    if(!d)return;

    // Tariffa costo dipendente
    const lv=_livelli.filter(x=>
      x.ID_Livello==d.ID_Livello&&
      (!x.DataFine||x.DataFine>=turno.DataInizio)&&
      (!x.DataInizio||x.DataInizio<=turno.DataInizio)
    ).sort((a,b)=>(b.DataInizio||'').localeCompare(a.DataInizio||''))[0]||
    _livelli.find(x=>x.ID_Livello==d.ID_Livello);

    const contDip=_contratti.find(x=>x.ID_Contratto==d.ID_Contratto);
    const costoBase=lv?.CostoOrarioBase||0;
    const maggiorN=contDip?.MaggiorazioneNotturno||0;
    const maggiorF=contDip?.MaggiorazioneFestivo||0;
    const maggiorNF=contDip?.MaggiorazioneNotteFestivo||0;

    // Tariffa ricavo economia
    const te=tariffeEco?.filter(x=>
      x.ID_Contratto==d.ID_Contratto&&
      x.DataInizio<=turno.DataInizio&&
      (!x.DataFine||x.DataFine>=turno.DataInizio)
    ).sort((a,z)=>z.DataInizio.localeCompare(a.DataInizio))[0];

    // Proporziona ore per tipologia dai campi Access già calcolati — veloce e preciso
    const totTurno=Math.max(0.001,(turno.Ore_A||0)+(turno.Ore_B||0));
    const oreNotteTurno=(turno.OreNotte_A||0)+(turno.OreNotte_B||0);
    const oreFestTurno=(turno.OreFestive_A||0)+(turno.OreFestive_B||0);
    const oreNotteFestTurno=(turno.OreNotteFestive_A||0)+(turno.OreNotteFestive_B||0);
    const oreOrdTurno=Math.max(0,totTurno-oreNotteTurno-oreFestTurno-oreNotteFestTurno);

    bats.forEach((bat,idx)=>{
      const rep=bat.ID_Reparto;
      const ratio=(bat.OreBattezzate||0)/totTurno;
      const tip={
        ord:  oreOrdTurno*ratio,
        notte:oreNotteTurno*ratio,
        fest: oreFestTurno*ratio,
        notteFest:oreNotteFestTurno*ratio
      };

      // COSTO (tariffa contratto dipendente)
      const costo=tip.ord*costoBase+tip.notte*costoBase*(1+maggiorN)+tip.fest*costoBase*(1+maggiorF)+tip.notteFest*costoBase*(1+maggiorNF);

      // Accumula solo se reparto corrisponde al filtro (o nessun filtro)
      if(!frep||rep==frep){
        costoTotale+=costo;
        if(!costoPerReparto[rep])costoPerReparto[rep]={costo:0,ore:0,oreNotte:0,oreFest:0,oreNotteFest:0};
        costoPerReparto[rep].costo+=costo;
        costoPerReparto[rep].ore+=bat.OreBattezzate||0;
        costoPerReparto[rep].oreNotte+=tip.notte;
        costoPerReparto[rep].oreFest+=tip.fest;
        costoPerReparto[rep].oreNotteFest+=tip.notteFest;

        // Costo per dipendente
        if(!costoPerDipMap[d.ID_Dipendente])costoPerDipMap[d.ID_Dipendente]={nome:d.Nome,ore:0,oreNotte:0,oreFest:0,costo:0};
        costoPerDipMap[d.ID_Dipendente].ore+=bat.OreBattezzate||0;
        costoPerDipMap[d.ID_Dipendente].oreNotte+=tip.notte;
        costoPerDipMap[d.ID_Dipendente].oreFest+=tip.fest;
        costoPerDipMap[d.ID_Dipendente].costo+=costo;
      }

      // RICAVO ECONOMIA (rep 4)
      if(rep==4 && te && (!frep||rep==frep)){
        const ric=tip.ord*(te.TariffaOrdinaria||0)+tip.notte*(te.TariffaNotturna||0)+tip.fest*(te.TariffaFestiva||0)+tip.notteFest*(te.TariffaNotteFestiva||0);
        if(!ricavoPerReparto[rep])ricavoPerReparto[rep]={ricavo:0};
        ricavoPerReparto[rep].ricavo+=ric;
        ricavoTotale+=ric;
      }
    });
  });

  // RICAVO PRODUZIONE (reparti non-economia)
  // Usa TipoGiorno (Feriale/Festivo) + TipoTurno (Diurno/Notturno) per trovare la tariffa corretta
  let fattProduzione=0;
  (prods||[]).forEach(p=>{
    const t=tariffeProd?.filter(x=>x.ID_TipoProduzione==p.ID_TipoProduzione&&(!x.DataFine||x.DataFine>=p.DataProduzione)&&(!x.DataInizio||x.DataInizio<=p.DataProduzione));
    if(!t||!t.length)return;
    const festivo=isFestivo(p.DataProduzione);
    const tipoGiorno=festivo?'Festivo':'Feriale';
    const tipoTurno=p.Notturno?'Notturno':'Diurno';
    // priorità: corrispondenza esatta giorno+turno → giorno+Tutti → Tutti+turno → Tutti+Tutti → primo disponibile
    const tf=
      t.find(x=>x.TipoGiorno===tipoGiorno&&x.TipoTurno===tipoTurno)||
      t.find(x=>x.TipoGiorno===tipoGiorno&&x.TipoTurno==='Tutti')||
      t.find(x=>x.TipoGiorno==='Tutti'&&x.TipoTurno===tipoTurno)||
      t.find(x=>x.TipoGiorno==='Tutti'&&x.TipoTurno==='Tutti')||
      t[0];
    if(!tf)return;
    const val=p.Quantita*tf.Tariffa;
    fattProduzione+=val;
    if(!ricavoPerReparto[p.ID_Reparto])ricavoPerReparto[p.ID_Reparto]={ricavo:0};
    ricavoPerReparto[p.ID_Reparto].ricavo+=val;
  });
  ricavoTotale+=fattProduzione;

  // COSTO MEZZI ripartito sui giorni selezionati
  let costoMezziTot=0;
  const costoMezziPerRep={};
  (costiMezzi||[]).forEach(cm=>{
    if(frep && cm.ID_Reparto!=frep)return;
    if(cm.DataFine && cm.DataFine<dal)return;
    if(cm.DataInizio && cm.DataInizio>al)return;
    const costoRipartito=(cm.CostoGiornaliero||0)*numGiorni;
    costoMezziTot+=costoRipartito;
    if(!costoMezziPerRep[cm.ID_Reparto])costoMezziPerRep[cm.ID_Reparto]=0;
    costoMezziPerRep[cm.ID_Reparto]+=costoRipartito;
  });

  const margineOperativo=ricavoTotale-costoTotale-costoMezziTot;
  const totOre=Object.values(costoPerReparto).reduce((a,v)=>a+v.ore,0);

  // PRODUTTIVITA' att.15
  const totColliAtt15=(prodOp||[]).reduce((a,p)=>a+p.Colli,0);
  const oreAtt15=(batsAll||[]).filter(b=>b.ID_Attivita==15&&(!frep||b.ID_Reparto==frep)).reduce((a,b)=>a+(b.OreBattezzate||0),0);
  const produttivita=oreAtt15>0?Math.round(totColliAtt15/oreAtt15):0;

  // =============================================================
  // TABELLE
  // =============================================================
  const righeContoEco=Object.keys({...costoPerReparto,...ricavoPerReparto})

async function filtraReportProd(){
  const dal=document.getElementById('rp-dal')?.value||'';
  const al=document.getElementById('rp-al')?.value||'';
  const frep=document.getElementById('rp-rep')?.value||'';
  const fturno=document.getElementById('rp-turno')?.value||'';
  const cont=document.getElementById('rp-results');
  if(!cont)return;
  cont.innerHTML='<div class="loading">⏳ Caricamento...</div>';

  let q=sb.from('ProduzioneReparti').select('*').order('DataProduzione',{ascending:false});
  if(dal)q=q.gte('DataProduzione',dal);
  if(al)q=q.lte('DataProduzione',al);
  if(frep)q=q.eq('ID_Reparto',frep);
  if(fturno!=='')q=q.eq('Notturno',fturno==='true');
  const{data:prods,error}=await q;

  if(error){cont.innerHTML=`<div class="alert aerr">${error.message}</div>`;return;}
  if(!prods||!prods.length){cont.innerHTML='<div class="empty" style="padding:32px;text-align:center;">Nessun risultato</div>';return;}

  // Totali per tipo
  const totPerTipo={};
  const totPerRep={};
  prods.forEach(p=>{
    const k=nomeTipoProd(p.ID_TipoProduzione);
    totPerTipo[k]=(totPerTipo[k]||0)+Number(p.Quantita||0);
    const r=nomeRep(p.ID_Reparto);
    totPerRep[r]=(totPerRep[r]||0)+Number(p.Quantita||0);
  });

  const righe=prods.map(p=>`
    <tr id="rpr-${p.ID_Produzione}">
      <td>${p.DataProduzione}</td>
      <td><span class="pill py">${nomeRep(p.ID_Reparto)}</span></td>
      <td>${nomeTipoProd(p.ID_TipoProduzione)}</td>
      <td><strong>${Number(p.Quantita).toLocaleString('it-IT')}</strong></td>
      <td>${p.Notturno?'<span class="pill pv">Notturno</span>':'<span class="pill pb">Diurno</span>'}</td>
      <td style="display:flex;gap:4px;">
        <button class="btn bo bsm" onclick="modificaProdRep(${p.ID_Produzione},'${p.DataProduzione}',${p.ID_Reparto},${p.ID_TipoProduzione},${p.Quantita},${p.Notturno})" title="Modifica">✏</button>
        <button class="btn br bsm" onclick="eliminaProdRepReport(${p.ID_Produzione})" title="Elimina">✕</button>
      </td>
    </tr>`).join('');

  const totRighe=Object.entries(totPerTipo).map(([k,v])=>`
    <tr><td><strong>${k}</strong></td><td><strong>${v.toLocaleString('it-IT')}</strong></td></tr>`).join('');

  cont.innerHTML=`
  <div class="g2" style="gap:14px;margin-bottom:14px;">
    <div class="card" style="margin:0;">
      <div class="ct">Totali per tipo produzione</div>
      <table><thead><tr><th>Tipo</th><th>Quantità tot.</th></tr></thead>
      <tbody>${totRighe}</tbody></table>
    </div>
    <div class="card" style="margin:0;">
      <div class="ct">Riepilogo</div>
      <div style="font-size:0.85rem;line-height:2;">
        Righe trovate: <strong>${prods.length}</strong><br>
        ${Object.entries(totPerRep).map(([r,v])=>`${r}: <strong>${v.toLocaleString('it-IT')}</strong>`).join('<br>')}
      </div>
    </div>
  </div>
  <div class="card">
    <div class="ct">Produzioni reparti <span style="font-weight:400;font-size:0.78rem;color:var(--grigio);">(${prods.length} righe)</span></div>
    <div id="rp-edit-msg"></div>
    <div class="tw"><table>
      <thead><tr><th>Data</th><th>Reparto</th><th>Tipo</th><th>Quantità</th><th>Turno</th><th></th></tr></thead>
      <tbody id="rp-tbody">${righe}</tbody>
    </table></div>
  </div>`;
}

function resetFiltriProd(){
  ['rp-dal','rp-al','rp-rep','rp-turno'].forEach(id=>{const e=document.getElementById(id);if(e)e.value='';});
  const r=document.getElementById('rp-results');
  if(r)r.innerHTML='<div class="empty" style="padding:32px;text-align:center;">Usa i filtri per cercare le produzioni</div>';
}

async function modificaProdRep(id,data,idRep,idTipo,qty,notturno){
  const tr=document.getElementById('rpr-'+id);
  if(!tr)return;
  // sostituisce la riga con form inline
  tr.innerHTML=`
    <td><input type="date" id="me-data-${id}" value="${data}" style="width:130px;"></td>
    <td><select id="me-rep-${id}" onchange="aggMeTipi(${id})"><option value="">—</option>${optReps(idRep)}</select></td>
    <td><select id="me-tipo-${id}">${optTipiProd(idRep,idTipo)}</select></td>
    <td><input type="number" id="me-qty-${id}" value="${qty}" min="0" step="1" style="width:100px;"></td>
    <td><select id="me-turno-${id}">
      <option value="false" ${!notturno?'selected':''}>Diurno</option>
      <option value="true" ${notturno?'selected':''}>Notturno</option>
    </select></td>
    <td style="display:flex;gap:4px;">
      <button class="btn bv bsm" onclick="salvaProdRepEdit(${id})">✔</button>
      <button class="btn bo bsm" onclick="filtraReportProd()">✕</button>
    </td>`;
}

function aggMeTipi(id){
  const rep=document.getElementById('me-rep-'+id)?.value||'';
  const el=document.getElementById('me-tipo-'+id);
  if(el)el.innerHTML=optTipiProd(rep);
}

async function salvaProdRepEdit(id){
  const msg=document.getElementById('rp-edit-msg');
  const DataProduzione=document.getElementById('me-data-'+id)?.value;
  const ID_Reparto=document.getElementById('me-rep-'+id)?.value;
  const ID_TipoProduzione=document.getElementById('me-tipo-'+id)?.value;
  const Quantita=parseFloat(document.getElementById('me-qty-'+id)?.value);
  const Notturno=document.getElementById('me-turno-'+id)?.value==='true';
  if(!DataProduzione||!ID_Reparto||!ID_TipoProduzione||!Quantita){
    if(msg)msg.innerHTML='<div class="alert aerr">Compila tutti i campi.</div>';return;
  }
  const{error}=await sb.from('ProduzioneReparti').update({DataProduzione,ID_Reparto,ID_TipoProduzione,Quantita,Notturno}).eq('ID_Produzione',id);
  if(error){if(msg)msg.innerHTML=`<div class="alert aerr">${error.message}</div>`;return;}
  toast('✔ Produzione aggiornata');
  filtraReportProd();
}

async function eliminaProdRepReport(id){
  if(!confirm('Eliminare questa produzione?'))return;
  const{error}=await sb.from('ProduzioneReparti').delete().eq('ID_Produzione',id);
  if(error){toast('Errore eliminazione','err');return;}
  toast('Eliminato','warn');
  filtraReportProd();
}

async function pulisciBattesimiZero(){
  const msg=document.getElementById('pulizia-msg');
  if(!confirm('Eliminare tutti i battesimi con reparto=0 o attività=0? Questa azione non è reversibile.'))return;
  msg.innerHTML='<div class="alert awarn">Ricerca in corso...</div>';
  const{data:bats,error}=await sb.from('BattesimiTurno').select('ID_Battesimo,ID_Reparto,ID_Attivita')
    .or('ID_Reparto.eq.0,ID_Attivita.eq.0');
  if(error){msg.innerHTML=`<div class="alert aerr">Errore: ${error.message}</div>`;return;}
  if(!bats||!bats.length){msg.innerHTML='<div class="alert aok">Nessun battesimo con reparto/attività 0 trovato.</div>';return;}
  const ids=bats.map(b=>b.ID_Battesimo);
  msg.innerHTML=`<div class="alert awarn">Trovati ${ids.length} battesimi — eliminazione in corso...</div>`;
  const{error:delErr}=await sb.from('BattesimiTurno').delete().in('ID_Battesimo',ids);
  if(delErr){msg.innerHTML=`<div class="alert aerr">Errore eliminazione: ${delErr.message}</div>`;return;}
  msg.innerHTML=`<div class="alert aok">✔ Eliminati ${ids.length} battesimi con reparto/attività 0.</div>`;
  toast(`✔ Eliminati ${ids.length} battesimi anomali`,'warn');
}

async function caricaTariffe(){
  const[{data:te},{data:lv},{data:tp},{data:cm},{data:reps},{data:atts}]=await Promise.all([
    sb.from('TariffeEconomia').select('*').order('DataInizio',{ascending:false}),
    sb.from('Livelli').select('*').order('ID_Contratto'),
    sb.from('TariffeProduzione').select('*').order('DataInizio',{ascending:false}),
    sb.from('CostiMezziReparti').select('*').order('DataInizio',{ascending:false}),
    sb.from('Reparti').select('*').order('ID_Reparto'),
    sb.from('Attivita').select('*').order('ID_Attivita')
  ]);

  // Reparti
  const tReps=document.getElementById('tbody-reparti');
  if(tReps)tReps.innerHTML=(reps||[]).map(r=>`<tr>
    <td><span class="bid">${r.ID_Reparto}</span></td>
    <td><strong>${r.NomeReparto}</strong></td>
    <td>
      <button class="btn bp bsm" onclick="editReparto(${r.ID_Reparto},'${r.NomeReparto.replace(/'/g,"\'")}')" style="margin-right:4px;">✎</button>
      <button class="btn br bsm" onclick="eliminaReparto(${r.ID_Reparto})">✕</button>
    </td>
  </tr>`).join('')||'<tr><td colspan="3" class="empty">Nessun reparto</td></tr>';

  // Attività
  const tAtts=document.getElementById('tbody-attivita');
  if(tAtts)tAtts.innerHTML=(atts||[]).map(a=>`<tr>
    <td><span class="bid">${a.ID_Attivita}</span></td>
    <td><span class="pill py">${nomeRep(a.ID_Reparto)}</span></td>
    <td><strong>${a.NomeAttivita}</strong></td>
    <td>
      <button class="btn bp bsm" onclick="editAttivita(${a.ID_Attivita},'${(a.NomeAttivita||'').replace(/'/g,"\'")}')" style="margin-right:4px;">✎</button>
      <button class="btn br bsm" onclick="eliminaAttivita(${a.ID_Attivita})">✕</button>
    </td>
  </tr>`).join('')||'<tr><td colspan="4" class="empty">Nessuna attività</td></tr>';

  // Tariffe economia
  const tEco=document.getElementById('tbody-tariffe-eco');
  if(tEco)tEco.innerHTML=(te||[]).map(t=>`<tr>
    <td><span class="pill pg">${nomeCont(t.ID_Contratto)}</span></td>
    <td><strong>${fmtEuro(t.TariffaOrdinaria)}</strong></td>
    <td>${fmtEuro(t.TariffaNotturna)}</td>
    <td>${fmtEuro(t.TariffaFestiva)}</td>
    <td>${fmtEuro(t.TariffaNotteFestiva)}</td>
    <td>${t.DataInizio||'—'}</td>
    <td>${t.DataFine||'<span style="color:var(--verde);font-weight:700;">In vigore</span>'}</td>
    <td><button class="btn br bsm" onclick="chiudiTariffaEco(${t.ID_TariffaE})">Chiudi</button></td>
  </tr>`).join('')||'<tr><td colspan="8" class="empty">Nessuna tariffa</td></tr>';

  // Livelli - raggruppa per contratto+nomeLivello, mostra solo attivi (DataFine null)
  const tLv=document.getElementById('tbody-livelli');
  if(tLv){
    // prendi tutti i livelli, mostra quelli attivi con possibilità di aggiornare
    const livAttiviMap={};
    (lv||[]).forEach(l=>{
      const k=l.ID_Contratto+'-'+l.NomeLivello;
      if(!l.DataFine){livAttiviMap[k]=l;}
    });
    const livAttivi=Object.values(livAttiviMap);
    tLv.innerHTML=livAttivi.map(l=>`<tr>
      <td><span class="pill pg">${nomeCont(l.ID_Contratto)}</span></td>
      <td><strong>${l.NomeLivello}</strong></td>
      <td><strong>${fmtEuro(l.CostoOrarioBase)}</strong></td>
      <td>
        <input type="number" step="0.01" placeholder="Nuovo valore" id="lv-new-${l.ID_Livello}"
          style="border:1.5px solid var(--bordo);border-radius:5px;padding:5px 8px;width:110px;font-size:0.84rem;">
      </td>
      <td><input type="date" id="lv-dal-${l.ID_Livello}" value="${oggi()}"
        style="border:1.5px solid var(--bordo);border-radius:5px;padding:5px 8px;font-size:0.84rem;"></td>
      <td><button class="btn bp bsm" onclick="aggiornaLivello(${l.ID_Livello},${l.ID_Contratto},'${l.NomeLivello}')">Aggiorna</button></td>
    </tr>`).join('')||'<tr><td colspan="6" class="empty">Nessun livello</td></tr>';

    // mostra storico sotto
    const lvStorico=(lv||[]).filter(l=>l.DataFine);
    if(lvStorico.length){
      tLv.innerHTML+=`<tr><td colspan="6" style="background:var(--sfondo);font-size:0.68rem;font-weight:800;color:var(--grigio);text-transform:uppercase;letter-spacing:0.07em;padding:8px 10px;">Storico variazioni</td></tr>`;
      tLv.innerHTML+=lvStorico.map(l=>`<tr style="opacity:0.6;">
        <td><span class="pill py">${nomeCont(l.ID_Contratto)}</span></td>
        <td>${l.NomeLivello}</td>
        <td>${fmtEuro(l.CostoOrarioBase)}</td>
        <td colspan="2" style="font-size:0.76rem;color:var(--grigio);">${l.DataInizio||'—'} → ${l.DataFine||'—'}</td>
        <td></td>
      </tr>`).join('');
    }
  }

  // Tariffe produzione
  const tProd=document.getElementById('tbody-tariffe-prod');
  if(tProd)tProd.innerHTML=(tp||[]).map(t=>`<tr>
    <td>${nomeTipoProd(t.ID_TipoProduzione)}</td>
    <td><strong>${fmtEuro(t.Tariffa)}</strong></td>
    <td>${t.TipoGiorno||'Tutti'}</td>
    <td>${t.TipoTurno||'Tutti'}</td>
    <td>${t.DataInizio||'—'}</td>
    <td>${t.DataFine||'<span style="color:var(--verde);font-weight:700;">In vigore</span>'}</td>
    <td><button class="btn br bsm" onclick="chiudiTariffaProd(${t.ID_Tariffa})">Chiudi</button></td>
  </tr>`).join('')||'<tr><td colspan="7" class="empty">Nessuna tariffa</td></tr>';

  // Costi mezzi
  const tMezzi=document.getElementById('tbody-mezzi');
  if(tMezzi)tMezzi.innerHTML=(cm||[]).map(c=>`<tr>
    <td><span class="pill py">${nomeRep(c.ID_Reparto)}</span></td>
    <td><strong>${fmtEuro(c.CostoGiornaliero)}</strong></td>
    <td>${c.DataInizio||'—'}</td>
    <td>${c.DataFine||'<span style="color:var(--verde);font-weight:700;">In vigore</span>'}</td>
    <td><button class="btn br bsm" onclick="chiudiCostoMezzo(${c.ID_CostoMezzo})">Chiudi</button></td>
  </tr>`).join('')||'<tr><td colspan="5" class="empty">Nessun dato</td></tr>';
}

async function salvaTariffaEco(){
  const ID_Contratto=document.getElementById('te-cont').value;
  const TariffaOrdinaria=parseFloat(document.getElementById('te-ord').value);
  const TariffaNotturna=parseFloat(document.getElementById('te-not').value);
  const TariffaFestiva=parseFloat(document.getElementById('te-fes').value);
  const TariffaNotteFestiva=parseFloat(document.getElementById('te-nf').value);
  const DataInizio=document.getElementById('te-dal').value;
  if(!ID_Contratto||!TariffaOrdinaria||!DataInizio){toast('Compila tutti i campi','err');return;}
  // chiudi quella corrente per lo stesso contratto
  await sb.from('TariffeEconomia').update({DataFine:DataInizio}).eq('ID_Contratto',ID_Contratto).is('DataFine',null);
  await sb.from('TariffeEconomia').insert({ID_Contratto,TariffaOrdinaria,TariffaNotturna,TariffaFestiva,TariffaNotteFestiva,DataInizio});
  toast('✔ Tariffa economia aggiornata');
  caricaTariffe();
}

async function chiudiTariffaEco(id){
  if(!confirm('Chiudere questa tariffa? Rimarrà nello storico.'))return;
  await sb.from('TariffeEconomia').update({DataFine:oggi()}).eq('ID_TariffaE',id);
  toast('Chiusa','warn');caricaTariffe();
}

async function aggiornaLivello(id, idContratto, nomeLivello){
  const val=parseFloat(document.getElementById('lv-new-'+id).value);
  const dal=document.getElementById('lv-dal-'+id).value;
  if(!val||!dal){toast('Inserisci nuovo valore e data inizio','err');return;}
  // chiudi il livello corrente
  await sb.from('Livelli').update({DataFine:dal}).eq('ID_Livello',id);
  // crea nuovo livello
  const{error}=await sb.from('Livelli').insert({ID_Contratto:idContratto,NomeLivello:nomeLivello,CostoOrarioBase:val,DataInizio:dal});
  if(error){toast('Errore: '+error.message,'err');return;}
  // aggiorna _livelli in memoria
  await caricaDatiBase();
  toast('✔ Livello aggiornato con storico');
  caricaTariffe();
}

async function salvaTariffaProd(){
  const ID_TipoProduzione=document.getElementById('tp-tipo').value;
  const Tariffa=parseFloat(document.getElementById('tp-tar').value);
  const TipoGiorno=document.getElementById('tp-giorno').value;
  const TipoTurno=document.getElementById('tp-turno').value;
  const DataInizio=document.getElementById('tp-dal').value;
  if(!ID_TipoProduzione||!Tariffa||!DataInizio){toast('Compila tutti i campi','err');return;}
  // chiudi quella corrente stesso tipo/giorno/turno
  await sb.from('TariffeProduzione').update({DataFine:DataInizio})
    .eq('ID_TipoProduzione',ID_TipoProduzione).eq('TipoGiorno',TipoGiorno).eq('TipoTurno',TipoTurno).is('DataFine',null);
  await sb.from('TariffeProduzione').insert({ID_TipoProduzione,Tariffa,DataInizio,TipoGiorno,TipoTurno});
  toast('✔ Tariffa produzione aggiornata');caricaTariffe();

async function eliminaUtente(u){
  if(u===ME.username){alert('Non puoi eliminare il tuo account.');return;}
  if(!confirm(`Eliminare utente ${u}?`))return;
  await sb.from('Utenti').delete().eq('Username',u);
  toast('Eliminato','warn');showTab('tconf');
}

async function avviaImport(){
  const fileInput=document.getElementById('imp-file');
  const log=document.getElementById('imp-log');
  if(!fileInput||!fileInput.files.length){log.innerHTML='<span style="color:var(--rosso);">Seleziona il file Excel.</span>';return;}
  if(!confirm('ATTENZIONE: questa operazione svuota e reimporta TurniGiornalieri e BattesimiTurno. Continuare?'))return;

  const addLog=(msg,col='')=>{ log.innerHTML+=`<div style="color:${col};">${msg}</div>`; };
  log.innerHTML='';
  addLog('📂 Lettura file Excel...');

  // Read Excel with SheetJS
  const file=fileInput.files[0];
  const buf=await file.arrayBuffer();
  const wb=XLSX.read(buf,{type:'array',cellDates:true});

  // Find sheets
  const sheetTurni=wb.SheetNames.find(n=>n.toUpperCase().includes('TURNI')&&!n.toUpperCase().includes('BATTESI'));
  const sheetBats=wb.SheetNames.find(n=>n.toUpperCase().includes('BATTESI'));
  if(!sheetTurni||!sheetBats){addLog('❌ Fogli non trovati. Verifica che il file abbia i fogli "TBL TURNI" e "TBL BATTESIMI TURNO".','var(--rosso)');return;}

  const rawTurni=XLSX.utils.sheet_to_json(wb.Sheets[sheetTurni],{defval:null});
  const rawBats=XLSX.utils.sheet_to_json(wb.Sheets[sheetBats],{defval:null});
  addLog(`📊 Letti: ${rawTurni.length} turni, ${rawBats.length} battesimi`);

  // Clean turni: exclude null ID_Dipendente or null DataInizio
  const turniPuliti=rawTurni.filter(r=>r.ID_Turno&&r.ID_Dipendente&&r.DataInizio).map(r=>{
    // Format date as YYYY-MM-DD
    let d=r.DataInizio;
    if(d instanceof Date)d=d.toISOString().slice(0,10);
    else if(typeof d==='string')d=d.slice(0,10);
    // Format times
    const fmtTime=(t)=>{
      if(!t)return null;
      if(t instanceof Date)return t.toTimeString().slice(0,5);
      return String(t).slice(0,5);
    };
    return {
      ID_Turno:Number(r.ID_Turno),
      ID_Dipendente:Number(r.ID_Dipendente),
      DataInizio:d,
      OraInizio:fmtTime(r.OraInizio),
      OraFine:fmtTime(r.OraFine),
      Ore_A:Number(r.Ore_A)||0,
      Ore_B:Number(r.Ore_B)||0,
      OreNotte_A:Number(r.OreNotte_A)||0,
      OreNotte_B:Number(r.OreNotte_B)||0,
      OreFestive_A:Number(r.OreFestive_A)||0,
      OreFestive_B:Number(r.OreFestive_B)||0,
      OreNotteFestive_A:Number(r.OreNotteFestive_A)||0,
      OreNotteFestive_B:Number(r.OreNotteFestive_B)||0
    };
  });

  // Clean battesimi: exclude ID_Reparto=0 or ID_Attivita=0 or null
  const batsPuliti=rawBats.filter(r=>r.ID_Battesimo&&r.ID_Turno&&Number(r.ID_Reparto)>0&&Number(r.ID_Attivita)>0).map(r=>({
    ID_Battesimo:Number(r.ID_Battesimo),
    ID_Turno:Number(r.ID_Turno),
    OrdineRiga:Number(r.OrdineRiga)||1,
    OreBattezzate:Number(r.OreBattezzate)||0,
    OreNotturne:Number(r.OreNotturne)||0,
    ID_Reparto:Number(r.ID_Reparto),
    ID_Attivita:Number(r.ID_Attivita),
    Note:r.Note||''
  }));

  const exclTurni=rawTurni.length-turniPuliti.length;
  const exclBats=rawBats.length-batsPuliti.length;
  addLog(`🧹 Esclusi: ${exclTurni} turni (ID nullo), ${exclBats} battesimi (reparto/attività 0 o nulli)`,'var(--arancio)');
  addLog(`✅ Da importare: ${turniPuliti.length} turni, ${batsPuliti.length} battesimi`);

  // STEP 1: Delete BattesimiTurno first (FK dependency)
  addLog('🗑 Svuotamento BattesimiTurno...');
  const{error:e1}=await sb.from('BattesimiTurno').delete().gte('ID_Battesimo',0);
  if(e1){addLog('❌ Errore svuotamento BattesimiTurno: '+e1.message,'var(--rosso)');return;}
  addLog('✔ BattesimiTurno svuotata','var(--verde)');

  // STEP 2: Delete TurniGiornalieri
  addLog('🗑 Svuotamento TurniGiornalieri...');
  const{error:e2}=await sb.from('TurniGiornalieri').delete().gte('ID_Turno',0);
  if(e2){addLog('❌ Errore svuotamento TurniGiornalieri: '+e2.message,'var(--rosso)');return;}
  addLog('✔ TurniGiornalieri svuotata','var(--verde)');

  // STEP 3: Insert TurniGiornalieri in chunks of 500
  addLog('⬆ Importazione turni...');
  const CHUNK=500;
  for(let i=0;i<turniPuliti.length;i+=CHUNK){
    const chunk=turniPuliti.slice(i,i+CHUNK);
    const{error:e3}=await sb.from('TurniGiornalieri').insert(chunk);
    if(e3){addLog(`❌ Errore inserimento turni (blocco ${Math.floor(i/CHUNK)+1}): ${e3.message}`,'var(--rosso)');return;}
    addLog(`  → Turni ${i+1}–${Math.min(i+CHUNK,turniPuliti.length)} inseriti`);
  }
  addLog(`✔ ${turniPuliti.length} turni importati`,'var(--verde)');

  // STEP 4: Insert BattesimiTurno in chunks of 500
  addLog('⬆ Importazione battesimi...');
  for(let i=0;i<batsPuliti.length;i+=CHUNK){
    const chunk=batsPuliti.slice(i,i+CHUNK);
    const{error:e4}=await sb.from('BattesimiTurno').insert(chunk);
    if(e4){addLog(`❌ Errore inserimento battesimi (blocco ${Math.floor(i/CHUNK)+1}): ${e4.message}`,'var(--rosso)');return;}
    addLog(`  → Battesimi ${i+1}–${Math.min(i+CHUNK,batsPuliti.length)} inseriti`);
  }
  addLog(`✔ ${batsPuliti.length} battesimi importati`,'var(--verde)');
  addLog('🎉 Importazione completata con successo!','var(--verde)');
  toast('✔ Importazione completata');
}

async function exportCSV(tipo){
  const dal=document.getElementById('e-dal')?.value||'';
  const al=document.getElementById('e-al')?.value||'';
  let qgg=sb.from('TurniGiornalieri').select('*').order('DataInizio');
  if(dal)qgg=qgg.gte('DataInizio',dal);
  if(al)qgg=qgg.lte('DataInizio',al);
  const{data:ggs}=await qgg;
  const{data:bats}=await sb.from('BattesimiTurno').select('*');
  const{data:prods}=await sb.from('ProduzioneReparti').select('*');
  const{data:prodOp}=await sb.from('ProduzioneOperatori').select('*');
  let csv='',nome='';

  if(tipo==='turni'){
    nome='TURNI.csv';
    csv='ID_Turno;ID_Dipendente;Nome;DataInizio;OraInizio;OraFine;Ore_A;Ore_B\n';
    csv+=(ggs||[]).map(g=>[g.ID_Turno,g.ID_Dipendente,nomeDip(g.ID_Dipendente),g.DataInizio,g.OraInizio||'',g.OraFine||'',g.Ore_A||0,g.Ore_B||0].join(';')).join('\n');
  } else if(tipo==='batt'){
    nome='BATTESIMI.csv';
    csv='ID_Battesimo;ID_Turno;ID_Dipendente;Nome;DataInizio;OrdineRiga;ID_Reparto;NomeReparto;ID_Attivita;NomeAttivita;OreBattezzate;Note\n';
    csv+=(bats||[]).map(b=>{
      const g=(ggs||[]).find(x=>x.ID_Turno===b.ID_Turno);
      if(dal&&g?.DataInizio<dal)return null;
      if(al&&g?.DataInizio>al)return null;
      return [b.ID_Battesimo,b.ID_Turno,g?.ID_Dipendente||'',nomeDip(g?.ID_Dipendente),g?.DataInizio||'',b.OrdineRiga,b.ID_Reparto,nomeRep(b.ID_Reparto),b.ID_Attivita,nomeAtt(b.ID_Attivita),b.OreBattezzate,b.Note||''].join(';');
    }).filter(Boolean).join('\n');
  } else if(tipo==='prod'){
    nome='PRODUZIONE_REPARTI.csv';
    csv='DataProduzione;ID_Reparto;NomeReparto;ID_TipoProduzione;TipoProduzione;UnitaMisura;Quantita;Turno\n';
    const{data:tipi}=await sb.from('TipiProduzione').select('*');
    csv+=(prods||[]).filter(p=>(!dal||p.DataProduzione>=dal)&&(!al||p.DataProduzione<=al)).map(p=>{
      const t=tipi?.find(x=>x.ID_TipoProduzione==p.ID_TipoProduzione);
      return [p.DataProduzione,p.ID_Reparto,nomeRep(p.ID_Reparto),p.ID_TipoProduzione,t?.TipoProduzione||'',t?.UnitaMisura||'',p.Quantita,p.Notturno?'Notturno':'Diurno'].join(';');
    }).join('\n');
  } else if(tipo==='prodop'){
    nome='PRODUZIONE_OPERATORI.csv';
    csv='DataProduzione;CodiceVoice;ID_Dipendente;NomeDipendente;ID_Attivita;NomeAttivita;Colli\n';
    csv+=(prodOp||[]).filter(p=>(!dal||p.DataProduzione>=dal)&&(!al||p.DataProduzione<=al)).map(p=>{
      const d=_dips.find(x=>x.CodiceVoice==p.CodiceVoice);
      return [p.DataProduzione,p.CodiceVoice,d?.ID_Dipendente||'',d?.Nome||'',p.ID_Attivita,nomeAtt(p.ID_Attivita),p.Colli].join(';');
    }).join('\n');
  } else {
    nome='COMPLETO.csv';
    csv='ID_Battesimo;ID_Turno;ID_Dipendente;Nome;DataInizio;OraInizio;OraFine;Ore_A;Ore_B;OrdineRiga;ID_Reparto;NomeReparto;ID_Attivita;NomeAttivita;OreBattezzate;Note\n';
    csv+=(bats||[]).map(b=>{
      const g=(ggs||[]).find(x=>x.ID_Turno===b.ID_Turno);
      if(!g)return null;
      if(dal&&g.DataInizio<dal)return null;
      if(al&&g.DataInizio>al)return null;
      return [b.ID_Battesimo,b.ID_Turno,g.ID_Dipendente,nomeDip(g.ID_Dipendente),g.DataInizio,g.OraInizio||'',g.OraFine||'',g.Ore_A||0,g.Ore_B||0,b.OrdineRiga,b.ID_Reparto,nomeRep(b.ID_Reparto),b.ID_Attivita,nomeAtt(b.ID_Attivita),b.OreBattezzate,b.Note||''].join(';');
    }).filter(Boolean).join('\n');
  }
  const blob=new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8;'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=nome;a.click();
  toast('✔ Download avviato');
}

async function salvaReparto(){
  const nome=document.getElementById('rep-nome').value.trim();

  const{error}=await sb.from('Reparti').insert({NomeReparto:nome});
  if(error){toast('Errore: '+error.message,'err');return;}
  toast('Reparto aggiunto');
  document.getElementById('rep-nome').value='';
  await caricaDatiBase();
  await caricaTariffe();
}

async function salvaDipendente(){
  const nome=document.getElementById('dp-nome').value.trim();
  const voice=parseInt(document.getElementById('dp-voice').value);
  const id_c=parseInt(document.getElementById('dp-cont').value);
  const id_l=parseInt(document.getElementById('dp-lv').value);
  const attivo=document.getElementById('dp-attivo').value==='true';
  if(!nome||!voice){toast('Nome e CodiceVoice obbligatori','err');return;}
  const{error}=await sb.from('Dipendenti').insert({Nome:nome,CodiceVoice:voice,ID_Contratto:id_c,ID_Livello:id_l,Attivo:attivo});
  if(error){toast('Errore: '+error.message,'err');return;}
  toast('Dipendente aggiunto');
  document.getElementById('dp-nome').value='';
  document.getElementById('dp-voice').value='';
  await caricaDatiBase();
  await renderConfig();
}

async function editDipendente(id){
  const dip=_dips.find(d=>d.ID_Dipendente==id)||(await sb.from('Dipendenti').select('*').eq('ID_Dipendente',id).single()).data;
  if(!dip)return;
  const nuovoNome=prompt('Nome:',dip.Nome);
  if(nuovoNome===null)return;
  const nuovoVoice=prompt('Codice Voice:',dip.CodiceVoice);
  if(nuovoVoice===null)return;
  const{error}=await sb.from('Dipendenti').update({Nome:nuovoNome,CodiceVoice:parseInt(nuovoVoice)}).eq('ID_Dipendente',id);
  if(error){toast('Errore: '+error.message,'err');return;}
  toast('Dipendente aggiornato');
  await caricaDatiBase();
  await renderConfig();
}

async function toggleDipendente(id,attuale){
  const nuovoStato=!attuale;
  const{error}=await sb.from('Dipendenti').update({Attivo:nuovoStato}).eq('ID_Dipendente',id);
  if(error){toast('Errore: '+error.message,'err');return;}
  toast(nuovoStato?'Dipendente attivato':'Dipendente disattivato');
  await caricaDatiBase();
  await renderConfig();
}
