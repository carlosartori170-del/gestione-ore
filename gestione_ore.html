    const d=new Date(dateStr+'T00:00:00');
    d.setDate(d.getDate()+days);
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  }
  const dalExt=dal?addDays(dal,-2):null;
  const alExt=al?addDays(al,1):null;

  // Carica turni (con orari, necessari per il calcolo algebrico delle fasce)
  let ggs=[];
  {
    let lastId=0;
    while(true){
      let q=sb.from('TurniGiornalieri').select('ID_Turno,ID_Dipendente,DataInizio,OraInizio,OraFine')
        .eq('ID_Magazzino',MAGAZZINO_ATTIVO)
        .gt('ID_Turno',lastId).order('ID_Turno',{ascending:true}).limit(1000);
      if(dalExt)q=q.gte('DataInizio',dalExt);
      if(alExt)q=q.lte('DataInizio',alExt);
      const{data:batch,error}=await q;
      if(error||!batch||!batch.length)break;
      ggs=[...ggs,...batch];
      if(batch.length<1000)break;
      lastId=batch[batch.length-1].ID_Turno;
    }
  }
  if(!ggs.length){cont.innerHTML='<div class="empty">Nessun dato nel periodo selezionato.</div>';return;}

  const turnoById={};
  ggs.forEach(g=>turnoById[g.ID_Turno]=g);
  const idTurni=ggs.map(g=>g.ID_Turno);

  // Mappa dipendente -> contratto (usa _dips già caricati in memoria)
  const contrattoByDip={};
  _dips.forEach(d=>{if(d.ID_Contratto)contrattoByDip[d.ID_Dipendente]=d.ID_Contratto;});

  // Carica TUTTI i battesimi dei turni (serve l'ordine completo per calcolare gli offset nel turno)
  let batsAllTurno=[];
  {
    const chunkSize=500;
    const chunks=[];
    for(let i=0;i<idTurni.length;i+=chunkSize)chunks.push(idTurni.slice(i,i+chunkSize));
    const results=await Promise.all(chunks.map(chunk=>
      sb.from('BattesimiTurno').select('ID_Turno,ID_Reparto,ID_Attivita,OreBattezzate,OrdineRiga').in('ID_Turno',chunk)
    ));
    results.forEach(({data})=>{if(data&&data.length)batsAllTurno=[...batsAllTurno,...data];});
  }
  if(!batsAllTurno.length){cont.innerHTML='<div class="empty">Nessun risultato per i filtri selezionati.</div>';return;}

  // Raggruppa per turno in ordine cronologico (necessario per il calcolo algebrico)
  const batsByTurno={};
  batsAllTurno.forEach(b=>{if(!batsByTurno[b.ID_Turno])batsByTurno[b.ID_Turno]=[];batsByTurno[b.ID_Turno].push(b);});
  Object.values(batsByTurno).forEach(arr=>arr.sort((a,b)=>a.OrdineRiga-b.OrdineRiga));

  // Aggrega per GIORNO: ore diurne/notturne totali + suddivise per contratto, dipendenti coinvolti
  // Se è selezionato UN SOLO reparto, aggrega anche per GIORNO+ATTIVITÀ (vista di dettaglio).
  const repSingolo=freps.length===1?freps[0]:null;
  const perGiorno={};
  const perGiornoAttivita={}; // chiave: "data|ID_Attivita" -> {ore, data, idAttivita}
  Object.entries(batsByTurno).forEach(([idTurnoStr,bats])=>{
    const turno=turnoById[idTurnoStr];
    if(!turno)return;
    const idContratto=contrattoByDip[turno.ID_Dipendente]||null;
    bats.forEach((bat,idx)=>{
      if(freps.length && !freps.includes(String(bat.ID_Reparto)))return;
      if(fatts.length && !fatts.includes(String(bat.ID_Attivita)))return;
      const giorniCoinvolti=_giorniDelBattesimo(turno,bats,idx);
      giorniCoinvolti.forEach(({data,oreGiorno,oreNotte})=>{
        if(dal&&data<dal)return;
        if(al&&data>al)return;
        if(!perGiorno[data])perGiorno[data]={diurne:0,notturne:0,dipendenti:new Set(),perContratto:{}};
        perGiorno[data].diurne+=oreGiorno;
        perGiorno[data].notturne+=oreNotte;
        if(turno.ID_Dipendente)perGiorno[data].dipendenti.add(turno.ID_Dipendente);
        if(idContratto){
          if(!perGiorno[data].perContratto[idContratto])perGiorno[data].perContratto[idContratto]={diurne:0,notturne:0};
          perGiorno[data].perContratto[idContratto].diurne+=oreGiorno;
          perGiorno[data].perContratto[idContratto].notturne+=oreNotte;
        }
        if(repSingolo){
          const k=data+'|'+bat.ID_Attivita;
          if(!perGiornoAttivita[k])perGiornoAttivita[k]={data,idAttivita:bat.ID_Attivita,diurne:0,notturne:0,dipendenti:new Set(),perContratto:{}};
          perGiornoAttivita[k].diurne+=oreGiorno;
          perGiornoAttivita[k].notturne+=oreNotte;
          if(turno.ID_Dipendente)perGiornoAttivita[k].dipendenti.add(turno.ID_Dipendente);
          if(idContratto){
            if(!perGiornoAttivita[k].perContratto[idContratto])perGiornoAttivita[k].perContratto[idContratto]={diurne:0,notturne:0};
            perGiornoAttivita[k].perContratto[idContratto].diurne+=oreGiorno;
            perGiornoAttivita[k].perContratto[idContratto].notturne+=oreNotte;
          }
        }
      });
    });
  });

  const giorni=Object.keys(perGiorno).sort();
  if(!giorni.length){cont.innerHTML='<div class="empty">Nessun risultato per i filtri selezionati.</div>';return;}

  const totDiurne=giorni.reduce((a,d)=>a+perGiorno[d].diurne,0);
  const totNotturne=giorni.reduce((a,d)=>a+perGiorno[d].notturne,0);
  const totOre=totDiurne+totNotturne;
  const tuttiDip=new Set();
  giorni.forEach(d=>perGiorno[d].dipendenti.forEach(x=>tuttiDip.add(x)));

  // Lista contratti effettivamente presenti nei dati, ordinati per ID per coerenza colonne
  const contrattiUsati=_contratti.filter(c=>
    giorni.some(d=>perGiorno[d].perContratto[c.ID_Contratto])
  ).sort((a,b)=>a.ID_Contratto-b.ID_Contratto);

  // Intestazioni compatte: riga sopra = nome contratto (colspan 2), riga sotto = Diu./Not.
  const headerContrattiTop=contrattiUsati.map(c=>
    `<th colspan="2" style="text-align:center;border-left:2px solid var(--bordo);">${c.NomeContratto}</th>`).join('');
  const headerContrattiSub=contrattiUsati.map(c=>
    `<th style="border-left:2px solid var(--bordo);">Diu.</th><th>Not.</th>`).join('');

  const righe=giorni.map(d=>{
    const v=perGiorno[d];
    const tot=v.diurne+v.notturne;
    const celleContratti=contrattiUsati.map(c=>{
      const cc=v.perContratto[c.ID_Contratto]||{diurne:0,notturne:0};
      return `<td style="border-left:2px solid var(--bordo);">${fmtN(cc.diurne,1)}</td><td>${fmtN(cc.notturne,1)}</td>`;
    }).join('');
    return `<tr>
      <td>${fmtDataIT(d)}</td>
      <td><strong>${fmtN(tot,1)}</strong></td>
      <td>${fmtN(v.diurne,1)}</td>
      <td>${fmtN(v.notturne,1)}</td>
      ${celleContratti}
      <td>${v.dipendenti.size}</td>
    </tr>`;
  }).join('');

  // Totali per contratto (per il footer)
  const totPerContratto={};
  contrattiUsati.forEach(c=>{
    totPerContratto[c.ID_Contratto]={diurne:0,notturne:0};
    giorni.forEach(d=>{
      const cc=perGiorno[d].perContratto[c.ID_Contratto];
      if(cc){totPerContratto[c.ID_Contratto].diurne+=cc.diurne;totPerContratto[c.ID_Contratto].notturne+=cc.notturne;}
    });
  });
  const footerContratti=contrattiUsati.map(c=>{
    const t=totPerContratto[c.ID_Contratto];
    return `<td style="border-left:2px solid var(--bordo);">${fmtN(t.diurne,1)}</td><td>${fmtN(t.notturne,1)}</td>`;
  }).join('');

  const riepilogoContrattiHtml=contrattiUsati.map(c=>{
    const t=totPerContratto[c.ID_Contratto];
    return `<div style="margin-top:4px;">${c.NomeContratto} — Diurne: <strong style="color:var(--verde);">${fmtN(t.diurne,2)}h</strong> · Notturne: <strong style="color:var(--blu);">${fmtN(t.notturne,2)}h</strong></div>`;
  }).join('');

  // Vista di dettaglio Data+Attività (solo se è selezionato un singolo reparto):
  // una riga per ogni combinazione Data+Attività, con ore Diu./Not. totali e suddivise per contratto
  // (stesse colonne contratto della tabella aggregata sopra, per coerenza).
  let dettaglioAttivitaHtml='';
  if(repSingolo){
    const chiavi=Object.keys(perGiornoAttivita).sort((a,b)=>{
      const[da,ia]=a.split('|'),[db,ib]=b.split('|');
      if(da!==db)return da.localeCompare(db);
      return nomeAtt(ia).localeCompare(nomeAtt(ib));
    });
    const righeDett=chiavi.map(k=>{
      const v=perGiornoAttivita[k];
      const tot=v.diurne+v.notturne;
      const celleContrattiDett=contrattiUsati.map(c=>{
        const cc=v.perContratto[c.ID_Contratto]||{diurne:0,notturne:0};
        return `<td style="border-left:2px solid var(--bordo);">${fmtN(cc.diurne,1)}</td><td>${fmtN(cc.notturne,1)}</td>`;
      }).join('');
      return `<tr>
        <td>${fmtDataIT(v.data)}</td>
        <td><span class="pill pg">${nomeAtt(v.idAttivita)}</span></td>
        <td><strong>${fmtN(tot,1)}</strong></td>
        <td>${fmtN(v.diurne,1)}</td>
        <td>${fmtN(v.notturne,1)}</td>
        ${celleContrattiDett}
        <td>${v.dipendenti.size}</td>
      </tr>`;
    }).join('');
    dettaglioAttivitaHtml=`
    <div class="card" style="margin-top:14px;">
      <div class="ct">Dettaglio per Data + Attività — ${nomeRep(repSingolo)} <span style="font-weight:400;font-size:0.74rem;color:var(--grigio);">(una riga per ogni giorno in cui è stata svolta l'attività; ore in formato decimale)</span></div>
      <div class="tw" style="overflow-x:auto;"><table style="font-size:0.76rem;white-space:nowrap;">
        <thead>
          <tr>
            <th rowspan="2" style="vertical-align:bottom;">Data</th>
            <th rowspan="2" style="vertical-align:bottom;">Attività</th>
            <th rowspan="2" style="vertical-align:bottom;">Tot.</th>
            <th rowspan="2" style="vertical-align:bottom;">Diu.</th>
            <th rowspan="2" style="vertical-align:bottom;">Not.</th>
            ${headerContrattiTop}
            <th rowspan="2" style="vertical-align:bottom;">Dip.</th>
          </tr>
          <tr>${headerContrattiSub}</tr>
        </thead>
        <tbody>${righeDett||`<tr><td colspan="${6+contrattiUsati.length*2}" class="empty">Nessun dato</td></tr>`}</tbody>
      </table></div>
    </div>`;
  }

  cont.innerHTML=`
  <div class="card" style="margin-bottom:14px;background:var(--sfondo);">
    <div style="font-size:0.85rem;color:var(--grigio);">Giorni trovati: <strong>${giorni.length}</strong> | Dipendenti coinvolti: <strong>${tuttiDip.size}</strong></div>
    <div style="font-size:1.6rem;font-weight:800;color:var(--verde);margin-top:4px;">${fmtN(totOre,2)}h <span style="font-size:0.85rem;font-weight:500;color:var(--grigio);">ore totali nel periodo</span></div>
    <div style="font-size:0.95rem;color:var(--grigio);margin-top:6px;">
      Diurne: <strong style="color:var(--verde);">${fmtN(totDiurne,2)}h</strong> &nbsp;|&nbsp;
      Notturne: <strong style="color:var(--blu);">${fmtN(totNotturne,2)}h</strong>
    </div>
    ${riepilogoContrattiHtml?`<div style="font-size:0.85rem;color:var(--grigio);margin-top:8px;border-top:1px solid var(--bordo);padding-top:8px;">${riepilogoContrattiHtml}</div>`:''}
  </div>
  <div class="card">
    <div class="ct">Dettaglio per giorno <span style="font-weight:400;font-size:0.74rem;color:var(--grigio);">(ore in formato decimale, es. 1.5 = 1h30)</span></div>
    <div class="tw" style="overflow-x:auto;"><table style="font-size:0.76rem;white-space:nowrap;">
      <thead>
        <tr>
          <th rowspan="2" style="vertical-align:bottom;">Data</th>
          <th rowspan="2" style="vertical-align:bottom;">Tot.</th>
          <th rowspan="2" style="vertical-align:bottom;">Diu.</th>
          <th rowspan="2" style="vertical-align:bottom;">Not.</th>
          ${headerContrattiTop}
          <th rowspan="2" style="vertical-align:bottom;">Dip.</th>
        </tr>
        <tr>${headerContrattiSub}</tr>
      </thead>
      <tbody>${righe}</tbody>
      <tfoot><tr style="background:var(--sfondo);font-weight:800;">
        <td style="text-align:right;">TOT</td>
        <td>${fmtN(totOre,1)}</td>
        <td>${fmtN(totDiurne,1)}</td>
        <td>${fmtN(totNotturne,1)}</td>
        ${footerContratti}
        <td>${tuttiDip.size}</td>
      </tr></tfoot>
    </table></div>
  </div>
  ${dettaglioAttivitaHtml}`;
}

  <div class="card">
    <div class="ct">${ICO.tprodop} Filtri produttività operatori</div>

    </div>

  </div>
  <div id="po-content"><div class="empty" style="padding:32px;text-align:center;">Imposta i filtri e clicca "Filtra"</div></div>`;
}

async function filtraProduttivitaOperatori(){
  const dal=document.getElementById('po-dal')?.value||'';
  const al=document.getElementById('po-al')?.value||'';
  const fdip=document.getElementById('po-dip')?.value||'';
  const cont=document.getElementById('po-content');
  cont.innerHTML='<div class="loading">⏳ Caricamento...</div>';

  // 1. Colli per dipendente+giorno (da ProduzioneOperatori, collegato via CodiceVoice)
  let qpo=sb.from('ProduzioneOperatori').select('*').eq('ID_Magazzino',MAGAZZINO_ATTIVO);
  if(dal)qpo=qpo.gte('DataProduzione',dal);
  if(al)qpo=qpo.lte('DataProduzione',al);
  const{data:prodOp}=await qpo;

  if(!prodOp||!prodOp.length){cont.innerHTML='<div class="empty">Nessun dato di produzione operatori nel periodo selezionato.</div>';return;}

  // Mappa CodiceVoice -> Dipendente
  const dipByVoice={};
  _dips.forEach(d=>{if(d.CodiceVoice)dipByVoice[d.CodiceVoice]=d;});

  // 2. Ore Ventilazione Ortofrutta (att.15) per dipendente+giorno, dalla view già pronta
  let qb=sb.from('BattesimiConData').select('ID_Dipendente,DataInizio,OreBattezzate').eq('ID_Attivita',15).eq('ID_Magazzino',MAGAZZINO_ATTIVO);
  if(dal)qb=qb.gte('DataInizio',dal);
  if(al)qb=qb.lte('DataInizio',al);
  let oreAll=[];
  {
    let lastOff=0;
    while(true){
      const{data:batch,error}=await qb.range(lastOff,lastOff+999);
      if(error||!batch||!batch.length)break;
      oreAll=[...oreAll,...batch];
      if(batch.length<1000)break;
      lastOff+=1000;
    }
  }

  // Aggrega ore per dipendente+giorno
  const oreByDipGiorno={};
  oreAll.forEach(o=>{
    const k=o.ID_Dipendente+'|'+o.DataInizio;
    oreByDipGiorno[k]=(oreByDipGiorno[k]||0)+(o.OreBattezzate||0);
  });

  // Aggrega colli per dipendente+giorno (filtra per dipendente se richiesto)
  const righeDettaglio=[];
  const perDipendente={};
  prodOp.forEach(p=>{
    const dip=dipByVoice[p.CodiceVoice];
    if(!dip)return; // CodiceVoice non associato a nessun dipendente attivo
    if(fdip && dip.ID_Dipendente!=fdip)return;
    const k=dip.ID_Dipendente+'|'+p.DataProduzione;
    const ore=oreByDipGiorno[k]||0;
    righeDettaglio.push({data:p.DataProduzione,dip,colli:p.Colli||0,ore});
    if(!perDipendente[dip.ID_Dipendente])perDipendente[dip.ID_Dipendente]={nome:dip.Nome,colli:0,ore:0};
    perDipendente[dip.ID_Dipendente].colli+=p.Colli||0;
    perDipendente[dip.ID_Dipendente].ore+=ore;
  });

  if(!righeDettaglio.length){cont.innerHTML='<div class="empty">Nessun dato collegabile a dipendenti nel periodo selezionato (verifica i CodiceVoice in Configurazione).</div>';return;}

  righeDettaglio.sort((a,b)=>a.data.localeCompare(b.data)||a.dip.Nome.localeCompare(b.dip.Nome));

  const totColli=righeDettaglio.reduce((a,r)=>a+r.colli,0);
  const totOre=righeDettaglio.reduce((a,r)=>a+r.ore,0);

  const righeAgg=Object.values(perDipendente).sort((a,b)=>b.colli-a.colli).map(v=>`<tr>
    <td><strong>${v.nome}</strong></td>
    <td>${fmtN(v.colli,0)}</td>
    <td>${fmtN(v.ore,2)}h</td>
    <td><strong>${v.ore>0?fmtN(v.colli/v.ore,1):'—'}</strong></td>
  </tr>`).join('');

  const righeDett=righeDettaglio.map(r=>`<tr>
    <td>${fmtDataIT(r.data)}</td>
    <td>${r.dip.Nome}</td>
    <td>${fmtN(r.colli,0)}</td>
    <td>${fmtN(r.ore,2)}h</td>
    <td>${r.ore>0?fmtN(r.colli/r.ore,1):'—'}</td>
  </tr>`).join('');

  cont.innerHTML=`
  <div class="card" style="margin-bottom:14px;background:var(--sfondo);">
    <div style="font-size:0.85rem;color:var(--grigio);">Dipendenti coinvolti: <strong>${Object.keys(perDipendente).length}</strong> | Righe: <strong>${righeDettaglio.length}</strong></div>
    <div style="font-size:1.6rem;font-weight:800;color:var(--verde);margin-top:4px;">${totOre>0?fmtN(totColli/totOre,1):'—'} <span style="font-size:0.85rem;font-weight:500;color:var(--grigio);">colli/ora medio nel periodo</span></div>
    <div style="font-size:0.85rem;color:var(--grigio);margin-top:4px;">Colli totali: <strong>${fmtN(totColli,0)}</strong> · Ore totali: <strong>${fmtN(totOre,2)}h</strong></div>
  </div>
  <div class="card" style="margin-bottom:14px;">
    <div class="ct">Totali per dipendente <span style="font-weight:400;font-size:0.78rem;color:var(--grigio);">(periodo aggregato)</span></div>
    <div class="tw"><table>
      <thead><tr><th>Dipendente</th><th>Colli tot.</th><th>Ore tot.</th><th>Colli/ora</th></tr></thead>
      <tbody>${righeAgg}</tbody>
    </table></div>
  </div>
  <div class="card">
    <div class="ct">Dettaglio giornaliero <span style="font-weight:400;font-size:0.78rem;color:var(--grigio);">(${righeDettaglio.length} righe)</span></div>
    <div class="tw"><table>
      <thead><tr><th>Data</th><th>Dipendente</th><th>Colli</th><th>Ore</th><th>Colli/ora</th></tr></thead>
      <tbody>${righeDett}</tbody>
    </table></div>
  </div>`;
}

// ============================================================
// TAB: TABELLONE GIORNALIERO (visibile ad admin e responsabile)
// Vista a colpo d'occhio: dipendenti sulle righe, fasce da 15 minuti sulle colonne (00:00-24:00),
// colore per reparto. Mostra tutti i dipendenti attivi del magazzino, anche senza turno quel giorno.
// ============================================================
const _palettaReparti=['#2563eb','#16a34a','#d97706','#dc2626','#7c3aed','#0891b2','#db2777','#65a30d','#ea580c','#4338ca'];
function _coloreReparto(idReparto){
  // Colore stabile per ID_Reparto, scelto deterministicamente dalla palette (stesso reparto = sempre stesso colore)
  const idx=Number(idReparto)%_palettaReparti.length;
  return _palettaReparti[idx];
}

    <div class="brow" style="align-items:center;">

let _tgRigheCache=[]; // cache delle righe calcolate, per poter rifiltrare senza ricaricare dal DB

// Finestra di visualizzazione: 03:00 del giorno selezionato -> 07:00 del giorno successivo (28 ore = 112 slot da 15min)
const TG_ORIGINE_MIN=3*60; // 03:00 espresso in minuti dall'inizio del giorno selezionato
const TG_SLOTS=112; // 28h * 4 slot/ora

async function caricaTabelloneGiornaliero(){
  const data=document.getElementById('tg-data')?.value;
  const cont=document.getElementById('tg-content');
  if(!data){cont.innerHTML='<div class="empty">Seleziona una data.</div>';return;}
  cont.innerHTML='<div class="loading">⏳ Caricamento...</div>';

  const freps=getCkValues('tg-rep-ck');
  const fatts=getCkValues('tg-att-ck');
  aggCkLabel('tg-rep-trigger','tg-rep-ck','Tutti');
  aggCkLabel('tg-att-trigger','tg-att-ck','Tutte');

  function addDays(dateStr,days){
    const d=new Date(dateStr+'T00:00:00');
    d.setDate(d.getDate()+days);
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  }
  const dataPrec=addDays(data,-1);
  const dataSucc=addDays(data,1);

  // Dipendenti attivi del magazzino attivo
  const dipMagazzino=_dips.filter(d=>d.Attivo&&(d.Magazzini||[1]).includes(MAGAZZINO_ATTIVO)).sort((a,b)=>a.Nome.localeCompare(b.Nome));
  if(!dipMagazzino.length){cont.innerHTML='<div class="empty">Nessun dipendente attivo in questo magazzino.</div>';return;}

  // Carica turni che possono toccare la finestra 03:00(data)->07:00(data+1): turni con DataInizio
  // tra dataPrec e dataSucc (margine ampio per sicurezza sui notturni)
  const{data:ggs}=await sb.from('TurniGiornalieri').select('*').eq('ID_Magazzino',MAGAZZINO_ATTIVO)
    .gte('DataInizio',dataPrec).lte('DataInizio',dataSucc);

  const idTurni=(ggs||[]).map(g=>g.ID_Turno);
  let bats=[];
  if(idTurni.length){
    const chunkSize=300;
    const chunks=[];
    for(let i=0;i<idTurni.length;i+=chunkSize)chunks.push(idTurni.slice(i,i+chunkSize));
    const results=await Promise.all(chunks.map(chunk=>sb.from('BattesimiTurno').select('*').in('ID_Turno',chunk)));
    results.forEach(({data:d})=>{if(d&&d.length)bats=[...bats,...d];});
  }

  const batsByTurno={};
  bats.forEach(b=>{if(!batsByTurno[b.ID_Turno])batsByTurno[b.ID_Turno]=[];batsByTurno[b.ID_Turno].push(b);});
  Object.values(batsByTurno).forEach(arr=>arr.sort((a,b)=>a.OrdineRiga-b.OrdineRiga));

  function toMin(hhmm){if(!hhmm)return 0;const[h,m]=(hhmm||'00:00').split(':').map(Number);return h*60+m;}

  const righeTabellone=dipMagazzino.map(dip=>{
    const slots=new Array(TG_SLOTS).fill(null);
    let haTurno=false;
    const turniDip=(ggs||[]).filter(g=>g.ID_Dipendente===dip.ID_Dipendente);
    turniDip.forEach(turno=>{
      const bats=batsByTurno[turno.ID_Turno]||[];
      if(!turno.OraInizio||!bats.length)return;
      if(turno.DataInizio===data)haTurno=true; // conta come "ha turno" solo se inizia proprio in questa data
      let cur=toMin(turno.OraInizio);
      // offsetGiorni: quanti giorni (in minuti) separano l'inizio del turno dalla data selezionata
      let offsetGiorni;
      if(turno.DataInizio===data)offsetGiorni=0;
      else if(turno.DataInizio===dataPrec)offsetGiorni=-1440;
      else if(turno.DataInizio===dataSucc)offsetGiorni=1440;
      else{return;}
      bats.forEach(bat=>{
        const s=cur, e=cur+(bat.OreBattezzate||0)*60;
        cur=e;
        if(freps.length && !freps.includes(String(bat.ID_Reparto)))return;
        if(fatts.length && !fatts.includes(String(bat.ID_Attivita)))return;
        // Posizione assoluta in minuti rispetto alla data selezionata (mezzanotte=0)
        const segS=s+offsetGiorni, segE=e+offsetGiorni;
        // Sposta sull'origine della finestra: 03:00 del giorno selezionato = minuto TG_ORIGINE_MIN
        // La finestra visibile è [TG_ORIGINE_MIN, TG_ORIGINE_MIN+28*60) sulla scala assoluta
        const finestraS=TG_ORIGINE_MIN, finestraE=TG_ORIGINE_MIN+28*60;
        const visS=Math.max(finestraS,segS), visE=Math.min(finestraE,segE);
        if(visS>=visE)return;
        const slotStart=Math.floor((visS-finestraS)/15), slotEnd=Math.ceil((visE-finestraS)/15);
        for(let s2=slotStart;s2<slotEnd && s2<TG_SLOTS;s2++){
          if(s2>=0)slots[s2]={ID_Reparto:bat.ID_Reparto,nomeAtt:nomeAtt(bat.ID_Attivita),nomeRep:nomeRep(bat.ID_Reparto)};
        }
      });
    });
    return{dip,slots,haTurno};
  });

  _tgRigheCache={righe:righeTabellone,data,freps,fatts};
  renderTabelloneTabella();
}

function filtraRigheTabellone(){
  if(_tgRigheCache.righe)renderTabelloneTabella();
}

function renderTabelloneTabella(){
  const{righe:righeTabellone,data,freps,fatts}=_tgRigheCache;
  const cont=document.getElementById('tg-content');
  if(!cont||!righeTabellone)return;

  const soloConTurno=document.getElementById('tg-solo-turno')?.checked;
  const haFiltroAttivo=(freps&&freps.length)||(fatts&&fatts.length);

  let righeFiltrate=righeTabellone;
  if(soloConTurno)righeFiltrate=righeFiltrate.filter(r=>r.haTurno);
  // Se è attivo un filtro reparto/attività, mostra solo i dipendenti che hanno almeno
  // uno slot occupato corrispondente al filtro (gli altri vengono nascosti del tutto, non solo svuotati)
  if(haFiltroAttivo)righeFiltrate=righeFiltrate.filter(r=>r.slots.some(s=>s!==null));

  const SLOTS=TG_SLOTS;

  // Intestazioni orarie: la prima colonna corrisponde alle 03:00, ogni 4 slot un'ora intera
  const headerCelle=[];
  for(let s=0;s<SLOTS;s++){
    const minTot=TG_ORIGINE_MIN+s*15;
    const h=Math.floor(minTot/60)%24;
    const isOraIntera=minTot%60===0;
    headerCelle.push(`<th class="tg-th${isOraIntera?' tg-th-ora':''}">${isOraIntera?h:''}</th>`);
  }

  const righeHtml=righeFiltrate.map(({dip,slots})=>{
    let celle='';
    let i=0;
    while(i<SLOTS){
      const cur=slots[i];
      let j=i+1;
      while(j<SLOTS && JSON.stringify(slots[j])===JSON.stringify(cur))j++;
      const span=j-i;
      if(cur){
        const colore=_coloreReparto(cur.ID_Reparto);
        celle+=`<td colspan="${span}" class="tg-cell" style="background:${colore};" title="${cur.nomeRep} — ${cur.nomeAtt}">
          ${span>=5?`<span class="tg-label">${cur.nomeAtt}</span>`:''}
        </td>`;
      }else{
        celle+=`<td colspan="${span}" class="tg-cell-empty"></td>`;
      }
      i=j;
    }
    return `<tr><td class="tg-dipname">${dip.Nome}</td>${celle}</tr>`;
  }).join('');

  // Legenda colori reparto (solo i reparti effettivamente usati nella giornata, su tutte le righe non filtrate)
  const repartiUsati=new Set();
  righeTabellone.forEach(({slots})=>slots.forEach(s=>{if(s)repartiUsati.add(s.ID_Reparto);}));
  const legenda=[..._reparti].filter(r=>repartiUsati.has(r.ID_Reparto)).map(r=>
    `<span style="display:inline-flex;align-items:center;gap:5px;margin-right:14px;font-size:0.78rem;">
      <span style="width:12px;height:12px;border-radius:3px;background:${_coloreReparto(r.ID_Reparto)};display:inline-block;"></span>${r.NomeReparto}
    </span>`).join('');

  cont.innerHTML=`
  <div class="card" style="margin-bottom:14px;">
    <div style="font-size:0.85rem;color:var(--grigio);margin-bottom:8px;">Legenda reparti:</div>
    <div>${legenda||'<span style="color:var(--grigio);font-size:0.8rem;">Nessun turno in questa giornata</span>'}</div>
  </div>
  <div class="card">
    <div class="ct">${fmtDataIT(data)} — ${righeFiltrate.length} dipendenti${righeFiltrate.length!==righeTabellone.length?` (su ${righeTabellone.length} totali)`:''}</div>
    <div class="tw" style="overflow-x:auto;">
      <table class="tg-table">
        <thead><tr><th class="tg-dipname-header">Dipendente</th>${headerCelle.join('')}</tr></thead>
        <tbody>${righeHtml||'<tr><td class="tg-dipname" colspan="113" style="text-align:center;padding:14px;color:var(--grigio);">Nessun dipendente corrisponde ai filtri</td></tr>'}</tbody>
      </table>
    </div>
  </div>`;
}

async function scaricaBackupCompleto(){
  const msg=document.getElementById('backup-msg');
  msg.innerHTML='<div class="loading">⏳ Esportazione in corso, può richiedere qualche secondo...</div>';

  // Elenco di tutte le tabelle da esportare. Pagina con .range() (offset-based) — funziona
  // su qualsiasi tabella indipendentemente dal nome della chiave primaria, ed evita il
  // troncamento silenzioso che si verificava con tabelle prive di colonna di ordinamento esplicita.
  async function fetchAll(tableName){
    let all=[];
    let offset=0;
    const pageSize=1000;
    while(true){
      const{data,error}=await sb.from(tableName).select('*').range(offset,offset+pageSize-1);
      if(error){console.error(`Errore backup tabella ${tableName}:`,error);break;}
      if(!data||!data.length)break;
      all=[...all,...data];
      if(data.length<pageSize)break;
      offset+=pageSize;
    }
    return all;
  }

  try{
    const backup={
      data_backup:new Date().toISOString(),
      versione_app:'v73',
      Magazzini:await fetchAll('Magazzini'),
      Dipendenti:await fetchAll('Dipendenti'),
      Reparti:await fetchAll('Reparti'),
      Attivita:await fetchAll('Attivita'),
      Contratti:await fetchAll('Contratti'),
      Livelli:await fetchAll('Livelli'),
      TipiProduzione:await fetchAll('TipiProduzione'),
      TurniGiornalieri:await fetchAll('TurniGiornalieri'),
      BattesimiTurno:await fetchAll('BattesimiTurno'),
      BattesimiPreTurno:await fetchAll('BattesimiPreTurno'),
      ProduzioneReparti:await fetchAll('ProduzioneReparti'),
      ProduzioneOperatori:await fetchAll('ProduzioneOperatori'),
      TariffeEconomia:await fetchAll('TariffeEconomia'),
      TariffeProduzione:await fetchAll('TariffeProduzione'),
      CostiMezziReparti:await fetchAll('CostiMezziReparti'),
      Utenti:await fetchAll('Utenti')
    };

    const json=JSON.stringify(backup,null,2);
    const blob=new Blob([json],{type:'application/json'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');
    const oggi=new Date();
    const nomeFile=`backup_nexus_${oggi.getFullYear()}-${String(oggi.getMonth()+1).padStart(2,'0')}-${String(oggi.getDate()).padStart(2,'0')}.json`;
    a.href=url;a.download=nomeFile;
    document.body.appendChild(a);a.click();document.body.removeChild(a);
    URL.revokeObjectURL(url);

    const totRighe=Object.values(backup).filter(Array.isArray).reduce((a,arr)=>a+arr.length,0);
    msg.innerHTML=`<div class="alert aok">✔ Backup scaricato: ${nomeFile} (${totRighe} righe totali su tutte le tabelle)</div>`;
  }catch(e){
    msg.innerHTML=`<div class="alert aerr">Errore durante il backup: ${e.message}</div>`;
  }
}

async function controllaAnomalieTurni(){
  const cont=document.getElementById('anomalie-result');
  cont.innerHTML='<div class="loading">⏳ Controllo in corso...</div>';

  // Carica tutti i turni del magazzino attivo (paginato)
  let ggs=[];
  {
    let lastId=0;
    while(true){
      const{data:batch,error}=await sb.from('TurniGiornalieri').select('ID_Turno,ID_Dipendente,DataInizio,OraInizio,OraFine')
        .eq('ID_Magazzino',MAGAZZINO_ATTIVO).gt('ID_Turno',lastId).order('ID_Turno',{ascending:true}).limit(1000);
      if(error||!batch||!batch.length)break;
      ggs=[...ggs,...batch];
      if(batch.length<1000)break;
      lastId=batch[batch.length-1].ID_Turno;
    }
  }

  // Raggruppa per dipendente
  const perDip={};
  ggs.forEach(t=>{if(!t.OraInizio||!t.OraFine)return;if(!perDip[t.ID_Dipendente])perDip[t.ID_Dipendente]=[];perDip[t.ID_Dipendente].push(t);});

  function toAbsMin(dataStr,oraStr){
    const d=new Date(dataStr+'T00:00:00');
    const[h,m]=(oraStr||'00:00').split(':').map(Number);
    return Math.floor(d.getTime()/60000)+h*60+m;
  }

  const conflitti=[];
  Object.entries(perDip).forEach(([idDip,turni])=>{
    turni.sort((a,b)=>a.DataInizio.localeCompare(b.DataInizio));
    for(let i=0;i<turni.length;i++){
      const s1=toAbsMin(turni[i].DataInizio,turni[i].OraInizio);
      let e1=toAbsMin(turni[i].DataInizio,turni[i].OraFine);
      if(e1<=s1)e1+=24*60;
      for(let j=i+1;j<turni.length;j++){
        // Solo turni vicini nel tempo (entro 2 giorni) per evitare confronti inutili su tutto l'anno
        if(Math.abs(new Date(turni[j].DataInizio)-new Date(turni[i].DataInizio))>2*86400000)break;
        const s2=toAbsMin(turni[j].DataInizio,turni[j].OraInizio);
        let e2=toAbsMin(turni[j].DataInizio,turni[j].OraFine);
        if(e2<=s2)e2+=24*60;
        if(s1<e2 && s2<e1){
          conflitti.push({idDip,t1:turni[i],t2:turni[j]});
        }
      }
    }
  });

  if(!conflitti.length){
    cont.innerHTML='<div class="alert aok">✔ Nessuna sovrapposizione rilevata. Tutto pulito.</div>';
    return;
  }

  const righe=conflitti.map(c=>`<tr>
    <td>${nomeDip(c.idDip)}</td>
    <td>#${c.t1.ID_Turno} — ${fmtDataIT(c.t1.DataInizio)} ${c.t1.OraInizio}-${c.t1.OraFine}</td>
    <td>#${c.t2.ID_Turno} — ${fmtDataIT(c.t2.DataInizio)} ${c.t2.OraInizio}-${c.t2.OraFine}</td>
  </tr>`).join('');

  cont.innerHTML=`
  <div class="alert aerr" style="margin-bottom:10px;">⚠ Trovate ${conflitti.length} sovrapposizioni</div>
  <div class="tw"><table>
    <thead><tr><th>Dipendente</th><th>Turno A</th><th>Turno B</th></tr></thead>
    <tbody>${righe}</tbody>
  </table></div>`;
}

async function salvaTariffaEco(){
  const ID_Contratto=document.getElementById('te-cont').value;
  const TariffaOrdinaria=parseFloat(document.getElementById('te-ord').value);
  const TariffaNotturna=parseFloat(document.getElementById('te-not').value);
  const TariffaFestiva=parseFloat(document.getElementById('te-fes').value);
  const TariffaNotteFestiva=parseFloat(document.getElementById('te-nf').value);
  const DataInizio=document.getElementById('te-dal').value;
  if(!ID_Contratto||!TariffaOrdinaria||!DataInizio){toast('Compila tutti i campi','err');return;}
  // chiudi quella corrente per lo stesso contratto
  await sb.from('TariffeEconomia').update({DataFine:DataInizio}).eq('ID_Contratto',ID_Contratto).is('DataFine',null);
  await sb.from('TariffeEconomia').insert({ID_Contratto,TariffaOrdinaria,TariffaNotturna,TariffaFestiva,TariffaNotteFestiva,DataInizio});
  toast('✔ Tariffa economia aggiornata');
  caricaTariffe();
}

async function aggiornaLivello(id, idContratto, nomeLivello){

  if(!val||!dal){toast('Inserisci nuovo valore e data inizio','err');return;}
  // chiudi il livello corrente
  await sb.from('Livelli').update({DataFine:dal}).eq('ID_Livello',id);
  // crea nuovo livello
  const{error}=await sb.from('Livelli').insert({ID_Contratto:idContratto,NomeLivello:nomeLivello,CostoOrarioBase:val,DataInizio:dal});
  if(error){toast('Errore: '+error.message,'err');return;}
  // aggiorna _livelli in memoria
  await caricaDatiBase();
  toast('✔ Livello aggiornato con storico');

}

async function avviaImport(){
  const fileInput=document.getElementById('imp-file');
  const log=document.getElementById('imp-log');
  if(!fileInput||!fileInput.files.length){log.innerHTML='<span style="color:var(--rosso);">Seleziona il file Excel.</span>';return;}
  if(!confirm('ATTENZIONE: questa operazione svuota e reimporta TurniGiornalieri, BattesimiTurno e ProduzioneReparti. Continuare?'))return;

  const addLog=(msg,col='')=>{ log.innerHTML+=`<div style="color:${col};">${msg}</div>`; };
  log.innerHTML='';
  addLog('📂 Lettura file Excel...');

  // Read Excel with SheetJS
  const file=fileInput.files[0];
  const buf=await file.arrayBuffer();
  const wb=XLSX.read(buf,{type:'array',cellDates:true});

  // Find sheets
  const sheetTurni=wb.SheetNames.find(n=>n.toUpperCase().includes('TURNI')&&!n.toUpperCase().includes('BATTESI'));
  const sheetBats=wb.SheetNames.find(n=>n.toUpperCase().includes('BATTESI'));
  const sheetProd=wb.SheetNames.find(n=>n.toUpperCase().includes('PRODUZIONE')&&n.toUpperCase().includes('REPART'));
  if(!sheetTurni||!sheetBats){addLog('❌ Fogli non trovati. Verifica che il file abbia i fogli "TBL TURNI" e "TBL BATTESIMI TURNO".','var(--rosso)');return;}
  if(!sheetProd){addLog('⚠ Foglio "TBL PRODUZIONE REPARTI" non trovato — verrà saltato l\'aggiornamento della produzione.','var(--arancio)');}

  const rawTurni=XLSX.utils.sheet_to_json(wb.Sheets[sheetTurni],{defval:null});
  const rawBats=XLSX.utils.sheet_to_json(wb.Sheets[sheetBats],{defval:null});
  const rawProd=sheetProd?XLSX.utils.sheet_to_json(wb.Sheets[sheetProd],{defval:null}):[];
  addLog(`📊 Letti: ${rawTurni.length} turni, ${rawBats.length} battesimi, ${rawProd.length} produzioni`);

  // Clean turni: exclude null ID_Dipendente or null DataInizio
  const turniPuliti=rawTurni.filter(r=>r.ID_Turno&&r.ID_Dipendente&&r.DataInizio).map(r=>{
    // Format date as YYYY-MM-DD — usa data locale (non UTC) per evitare sfasamento fuso orario
    let d=r.DataInizio;
    if(d instanceof Date){
      const yy=d.getFullYear();
      const mm=String(d.getMonth()+1).padStart(2,'0');
      const dd=String(d.getDate()).padStart(2,'0');
      d=`${yy}-${mm}-${dd}`;
    } else if(typeof d==='string')d=d.slice(0,10);
    // Format times — usa ora locale
    const fmtTime=(t)=>{
      if(!t)return null;
      if(t instanceof Date){
        const hh=String(t.getHours()).padStart(2,'0');
        const mi=String(t.getMinutes()).padStart(2,'0');
        return `${hh}:${mi}`;
      }
      return String(t).slice(0,5);
    };
    return {
      ID_Turno:Number(r.ID_Turno),
      ID_Dipendente:Number(r.ID_Dipendente),
      DataInizio:d,
      OraInizio:fmtTime(r.OraInizio),
      OraFine:fmtTime(r.OraFine),
      Ore_A:Number(r.Ore_A)||0,
      Ore_B:Number(r.Ore_B)||0,
      OreNotte_A:Number(r.OreNotte_A)||0,
      OreNotte_B:Number(r.OreNotte_B)||0,
      OreFestive_A:Number(r.OreFestive_A)||0,
      OreFestive_B:Number(r.OreFestive_B)||0,
      OreNotteFestive_A:Number(r.OreNotteFestive_A)||0,
      OreNotteFestive_B:Number(r.OreNotteFestive_B)||0
    };
  });

  // Clean battesimi: exclude ID_Reparto=0 or ID_Attivita=0 or null
  const batsPuliti=rawBats.filter(r=>r.ID_Battesimo&&r.ID_Turno&&Number(r.ID_Reparto)>0&&Number(r.ID_Attivita)>0).map(r=>({
    ID_Battesimo:Number(r.ID_Battesimo),
    ID_Turno:Number(r.ID_Turno),
    OrdineRiga:Number(r.OrdineRiga)||1,
    OreBattezzate:Number(r.OreBattezzate)||0,
    OreNotturne:Number(r.OreNotturne)||0,
    ID_Reparto:Number(r.ID_Reparto),
    ID_Attivita:Number(r.ID_Attivita),
    Note:r.Note||''
  }));

  // Clean produzione: exclude null ID_Produzione, DataProduzione, ID_Reparto o ID_TipoProduzione
  const prodPuliti=rawProd.filter(r=>r.ID_Produzione&&r.DataProduzione&&r.ID_Reparto&&r.ID_TipoProduzione).map(r=>{
    let d=r.DataProduzione;
    if(d instanceof Date){
      const yy=d.getFullYear();
      const mm=String(d.getMonth()+1).padStart(2,'0');
      const dd=String(d.getDate()).padStart(2,'0');
      d=`${yy}-${mm}-${dd}`;
    } else if(typeof d==='string')d=d.slice(0,10);
    return {
      ID_Produzione:Number(r.ID_Produzione),
      DataProduzione:d,
      ID_Reparto:Number(r.ID_Reparto),
      ID_TipoProduzione:Number(r.ID_TipoProduzione),
      Quantita:Number(r.Quantita)||0,
      Notturno:!!r.Notturno
    };
  });

  const exclTurni=rawTurni.length-turniPuliti.length;
  const exclBats=rawBats.length-batsPuliti.length;
  const exclProd=rawProd.length-prodPuliti.length;
  addLog(`🧹 Esclusi: ${exclTurni} turni (ID nullo), ${exclBats} battesimi (reparto/attività 0 o nulli), ${exclProd} produzioni (dati nulli)`,'var(--arancio)');
  addLog(`✅ Da importare: ${turniPuliti.length} turni, ${batsPuliti.length} battesimi, ${prodPuliti.length} produzioni`);

  // STEP 1: Delete BattesimiTurno first (FK dependency)
  addLog('🗑 Svuotamento BattesimiTurno...');
  const{error:e1}=await sb.from('BattesimiTurno').delete().eq('ID_Magazzino',MAGAZZINO_ATTIVO);
  if(e1){addLog('❌ Errore svuotamento BattesimiTurno: '+e1.message,'var(--rosso)');return;}
  addLog('✔ BattesimiTurno svuotata','var(--verde)');

  // STEP 2: Delete TurniGiornalieri
  addLog('🗑 Svuotamento TurniGiornalieri...');
  const{error:e2}=await sb.from('TurniGiornalieri').delete().eq('ID_Magazzino',MAGAZZINO_ATTIVO);
  if(e2){addLog('❌ Errore svuotamento TurniGiornalieri: '+e2.message,'var(--rosso)');return;}
  addLog('✔ TurniGiornalieri svuotata','var(--verde)');

  // STEP 3: Insert TurniGiornalieri in chunks of 500
  addLog('⬆ Importazione turni...');
  const CHUNK=500;
  for(let i=0;i<turniPuliti.length;i+=CHUNK){
    const chunk=turniPuliti.slice(i,i+CHUNK);
    const{error:e3}=await sb.from('TurniGiornalieri').insert(chunk);
    if(e3){addLog(`❌ Errore inserimento turni (blocco ${Math.floor(i/CHUNK)+1}): ${e3.message}`,'var(--rosso)');return;}
    addLog(`  → Turni ${i+1}–${Math.min(i+CHUNK,turniPuliti.length)} inseriti`);
  }
  addLog(`✔ ${turniPuliti.length} turni importati`,'var(--verde)');

  // STEP 4: Insert BattesimiTurno in chunks of 500
  addLog('⬆ Importazione battesimi...');
  for(let i=0;i<batsPuliti.length;i+=CHUNK){
    const chunk=batsPuliti.slice(i,i+CHUNK);
    const{error:e4}=await sb.from('BattesimiTurno').insert(chunk);
    if(e4){addLog(`❌ Errore inserimento battesimi (blocco ${Math.floor(i/CHUNK)+1}): ${e4.message}`,'var(--rosso)');return;}
    addLog(`  → Battesimi ${i+1}–${Math.min(i+CHUNK,batsPuliti.length)} inseriti`);
  }
  addLog(`✔ ${batsPuliti.length} battesimi importati`,'var(--verde)');

  // STEP 5: Svuota e reimporta ProduzioneReparti (solo se il foglio è stato trovato)
  if(sheetProd){
    addLog('🗑 Svuotamento ProduzioneReparti...');
    const{error:e5}=await sb.from('ProduzioneReparti').delete().eq('ID_Magazzino',MAGAZZINO_ATTIVO);
    if(e5){addLog('❌ Errore svuotamento ProduzioneReparti: '+e5.message,'var(--rosso)');return;}
    addLog('✔ ProduzioneReparti svuotata','var(--verde)');

    addLog('⬆ Importazione produzione reparti...');
    for(let i=0;i<prodPuliti.length;i+=CHUNK){
      const chunk=prodPuliti.slice(i,i+CHUNK);
      const{error:e6}=await sb.from('ProduzioneReparti').insert(chunk);
      if(e6){addLog(`❌ Errore inserimento produzione (blocco ${Math.floor(i/CHUNK)+1}): ${e6.message}`,'var(--rosso)');return;}
      addLog(`  → Produzioni ${i+1}–${Math.min(i+CHUNK,prodPuliti.length)} inserite`);
    }
    addLog(`✔ ${prodPuliti.length} produzioni importate`,'var(--verde)');
  }

  addLog('🎉 Importazione completata con successo!','var(--verde)');
  toast('✔ Importazione completata');
}

async function exportCSV(tipo){
  const dal=document.getElementById('e-dal')?.value||'';
  const al=document.getElementById('e-al')?.value||'';
  let qgg=sb.from('TurniGiornalieri').select('*').eq('ID_Magazzino',MAGAZZINO_ATTIVO).order('DataInizio');
  if(dal)qgg=qgg.gte('DataInizio',dal);
  if(al)qgg=qgg.lte('DataInizio',al);
  const{data:ggs}=await qgg;
  const{data:bats}=await sb.from('BattesimiTurno').select('*').eq('ID_Magazzino',MAGAZZINO_ATTIVO);
  const{data:prods}=await sb.from('ProduzioneReparti').select('*').eq('ID_Magazzino',MAGAZZINO_ATTIVO);
  const{data:prodOp}=await sb.from('ProduzioneOperatori').select('*').eq('ID_Magazzino',MAGAZZINO_ATTIVO);
  let csv='',nome='';

  if(tipo==='turni'){
    nome='TURNI.csv';
    csv='ID_Turno;ID_Dipendente;Nome;DataInizio;OraInizio;OraFine;Ore_A;Ore_B\n';
    csv+=(ggs||[]).map(g=>[g.ID_Turno,g.ID_Dipendente,nomeDip(g.ID_Dipendente),g.DataInizio,g.OraInizio||'',g.OraFine||'',g.Ore_A||0,g.Ore_B||0].join(';')).join('\n');
  } else if(tipo==='batt'){
    nome='BATTESIMI.csv';
    csv='ID_Battesimo;ID_Turno;ID_Dipendente;Nome;DataInizio;OrdineRiga;ID_Reparto;NomeReparto;ID_Attivita;NomeAttivita;OreBattezzate;Note\n';
    csv+=(bats||[]).map(b=>{
      const g=(ggs||[]).find(x=>x.ID_Turno===b.ID_Turno);
      if(dal&&g?.DataInizio<dal)return null;
      if(al&&g?.DataInizio>al)return null;
      return [b.ID_Battesimo,b.ID_Turno,g?.ID_Dipendente||'',nomeDip(g?.ID_Dipendente),g?.DataInizio||'',b.OrdineRiga,b.ID_Reparto,nomeRep(b.ID_Reparto),b.ID_Attivita,nomeAtt(b.ID_Attivita),b.OreBattezzate,b.Note||''].join(';');
    }).filter(Boolean).join('\n');
  } else if(tipo==='prod'){
    nome='PRODUZIONE_REPARTI.csv';
    csv='DataProduzione;ID_Reparto;NomeReparto;ID_TipoProduzione;TipoProduzione;UnitaMisura;Quantita;Turno\n';
    const{data:tipi}=await sb.from('TipiProduzione').select('*').eq('ID_Magazzino',MAGAZZINO_ATTIVO);
    csv+=(prods||[]).filter(p=>(!dal||p.DataProduzione>=dal)&&(!al||p.DataProduzione<=al)).map(p=>{
      const t=tipi?.find(x=>x.ID_TipoProduzione==p.ID_TipoProduzione);
      return [p.DataProduzione,p.ID_Reparto,nomeRep(p.ID_Reparto),p.ID_TipoProduzione,t?.TipoProduzione||'',t?.UnitaMisura||'',p.Quantita,p.Notturno?'Notturno':'Diurno'].join(';');
    }).join('\n');
  } else if(tipo==='prodop'){
    nome='PRODUZIONE_OPERATORI.csv';
    csv='DataProduzione;CodiceVoice;ID_Dipendente;NomeDipendente;ID_Attivita;NomeAttivita;Colli\n';
    csv+=(prodOp||[]).filter(p=>(!dal||p.DataProduzione>=dal)&&(!al||p.DataProduzione<=al)).map(p=>{
      const d=_dips.find(x=>x.CodiceVoice==p.CodiceVoice);
      return [p.DataProduzione,p.CodiceVoice,d?.ID_Dipendente||'',d?.Nome||'',p.ID_Attivita,nomeAtt(p.ID_Attivita),p.Colli].join(';');
    }).join('\n');
  } else {
    nome='COMPLETO.csv';
    csv='ID_Battesimo;ID_Turno;ID_Dipendente;Nome;DataInizio;OraInizio;OraFine;Ore_A;Ore_B;OrdineRiga;ID_Reparto;NomeReparto;ID_Attivita;NomeAttivita;OreBattezzate;Note\n';
    csv+=(bats||[]).map(b=>{
      const g=(ggs||[]).find(x=>x.ID_Turno===b.ID_Turno);
      if(!g)return null;
      if(dal&&g.DataInizio<dal)return null;
      if(al&&g.DataInizio>al)return null;
      return [b.ID_Battesimo,b.ID_Turno,g.ID_Dipendente,nomeDip(g.ID_Dipendente),g.DataInizio,g.OraInizio||'',g.OraFine||'',g.Ore_A||0,g.Ore_B||0,b.OrdineRiga,b.ID_Reparto,nomeRep(b.ID_Reparto),b.ID_Attivita,nomeAtt(b.ID_Attivita),b.OreBattezzate,b.Note||''].join(';');
    }).filter(Boolean).join('\n');
  }
  const blob=new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8;'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=nome;a.click();
  toast('✔ Download avviato');
}

  const nuovaUm=prompt('Nuova unità di misura:',umAttuale||'');
  const{error}=await sb.from('TipiProduzione').update({TipoProduzione:nuovo,UnitaMisura:nuovaUm}).eq('ID_TipoProduzione',id);
  if(error){toast('Errore: '+error.message,'err');return;}
  toast('Tipo produzione aggiornato');
  await caricaDatiBase();
  await caricaTariffe();
}

async function eliminaTipoProd(id){
  if(!confirm('Eliminare questo tipo produzione?'))return;
  const{error}=await sb.from('TipiProduzione').delete().eq('ID_TipoProduzione',id);
  if(error){toast('Errore: '+error.message,'err');return;}
  toast('Tipo produzione eliminato');
  await caricaDatiBase();
  await caricaTariffe();
}

// ===== DIPENDENTI CRUD =====
async function salvaDipendente(){
  const nome=document.getElementById('dp-nome').value.trim();
  const voice=parseInt(document.getElementById('dp-voice').value);
  const id_c=parseInt(document.getElementById('dp-cont').value);
  const id_l=parseInt(document.getElementById('dp-lv').value);
  const attivo=document.getElementById('dp-attivo').value==='true';
  const magazzini=[];
  if(document.getElementById('dp-mag-1')?.checked)magazzini.push(1);
  if(document.getElementById('dp-mag-2')?.checked)magazzini.push(2);
  if(!nome||!voice){toast('Nome e CodiceVoice obbligatori','err');return;}
  if(!magazzini.length){toast('Seleziona almeno un magazzino','err');return;}
  const{error}=await sb.from('Dipendenti').insert({Nome:nome,CodiceVoice:voice,ID_Contratto:id_c,ID_Livello:id_l,Attivo:attivo,Magazzini:magazzini});
  if(error){toast('Errore: '+error.message,'err');return;}
  toast('Dipendente aggiunto');
  document.getElementById('dp-nome').value='';
  document.getElementById('dp-voice').value='';
  await caricaDatiBase();
  await renderConfig();
}

async function editMagazziniDipendente(id, magazziniAttuali){
  const attualiArr=magazziniAttuali.split(',').map(Number).filter(n=>!isNaN(n));
  const haCassano=attualiArr.includes(1);
  const haCameri=attualiArr.includes(2);
  const rispCassano=confirm(`Questo dipendente lavora a CASSANO?\n\nOK = Sì, lavora a Cassano\nAnnulla = No`);
  const rispCameri=confirm(`Questo dipendente lavora a CAMERI?\n\nOK = Sì, lavora a Cameri\nAnnulla = No`);
  const nuoviMag=[];
  if(rispCassano)nuoviMag.push(1);
  if(rispCameri)nuoviMag.push(2);
  if(!nuoviMag.length){toast('Deve lavorare in almeno un magazzino — nessuna modifica effettuata','err');return;}
  const{error}=await sb.from('Dipendenti').update({Magazzini:nuoviMag}).eq('ID_Dipendente',id);
  if(error){toast('Errore: '+error.message,'err');return;}
  toast('✔ Magazzini aggiornati');
  await caricaDatiBase();
  await renderConfig();
}

async function editDipendente(id){
  const dip=_dips.find(d=>d.ID_Dipendente==id)||(await sb.from('Dipendenti').select('*').eq('ID_Dipendente',id).single()).data;
  if(!dip)return;
  const nuovoNome=prompt('Nome:',dip.Nome);
  if(nuovoNome===null)return;
  const nuovoVoice=prompt('Codice Voice:',dip.CodiceVoice);
  if(nuovoVoice===null)return;
  const{error}=await sb.from('Dipendenti').update({Nome:nuovoNome,CodiceVoice:parseInt(nuovoVoice)}).eq('ID_Dipendente',id);
  if(error){toast('Errore: '+error.message,'err');return;}
  toast('Dipendente aggiornato');
  await caricaDatiBase();
  await renderConfig();
}

async function toggleDipendente(id,attuale){
  const nuovoStato=!attuale;
  const{error}=await sb.from('Dipendenti').update({Attivo:nuovoStato}).eq('ID_Dipendente',id);
  if(error){toast('Errore: '+error.message,'err');return;}
  toast(nuovoStato?'Dipendente attivato':'Dipendente disattivato');
  await caricaDatiBase();
  await renderConfig();
}
