<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nexus — Gestione Ore</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#14532d">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
:root{
  --p:#14532d;--pm:#166534;--pl:#22c55e;--acc:#e8a020;
  --sfondo:#f0faf4;--bianco:#fff;--testo:#14532d;--grigio:#6b8f72;
  --bordo:#bbf7d0;--verde:#15803d;--rosso:#b83228;--arancio:#c97010;
  --blu:#1d4ed8;--viola:#7c3aed;
  --mono:'Courier New',monospace;
  --shadow:0 1px 4px rgba(0,0,0,0.08);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--sfondo);color:var(--testo);min-height:100vh;font-size:14px;}

/* LOGIN */
#login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;background:linear-gradient(135deg,#14532d 0%,#166534 50%,#15803d 100%);}
.lbox{background:white;border-radius:16px;padding:40px 36px;width:100%;max-width:380px;box-shadow:0 20px 60px rgba(0,0,0,0.3);}
.lbox .logo{display:flex;align-items:center;gap:10px;margin-bottom:24px;}
.lbox .logo-icon{width:44px;height:44px;background:var(--p);border-radius:10px;display:flex;align-items:center;justify-content:center;}
.lbox .logo-icon svg{width:24px;height:24px;fill:none;stroke:white;stroke-width:2;}
.lbox h1{font-size:1.3rem;font-weight:800;color:var(--p);}
.lbox .sub{font-size:0.78rem;color:var(--grigio);margin-top:2px;}
.lbox .divider{height:1px;background:var(--bordo);margin:20px 0;}
.lbox .fg{display:flex;flex-direction:column;gap:5px;margin-bottom:14px;}
.lbox label{font-size:0.7rem;font-weight:700;color:var(--grigio);text-transform:uppercase;letter-spacing:0.06em;}
.lbox input{border:1.5px solid var(--bordo);border-radius:8px;padding:11px 14px;font-size:0.92rem;background:var(--sfondo);transition:border-color 0.15s;}
.lbox input:focus{outline:none;border-color:var(--pl);background:white;}
.lbox .lbtn{width:100%;padding:12px;background:var(--p);color:white;border:none;border-radius:8px;font-size:0.92rem;font-weight:700;cursor:pointer;margin-top:6px;transition:background 0.15s;}
.lbox .lbtn:hover{background:var(--pm);}
#lerr{color:var(--rosso);font-size:0.8rem;font-weight:600;margin-top:10px;min-height:18px;}

/* APP */
#app{display:none;}
header{background:var(--p);color:white;height:56px;display:flex;align-items:center;justify-content:space-between;padding:0 20px;position:sticky;top:0;z-index:200;box-shadow:0 2px 12px rgba(0,0,0,0.3);}
.hlogo{display:flex;align-items:center;gap:10px;}
.hlogo-icon{width:32px;height:32px;background:rgba(255,255,255,0.15);border-radius:7px;display:flex;align-items:center;justify-content:center;}
.hlogo-icon svg{width:18px;height:18px;fill:none;stroke:white;stroke-width:2.2;}
header h1{font-size:0.95rem;font-weight:800;letter-spacing:0.05em;text-transform:uppercase;}
.hright{display:flex;align-items:center;gap:10px;}
.rbadge{font-size:0.7rem;font-weight:700;padding:3px 10px;border-radius:20px;background:var(--acc);color:var(--p);}
.logoutbtn{background:rgba(255,255,255,0.12);border:1px solid rgba(255,255,255,0.2);color:white;padding:5px 12px;border-radius:6px;font-size:0.76rem;cursor:pointer;font-weight:600;}
.logoutbtn:hover{background:rgba(255,255,255,0.22);}

nav{background:var(--pm);display:flex;padding:0 16px;overflow-x:auto;gap:0;position:relative;z-index:50;}
nav::-webkit-scrollbar{height:2px;}
nav button{background:none;border:none;color:rgba(255,255,255,0.5);padding:12px 16px;font-size:0.78rem;font-weight:700;cursor:pointer;border-bottom:3px solid transparent;white-space:nowrap;transition:color 0.12s;display:flex;align-items:center;gap:6px;}
nav button svg{width:15px;height:15px;fill:none;stroke:currentColor;stroke-width:2;}
nav button:hover{color:rgba(255,255,255,0.85);}
nav button.on{color:var(--acc);border-bottom-color:var(--acc);}

/* Dropdown nav groups */
.navgroup{position:relative;}
.navgroup-trigger{background:none;border:none;color:rgba(255,255,255,0.5);padding:12px 16px;font-size:0.78rem;font-weight:700;cursor:pointer;border-bottom:3px solid transparent;white-space:nowrap;display:flex;align-items:center;gap:6px;width:100%;}
.navgroup-trigger svg{width:15px;height:15px;fill:none;stroke:currentColor;stroke-width:2;}
.navgroup-trigger:hover{color:rgba(255,255,255,0.85);}
.navgroup-trigger.on{color:var(--acc);border-bottom-color:var(--acc);}
.navgroup-menu{display:none;position:fixed;background:var(--bianco);border:1.5px solid var(--bordo);border-radius:8px;box-shadow:0 8px 20px rgba(0,0,0,0.25);min-width:220px;flex-direction:column;z-index:9999;}
.navgroup-menu button{color:var(--testo);padding:11px 16px;border-bottom:1px solid var(--sfondo);justify-content:flex-start;width:100%;}
.navgroup-menu button svg{stroke:var(--pm);}
.navgroup-menu button:hover{background:var(--sfondo);color:var(--pm);}
.navgroup-menu button.on{background:var(--sfondo);color:var(--pm);border-bottom-color:var(--sfondo);}
.navgroup-menu button:last-child{border-bottom:none;border-radius:0 0 8px 8px;}

/* Checkbox multi-select dropdown (Archivio Turni/Operativo/Produzione) */
.ckwrap{position:relative;}
.cktrigger{width:100%;border:1.5px solid var(--bordo);border-radius:8px;padding:9px 12px;font-size:0.85rem;background:var(--bianco);color:var(--testo);text-align:left;cursor:pointer;display:flex;justify-content:space-between;align-items:center;}
.cktrigger:after{content:'▾';color:var(--grigio);font-size:0.7rem;}
.ckdropdown{display:none;position:absolute;top:100%;left:0;right:0;margin-top:4px;background:var(--bianco);border:1.5px solid var(--bordo);border-radius:8px;box-shadow:0 8px 20px rgba(0,0,0,0.15);max-height:260px;overflow-y:auto;z-index:100;padding:6px;}
.ckdropdown.open{display:block;}
.ckitem{display:flex;align-items:center;gap:8px;padding:7px 8px;font-size:0.84rem;cursor:pointer;border-radius:5px;}
.ckitem:hover{background:var(--sfondo);}
.ckitem input{margin:0;cursor:pointer;}

/* Tabellone Giornaliero */
.tg-table{border-collapse:collapse;font-size:0.66rem;table-layout:fixed;}
.tg-table th,.tg-table td{border:1px solid var(--bordo);padding:0;overflow:hidden;}
.tg-dipname-header{position:sticky;left:0;background:var(--sfondo);z-index:5;width:130px;padding:6px 8px!important;text-align:left;font-weight:800;}
.tg-dipname{position:sticky;left:0;background:var(--bianco);z-index:4;width:130px;padding:4px 8px;font-size:0.72rem;font-weight:600;white-space:nowrap;border-right:2px solid var(--bordo);overflow:hidden;text-overflow:ellipsis;}
.tg-th{font-size:0.52rem;color:var(--grigio);text-align:center;font-weight:500;padding:1px 0;width:16px;}
.tg-th-ora{font-weight:800;color:var(--testo);border-left:1.5px solid var(--p);}
.tg-cell{height:20px;color:white;font-size:0.58rem;text-align:center;overflow:hidden;white-space:nowrap;cursor:default;}
.tg-cell-empty{height:20px;background:repeating-linear-gradient(45deg,#f8f8f8,#f8f8f8 4px,#f0f0f0 4px,#f0f0f0 8px);}
.tg-label{padding:0 2px;display:inline-block;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:100%;}

/* Selezione magazzino */
.magcard{border:1.5px solid var(--bordo);border-radius:10px;padding:16px 18px;cursor:pointer;display:flex;align-items:center;gap:14px;transition:all 0.15s;text-align:left;background:white;width:100%;}
.magcard:hover{border-color:var(--p);background:var(--sfondo);transform:translateY(-1px);}
.magcard-icon{width:40px;height:40px;background:var(--sfondo);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:1.3rem;flex-shrink:0;}
.magcard-name{font-weight:700;color:var(--p);font-size:0.95rem;}
.magcard-sub{font-size:0.76rem;color:var(--grigio);margin-top:2px;}
.navgroup.open .navgroup-menu{display:flex;}

main{padding:20px 16px;max-width:1100px;margin:0 auto;}
.tab{display:none;}.tab.on{display:block;}

.card{background:var(--bianco);border:1px solid var(--bordo);border-radius:10px;padding:18px;margin-bottom:16px;box-shadow:var(--shadow);}
.ct{font-size:0.68rem;font-weight:800;color:var(--grigio);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:14px;padding-bottom:8px;border-bottom:1px solid var(--sfondo);display:flex;align-items:center;gap:6px;}
.ct svg{width:14px;height:14px;fill:none;stroke:var(--grigio);stroke-width:2;}

.fg{display:flex;flex-direction:column;gap:4px;}
.fg label{font-size:0.67rem;font-weight:700;color:var(--grigio);text-transform:uppercase;letter-spacing:0.05em;}
.fg input,.fg select{border:1.5px solid var(--bordo);border-radius:6px;padding:8px 10px;font-size:0.88rem;color:var(--testo);background:var(--sfondo);transition:all 0.12s;}
.fg input:focus,.fg select:focus{outline:none;border-color:var(--pl);background:white;box-shadow:0 0 0 3px rgba(34,197,94,0.1);}
.fg input[readonly]{background:#e8f5ef;cursor:default;color:var(--grigio);}
.g2{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;}
.g5{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;}
.ga{grid-column:1/-1;}

.btn{padding:8px 16px;border:none;border-radius:6px;font-size:0.81rem;font-weight:700;cursor:pointer;transition:all 0.12s;display:inline-flex;align-items:center;gap:5px;}
.btn svg{width:14px;height:14px;fill:none;stroke:currentColor;stroke-width:2.2;}
.btn:hover{filter:brightness(0.92);}
.bp{background:var(--p);color:white;}
.bv{background:var(--verde);color:white;}
.br{background:var(--rosso);color:white;padding:5px 10px;font-size:0.73rem;}
.ba{background:var(--acc);color:var(--p);}
.bo{background:transparent;border:1.5px solid var(--bordo);color:var(--testo);}
.bo:hover{border-color:var(--pl);color:var(--verde);filter:none;}
.bsm{padding:4px 10px;font-size:0.73rem;}
.brow{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap;align-items:center;}

.tw{overflow-x:auto;}
table{width:100%;border-collapse:collapse;font-size:0.81rem;}
th{background:var(--sfondo);color:var(--grigio);font-size:0.64rem;font-weight:800;text-transform:uppercase;letter-spacing:0.07em;padding:8px 10px;text-align:left;border-bottom:2px solid var(--bordo);white-space:nowrap;}
td{padding:8px 10px;border-bottom:1px solid var(--bordo);vertical-align:middle;}
tr:last-child td{border-bottom:none;}
tr:hover td{background:#f5fbf7;}

.bid{font-family:var(--mono);font-size:0.72rem;background:var(--p);color:white;padding:2px 7px;border-radius:4px;font-weight:700;}
.bmov{font-family:var(--mono);font-size:0.72rem;background:var(--pm);color:white;padding:2px 7px;border-radius:4px;}
.pill{display:inline-block;padding:2px 9px;border-radius:20px;font-size:0.69rem;font-weight:700;}
.pg{background:#d3f0e3;color:var(--verde);}
.py{background:#fdefd3;color:var(--arancio);}
.pb{background:#dbeafe;color:var(--blu);}
.pr{background:#fde3e1;color:var(--rosso);}
.pv{background:#ede9fe;color:var(--viola);}
.po{background:#fff0d3;color:var(--arancio);}

.alert{padding:9px 13px;border-radius:6px;font-size:0.82rem;font-weight:600;margin-bottom:12px;}
.aok{background:#d3f0e3;color:var(--verde);border:1px solid #a5d9be;}
.aerr{background:#fde3e1;color:var(--rosso);border:1px solid #f4b0ab;}
.awarn{background:#fdefd3;color:var(--arancio);border:1px solid #f5d494;}

#toast{position:fixed;bottom:20px;right:20px;z-index:999;padding:11px 18px;border-radius:8px;font-size:0.84rem;font-weight:600;box-shadow:0 4px 20px rgba(0,0,0,0.25);opacity:0;transform:translateY(8px);transition:opacity 0.2s,transform 0.2s;pointer-events:none;max-width:300px;}
#toast.show{opacity:1;transform:translateY(0);}

.ore-bar{display:flex;align-items:center;gap:12px;padding:12px 14px;border-radius:8px;margin:10px 0;background:var(--sfondo);border:1px solid var(--bordo);}
.ore-bar .num{font-size:1.3rem;font-weight:800;font-family:var(--mono);}
.num.ok{color:var(--verde);}.num.warn{color:var(--arancio);}.num.err{color:var(--rosso);}

.qrow{display:grid;grid-template-columns:30px 2fr 2fr 90px 1fr 70px;gap:8px;align-items:end;padding:8px 10px;border-radius:6px;background:var(--sfondo);border:1px solid var(--bordo);margin-bottom:6px;}
.prow{display:grid;grid-template-columns:auto 2fr 2fr 80px;gap:8px;align-items:center;padding:7px 10px;border-radius:5px;background:#fff9ec;border:1px solid #f5d494;margin-bottom:5px;font-size:0.82rem;}

/* STATS */
.stats{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:10px;margin-bottom:16px;}
.stat{background:var(--bianco);border:1px solid var(--bordo);border-radius:8px;padding:14px;text-align:center;}
.stat .n{font-size:1.5rem;font-weight:900;color:var(--p);font-variant-numeric:tabular-nums;}
.stat .l{font-size:0.65rem;color:var(--grigio);text-transform:uppercase;letter-spacing:0.05em;margin-top:3px;}

/* REPORT CARDS */
.rep-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:14px;margin-bottom:16px;}
.rep-card{background:var(--bianco);border:1px solid var(--bordo);border-radius:10px;padding:16px;box-shadow:var(--shadow);}
.rep-card .rc-title{font-size:0.68rem;font-weight:800;color:var(--grigio);text-transform:uppercase;letter-spacing:0.07em;margin-bottom:12px;}
.rep-card .rc-val{font-size:2rem;font-weight:900;font-variant-numeric:tabular-nums;color:var(--p);}
.rep-card .rc-sub{font-size:0.78rem;color:var(--grigio);margin-top:4px;}
.rc-green{border-top:3px solid var(--verde);}
.rc-orange{border-top:3px solid var(--arancio);}
.rc-red{border-top:3px solid var(--rosso);}
.rc-blue{border-top:3px solid var(--blu);}
.rc-viola{border-top:3px solid var(--viola);}

.empty{text-align:center;color:var(--grigio);padding:28px;font-size:0.84rem;}
.loading{text-align:center;color:var(--grigio);padding:20px;font-size:0.82rem;}

/* UPLOAD AREA */
.upload-area{border:2px dashed var(--bordo);border-radius:8px;padding:24px;text-align:center;cursor:pointer;transition:all 0.15s;background:var(--sfondo);}
.upload-area:hover{border-color:var(--pl);background:#f0fdf4;}
.upload-area svg{width:32px;height:32px;stroke:var(--grigio);fill:none;stroke-width:1.5;margin-bottom:8px;}
.upload-area p{font-size:0.84rem;color:var(--grigio);}
.upload-area input{display:none;}

@media(max-width:640px){
  .g4,.g5,.g3{grid-template-columns:1fr 1fr;}
  .ga{grid-column:1/-1;}
  .qrow{grid-template-columns:25px 1fr 1fr 70px;}
  .rep-grid{grid-template-columns:1fr;}
}
</style>
</head>
<body>
<div id="toast"></div>

<!-- LOGIN -->
<div id="login-screen">
  <div class="lbox">
    <div class="logo">
      <div class="logo-icon">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
      </div>
      <div>
        <div class="h1" style="font-size:1.3rem;font-weight:800;color:var(--p);">Nexus</div>
        <div class="sub">Gestione Ore & Produzione</div>
      </div>
    </div>
    <div class="divider"></div>
    <div class="fg"><label>Username</label><input id="lu" type="text" autocomplete="username" placeholder="Inserisci username"></div>
    <div class="fg"><label>Password</label><input id="lp" type="password" autocomplete="current-password" placeholder="Inserisci password"></div>
    <button class="lbtn" onclick="doLogin()">Accedi</button>
    <div id="lerr"></div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <header>
    <div class="hlogo">
      <div class="hlogo-icon">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
      </div>
      <h1>Nexus — Gestione Ore <span style="font-size:0.65rem;font-weight:700;background:rgba(255,255,255,0.18);border-radius:4px;padding:2px 7px;letter-spacing:0.04em;vertical-align:middle;">v79</span></h1>
    </div>
    <div class="hright">
      <button class="logoutbtn" id="magbtn" style="display:none;" onclick="apriSceltaMagazzino()">📦 <span id="magbtn-label">—</span></button>
      <span class="rbadge" id="rbadge">—</span>
      <button class="logoutbtn" onclick="doLogout()">
        <svg style="width:12px;height:12px;fill:none;stroke:currentColor;stroke-width:2;vertical-align:middle;" viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        Esci
      </button>
    </div>
  </header>
  <nav id="mnav"></nav>
  <main id="mc"><div class="loading">Caricamento...</div></main>
</div>

<!-- SELEZIONE MAGAZZINO -->
<div id="mag-overlay" style="display:none;position:fixed;inset:0;background:rgba(20,83,45,0.55);z-index:500;align-items:center;justify-content:center;">
  <div style="background:white;border-radius:16px;padding:36px;max-width:480px;width:90%;box-shadow:0 20px 60px rgba(0,0,0,0.3);">
    <h2 style="font-size:1.2rem;font-weight:800;color:var(--p);margin-bottom:6px;">Seleziona magazzino</h2>
    <p style="font-size:0.85rem;color:var(--grigio);margin-bottom:22px;">Scegli su quale magazzino vuoi operare. Potrai cambiarlo in qualsiasi momento.</p>
    <div id="mag-cards" style="display:flex;flex-direction:column;gap:10px;"></div>
  </div>
</div>

<script>
const SB_URL='https://eqtyfnluswalfassmlxd.supabase.co';
const SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVxdHlmbmx1c3dhbGZhc3NtbHhkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEwMzE4NzksImV4cCI6MjA5NjYwNzg3OX0.bkTpKYduJV_PVNxEt6xgu0dWHy8kjmkMExlhBaCZSyk';
const sb=supabase.createClient(SB_URL,SB_KEY);

let ME=null;
let MAGAZZINO_ATTIVO=null; // ID_Magazzino selezionato per la sessione corrente
let _magazzini=[]; // lista completa magazzini (per nomi)
let _righe=[],_preBatt=[];
let _dips=[],_reparti=[],_attivita=[],_contratti=[],_livelli=[],_tipiProd=[];

// UTILS
const oggi=()=>new Date().toISOString().split('T')[0];
function calcOre(ini,fin){
  if(!ini||!fin)return 0;
  const[h1,m1]=ini.split(':').map(Number),[h2,m2]=fin.split(':').map(Number);
  let d=(h2*60+m2)-(h1*60+m1);
  if(d<=0)d+=1440;
  return Math.round(d/60*100)/100;
}
function fmtEuro(n){return n!=null?'€'+Number(n).toFixed(2):'—';}
function fmtN(n,dec=2){return n!=null?Number(n).toFixed(dec):'—';}

function toast(msg,tipo='ok'){
  const el=document.getElementById('toast');
  el.textContent=msg;
  el.style.background=tipo==='ok'?'#15803d':tipo==='warn'?'#c97010':'#b83228';
  el.style.color='white';
  el.classList.add('show');
  clearTimeout(el._t);
  el._t=setTimeout(()=>el.classList.remove('show'),2800);
}

function nomeDip(id){const d=_dips.find(x=>x.ID_Dipendente==id);return d?d.Nome:id;}
function nomeRep(id){const r=_reparti.find(x=>x.ID_Reparto==id);return r?r.NomeReparto:id;}
function nomeAtt(id){const a=_attivita.find(x=>x.ID_Attivita==id);return a?a.NomeAttivita:id;}
function nomeCont(id){const c=_contratti.find(x=>x.ID_Contratto==id);return c?c.NomeContratto:id;}
function nomeLiv(id){const l=_livelli.find(x=>x.ID_Livello==id);return l?l.NomeLivello:id;}
function nomeTipoProd(id){const t=_tipiProd.find(x=>x.ID_TipoProduzione==id);return t?t.TipoProduzione:id;}

async function caricaDatiBase(){
  const[{data:d},{data:r},{data:a},{data:c},{data:l},{data:t}]=await Promise.all([
    sb.from('Dipendenti').select('*').order('Nome'), // tutti (attivi e non) — serve per report storici, condiviso tra magazzini
    sb.from('Reparti').select('*').eq('ID_Magazzino',MAGAZZINO_ATTIVO).order('NomeReparto'),
    sb.from('Attivita').select('*').eq('ID_Magazzino',MAGAZZINO_ATTIVO).order('NomeAttivita'),
    sb.from('Contratti').select('*'),
    sb.from('Livelli').select('*'),
    sb.from('TipiProduzione').select('*').eq('ID_Magazzino',MAGAZZINO_ATTIVO).order('TipoProduzione')
  ]);
  // Normalizza Magazzini di ogni dipendente: può arrivare come array nativo o stringa Postgres "{1,2}"
  _dips=(d||[]).map(dip=>{
    let mag=dip.Magazzini;
    if(Array.isArray(mag)){
      mag=mag.map(Number);
    }else if(typeof mag==='string'){
      mag=mag.replace(/[{}\[\]]/g,'').split(',').map(s=>parseInt(s.trim(),10)).filter(n=>!isNaN(n));
    }
    if(!mag||!mag.length)mag=[1];
    return{...dip,Magazzini:mag};
  });
  _reparti=r||[];_attivita=a||[];
  _contratti=c||[];_livelli=l||[];_tipiProd=t||[];
}

// LOGIN
document.getElementById('lp').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});
async function doLogin(){
  const user=document.getElementById('lu').value.trim();
  const pass=document.getElementById('lp').value.trim();
  const err=document.getElementById('lerr');
  err.textContent='Verifica...';
  try{
    const{data,error}=await sb.from('Utenti').select('*').eq('Username',user).eq('Password',pass);
    if(error)throw error;
    if(!data||!data.length){err.textContent='Username o password errati.';return;}
    // Magazzini_Accessibili può arrivare come array nativo, oppure come stringa
    // (formato Postgres "{1,2}" o JSON "[1,2]") a seconda della versione del client — normalizza in ogni caso
    let magRaw=data[0].Magazzini_Accessibili;
    let magArr=[1];
    if(Array.isArray(magRaw)){
      magArr=magRaw.map(Number);
    }else if(typeof magRaw==='string'){
      magArr=magRaw.replace(/[{}\[\]]/g,'').split(',').map(s=>parseInt(s.trim(),10)).filter(n=>!isNaN(n));
    }
    if(!magArr.length)magArr=[1];
    ME={username:data[0].Username,ruolo:data[0].Ruolo,magazzini:magArr};
    console.log('DEBUG magazzini utente:',magArr,'da raw:',magRaw);
    err.textContent='';

    // Carica elenco magazzini (per nomi nelle card/selettore)
    const{data:mags,error:errMags}=await sb.from('Magazzini').select('*').order('ID_Magazzino');
    console.log('DEBUG Magazzini fetch:',mags,'errore:',errMags);
    _magazzini=mags||[];

    if(ME.magazzini.length>1){
      // Più magazzini accessibili: mostra schermata di scelta prima di entrare
      mostraSceltaMagazzino(true);
    }else{
      // Un solo magazzino accessibile: entra direttamente
      MAGAZZINO_ATTIVO=ME.magazzini[0];
      await entraInApp();
    }
  }catch(e){err.textContent='Errore: '+e.message;}
}

function mostraSceltaMagazzino(primoAccesso){
  document.getElementById('login-screen').style.display='none';
  const overlay=document.getElementById('mag-overlay');
  const cardsDiv=document.getElementById('mag-cards');
  const magsAccessibili=_magazzini.filter(m=>ME.magazzini.includes(m.ID_Magazzino));
  cardsDiv.innerHTML=magsAccessibili.map(m=>`
    <button class="magcard" onclick="selezionaMagazzino(${m.ID_Magazzino},${primoAccesso})">
      <div class="magcard-icon">📦</div>
      <div>
        <div class="magcard-name">${m.NomeMagazzino}</div>
        <div class="magcard-sub">Magazzino ${m.ID_Magazzino}</div>
      </div>
    </button>`).join('');
  overlay.style.display='flex';
}

async function selezionaMagazzino(idMag, primoAccesso){
  MAGAZZINO_ATTIVO=idMag;
  document.getElementById('mag-overlay').style.display='none';
  if(primoAccesso){
    await entraInApp();
  }else{
    // Cambio magazzino a sessione già avviata: ricarica dati e torna al tab corrente
    await caricaDatiBase();
    aggiornaMagBtnLabel();
    showFirstTab();
  }
}

function apriSceltaMagazzino(){
  if(!ME||ME.magazzini.length<2)return;
  mostraSceltaMagazzino(false);
}

function aggiornaMagBtnLabel(){
  const btn=document.getElementById('magbtn');
  const lbl=document.getElementById('magbtn-label');
  if(!btn||!lbl)return;
  const mag=_magazzini.find(m=>m.ID_Magazzino===MAGAZZINO_ATTIVO);
  lbl.textContent=mag?mag.NomeMagazzino:'—';
  btn.style.display=(ME&&ME.magazzini.length>1)?'inline-flex':'none';
}

async function entraInApp(){

  document.getElementById('app').style.display='block';
  document.getElementById('rbadge').textContent=ME.ruolo==='admin'?'👑 Amministratore':'🔧 Responsabile';

function buildNav(){
  const items=ME.ruolo==='admin'?NAV_ADMIN:NAV_RESP;
  document.getElementById('mnav').innerHTML=items.map(it=>{
    if(Array.isArray(it)){
      const[id,icon,label]=it;
      return `<button id="nb-${id}" onclick="showTab('${id}')">${icon}${label}</button>`;
    }
    // gruppo dropdown
    const subBtns=it.items.map(([id,icon,label])=>
      `<button id="nb-${id}" onclick="showTab('${id}')">${icon}${label}</button>`).join('');
    return `<div class="navgroup">
      <button type="button" class="navgroup-trigger" id="ng-${it.group}">${it.icon}${it.group}${ICO.caret}</button>
      <div class="navgroup-menu">${subBtns}</div>
    </div>`;
  }).join('');
  // Attacca i listener DOPO aver creato l'HTML (più robusto degli onclick inline per i gruppi)
  document.querySelectorAll('.navgroup-trigger').forEach(trig=>{
    trig.addEventListener('click',function(e){
      e.preventDefault();
      e.stopPropagation();
      const group=trig.closest('.navgroup');
      const menu=group.querySelector('.navgroup-menu');
      const wasOpen=group.classList.contains('open');
      document.querySelectorAll('.navgroup.open').forEach(g=>g.classList.remove('open'));
      if(!wasOpen){
        // Posiziona il menu con position:fixed calcolato dal bounding rect del trigger
        // (immune al clipping di nav{overflow-x:auto})
        const rect=trig.getBoundingClientRect();
        menu.style.top=rect.bottom+'px';
        menu.style.left=rect.left+'px';
        group.classList.add('open');
      }
    });
  });
}

    toast('Accesso non consentito','err');

  document.querySelectorAll('nav button').forEach(b=>b.classList.remove('on'));
  const nb=document.getElementById('nb-'+id);if(nb)nb.classList.add('on');
  // Se la voce è dentro un dropdown, evidenzia anche il trigger del gruppo
  const parentGroup=nb?.closest('.navgroup');
  if(parentGroup){
    const trigger=parentGroup.querySelector('.navgroup-trigger');
    if(trigger)trigger.classList.add('on');
  }
  document.querySelectorAll('.navgroup.open').forEach(g=>g.classList.remove('open'));

}

// ============================================================
// RIEPILOGO GIORNATA (Inserimento Turni)
// Mostra, per la DataInizio selezionata nel form, quante persone hanno
// già un turno in quel giorno e le ore totali (Ore_A+Ore_B) suddivise per
// REPARTO (non per attività) sommando tutti i battesimi dei turni di quel giorno.
// Si aggiorna ogni volta che cambia la data o viene salvato un nuovo turno.
// ============================================================
async function aggRiepilogoGiorno(){
  const box=document.getElementById('riepilogo-giorno');
  if(!box)return;
  const data=document.getElementById('i-data')?.value;
  if(!data){box.innerHTML='';return;}
  box.innerHTML='<div class="loading" style="padding:10px;">⏳ Caricamento riepilogo...</div>';

  const{data:turni,error}=await sb.from('TurniGiornalieri').select('ID_Turno,ID_Dipendente').eq('ID_Magazzino',MAGAZZINO_ATTIVO).eq('DataInizio',data);
  if(error||!turni||!turni.length){
    box.innerHTML=`<div class="card" style="margin-top:12px;background:var(--sfondo);">
      <div style="font-size:0.8rem;color:var(--grigio);">Nessun turno ancora inserito per il <strong>${fmtDataIT(data)}</strong>.</div>
    </div>`;
    return;
  }

  const idTurni=turni.map(t=>t.ID_Turno);
  const persone=new Set(turni.map(t=>t.ID_Dipendente).filter(Boolean));

  const{data:bats}=await sb.from('BattesimiTurno').select('ID_Reparto,OreBattezzate').in('ID_Turno',idTurni);
  const perReparto={};
  (bats||[]).forEach(b=>{
    if(!perReparto[b.ID_Reparto])perReparto[b.ID_Reparto]=0;
    perReparto[b.ID_Reparto]+=(b.OreBattezzate||0);
  });
  const totOre=Object.values(perReparto).reduce((a,b)=>a+b,0);
  const repIds=Object.keys(perReparto).sort((a,b)=>perReparto[b]-perReparto[a]);

  const righeRep=repIds.map(idRep=>`
    <div class="prow">
      <span><span class="pill py">${nomeRep(idRep)}</span></span>
      <strong>${fmtN(perReparto[idRep],2)}h</strong>
    </div>`).join('');

  box.innerHTML=`
  <div class="card" style="margin-top:12px;background:var(--sfondo);">
    <div style="font-size:0.67rem;font-weight:800;color:var(--blu);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:8px;">
      📋 Riepilogo ${fmtDataIT(data)}
    </div>
    <div style="display:flex;gap:24px;flex-wrap:wrap;margin-bottom:${righeRep?'10px':'0'};">
      <div>
        <div style="font-size:0.65rem;color:var(--grigio);text-transform:uppercase;letter-spacing:0.05em;">Persone con turno</div>
        <div class="num ok" style="font-size:1.3rem;font-weight:800;font-family:var(--mono);">${persone.size}</div>
      </div>
      <div>
        <div style="font-size:0.65rem;color:var(--grigio);text-transform:uppercase;letter-spacing:0.05em;">Ore totali</div>
        <div class="num ok" style="font-size:1.3rem;font-weight:800;font-family:var(--mono);">${fmtN(totOre,2)}h</div>
      </div>
    </div>
    ${righeRep?`<div style="border-top:1px solid var(--bordo);padding-top:8px;">${righeRep}</div>`:''}
  </div>`;
}

function calcT(){
  const ini=document.getElementById('i-ini')?.value;
  const fin=document.getElementById('i-fin')?.value;
  if(!ini||!fin)return;
  const tot=calcOre(ini,fin);
  const notturno=fin<ini;
  const[h1,m1]=ini.split(':').map(Number);
  const oreA=notturno?Math.round((24*60-(h1*60+m1))/60*100)/100:tot;
  const oreB=notturno?Math.round((tot-oreA)*100)/100:0;
  const el=document.getElementById('i-oretot');
  if(el)el.value=`${oreA}h + ${oreB}h = ${tot}h${notturno?' (+1gg)':''}`;
  aggBar();
}

      ⚠ ${_preBatt.length} ore pre-battezzate dal responsabile — incluse automaticamente

function addRiga(){_righe.push({ID_Reparto:'',ID_Attivita:'',OreBattezzate:'',Note:''});renderRighe();aggBar();}
function removeRiga(i){if(_righe.length<=1)return;_righe.splice(i,1);renderRighe();aggBar();}

      <div class="fg"><label>Reparto</label>
        <select onchange="rigaRepChange(${i},this.value)">

      <div class="fg"><label>Attività</label>
        <select id="ratt-${i}" onchange="_righe[${i}].ID_Attivita=this.value;aggBar()">
          <option value="">— Seleziona —</option>${optAtts(r.ID_Reparto,r.ID_Attivita)}

        <input type="number" min="0.5" max="24" step="0.5" value="${r.OreBattezzate||''}" placeholder="0"
          oninput="_righe[${i}].OreBattezzate=parseFloat(this.value)||0;aggBar()">
      </div>
      <div class="fg"><label>Note</label>
        <input type="text" value="${r.Note||''}" placeholder="opz." oninput="_righe[${i}].Note=this.value">
      </div>

      </div>

function oreTotN(){return calcOre(document.getElementById('i-ini')?.value,document.getElementById('i-fin')?.value);}
function oreBattN(){
  const fr=_righe.reduce((a,r)=>a+(parseFloat(r.OreBattezzate)||0),0);
  const fp=_preBatt.reduce((a,m)=>a+m.OreBattezzate,0);
  return Math.round((fr+fp)*100)/100;
}
function aggBar(){
  const tot=oreTotN(),batt=oreBattN(),rim=Math.round((tot-batt)*100)/100;
  const pct=tot>0?Math.min(100,Math.round(batt/tot*100)):0;
  const er=document.getElementById('ore-rim'),eb=document.getElementById('ore-batt'),bar=document.getElementById('barra');
  if(!er)return;
  er.textContent=rim+'h';eb.textContent=batt+'h';
  er.className='num '+(rim===0?'ok':rim<0?'err':'warn');
  if(bar){bar.style.width=pct+'%';bar.style.background=rim===0?'#15803d':rim<0?'#b83228':'#c97010';}
}

// ============================================================
// CONTROLLO SOVRAPPOSIZIONI TURNI
// Verifica se un nuovo turno (dipendente+data+orario) si sovrappone con un turno
// già esistente dello stesso dipendente, considerando anche i turni notturni
// che attraversano la mezzanotte.
// ============================================================
async function trovaTurniSovrapposti(ID_Dipendente, DataInizio, OraInizio, OraFine, escludiIdTurno){
  // Calcola l'intervallo assoluto (minuti dall'epoca) del nuovo turno
  function toAbsMin(dataStr, oraStr){
    const d=new Date(dataStr+'T00:00:00');
    const[h,m]=(oraStr||'00:00').split(':').map(Number);
    return Math.floor(d.getTime()/60000)+h*60+m;
  }
  const nuovoStart=toAbsMin(DataInizio,OraInizio);
  let nuovoEnd=toAbsMin(DataInizio,OraFine);
  if(nuovoEnd<=nuovoStart)nuovoEnd+=24*60; // turno notturno: finisce il giorno dopo

  // Carica i turni dello stesso dipendente in una finestra di ±2 giorni (sufficiente per coprire
  // qualsiasi sovrapposizione anche con turni notturni adiacenti)
  function addDays(dateStr,days){
    const d=new Date(dateStr+'T00:00:00');
    d.setDate(d.getDate()+days);
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  }
  const dalCheck=addDays(DataInizio,-2), alCheck=addDays(DataInizio,2);
  let q=sb.from('TurniGiornalieri').select('*').eq('ID_Dipendente',ID_Dipendente).eq('ID_Magazzino',MAGAZZINO_ATTIVO)
    .gte('DataInizio',dalCheck).lte('DataInizio',alCheck);
  if(escludiIdTurno)q=q.neq('ID_Turno',escludiIdTurno);
  const{data:candidati}=await q;

  const conflitti=[];
  (candidati||[]).forEach(t=>{
    if(!t.OraInizio||!t.OraFine)return; // turni senza orario non vengono controllati
    const s=toAbsMin(t.DataInizio,t.OraInizio);
    let e=toAbsMin(t.DataInizio,t.OraFine);
    if(e<=s)e+=24*60;
    // sovrapposizione se gli intervalli si intersecano
    if(nuovoStart<e && s<nuovoEnd){
      conflitti.push(t);
    }
  });
  return conflitti;
}

async function salvaTurno(){
  const ID_Dipendente=document.getElementById('i-dip').value;
  const DataInizio=document.getElementById('i-data').value;
  const OraInizio=document.getElementById('i-ini').value;
  const OraFine=document.getElementById('i-fin').value;
  const msg=document.getElementById('imsg');
  const tot=oreTotN(),batt=oreBattN();
  const notturno=OraFine<OraInizio;
  const[h1,m1]=OraInizio.split(':').map(Number);
  const Ore_A=notturno?Math.round((24*60-(h1*60+m1))/60*100)/100:tot;
  const Ore_B=notturno?Math.round((tot-Ore_A)*100)/100:0;
  for(let i=0;i<_righe.length;i++){
    const r=_righe[i];
    if(!r.ID_Reparto||!r.ID_Attivita||!r.OreBattezzate){msg.innerHTML=`<div class="alert aerr">Riga ${i+1}: completa tutti i campi.</div>`;return;}
  }
  if(Math.abs(tot-batt)>0.01){msg.innerHTML=`<div class="alert aerr">Ore battezzate (${batt}h) ≠ ore totali (${tot}h). Differenza: ${Math.round((tot-batt)*100)/100}h</div>`;return;}

  // Validazione: orario non valido (turno da 0 ore)
  if(OraInizio===OraFine){msg.innerHTML=`<div class="alert aerr">Orario non valido: OraInizio e OraFine non possono coincidere.</div>`;return;}

  const{data:old}=await sb.from('TurniGiornalieri').select('ID_Turno').eq('ID_Dipendente',ID_Dipendente).eq('DataInizio',DataInizio).eq('ID_Magazzino',MAGAZZINO_ATTIVO).maybeSingle();

  // CONTROLLO SOVRAPPOSIZIONI: blocca se il dipendente ha già un altro turno che si accavalla
  // nello stesso intervallo orario (anche a cavallo di mezzanotte). Se stiamo modificando un
  // turno esistente (old presente con stesso ID), lo escludiamo dal controllo su sé stesso.
  const idDaEscludere=old?old.ID_Turno:null;
  const conflitti=await trovaTurniSovrapposti(ID_Dipendente,DataInizio,OraInizio,OraFine,idDaEscludere);
  if(conflitti.length){
    const elenco=conflitti.map(c=>`Turno #${c.ID_Turno}: ${fmtDataIT(c.DataInizio)} ${c.OraInizio||'—'}-${c.OraFine||'—'}`).join('<br>');
    msg.innerHTML=`<div class="alert aerr">⚠ Sovrapposizione rilevata: questo dipendente ha già un turno che si accavalla con l'orario inserito:<br>${elenco}<br><br>Correggi l'orario o elimina/modifica il turno in conflitto prima di salvare.</div>`;
    return;
  }

  if(old){
    await sb.from('BattesimiTurno').delete().eq('ID_Turno',old.ID_Turno);
    await sb.from('TurniGiornalieri').delete().eq('ID_Turno',old.ID_Turno);
  }
  const{data:turno,error:et}=await sb.from('TurniGiornalieri').insert({ID_Dipendente,DataInizio,OraInizio,OraFine,Ore_A,Ore_B,ID_Magazzino:MAGAZZINO_ATTIVO}).select().single();
  if(et){msg.innerHTML=`<div class="alert aerr">${et.message}</div>`;return;}
  for(let i=0;i<_righe.length;i++){
    const r=_righe[i];
    await sb.from('BattesimiTurno').insert({ID_Turno:turno.ID_Turno,OrdineRiga:i+1,ID_Reparto:r.ID_Reparto,ID_Attivita:r.ID_Attivita,OreBattezzate:parseFloat(r.OreBattezzate),Note:r.Note||''});
  }
  for(const p of _preBatt){
    await sb.from('BattesimiTurno').insert({ID_Turno:turno.ID_Turno,OrdineRiga:99,ID_Reparto:p.ID_Reparto,ID_Attivita:p.ID_Attivita,OreBattezzate:p.OreBattezzate,Note:p.Note||''});
    await sb.from('BattesimiPreTurno').delete().eq('id',p.id);
  }
  toast('✔ Turno salvato');resetIns();aggRiepilogoGiorno();caricaUltimiTurni();
}

function resetIns(){
  ['i-dip','i-data','i-ini','i-fin','i-oretot'].forEach(x=>{const e=document.getElementById(x);if(e)e.value='';});
  const cb=document.getElementById('cbatt'),bav=document.getElementById('bavanza');
  if(cb)cb.style.display='none';if(bav)bav.style.display='block';
  _righe=[];_preBatt=[];
}
async function modificaTurno(id){
  // Carica testata turno
  const{data:g,error:eg}=await sb.from('TurniGiornalieri').select('*').eq('ID_Turno',id).single();
  if(eg||!g){toast('Turno non trovato','err');return;}
  // Carica battesimi esistenti (escludi pre-batt OrdineRiga=99)
  const{data:bs}=await sb.from('BattesimiTurno').select('*').eq('ID_Turno',id).order('OrdineRiga');
  const bsNorm=(bs||[]).filter(b=>b.OrdineRiga!==99);

  // Precompila form testata
  const ed=document.getElementById('i-dip');
  const edata=document.getElementById('i-data');
  const eini=document.getElementById('i-ini');
  const efin=document.getElementById('i-fin');
  const msg=document.getElementById('imsg');
  if(!ed){toast('Apri prima il tab Inserimento','warn');return;}
  ed.value=g.ID_Dipendente;
  edata.value=g.DataInizio;
  eini.value=g.OraInizio||'';
  efin.value=g.OraFine||'';
  calcT();
  await caricaPreAdmin();

  // Precompila righe battesimo (solo righe normali, pre-batt gestiti da caricaPreAdmin)
  _righe=bsNorm.map(b=>({ID_Reparto:b.ID_Reparto,ID_Attivita:b.ID_Attivita,OreBattezzate:b.OreBattezzate,Note:b.Note||''}));
  if(!_righe.length)_righe=[{ID_Reparto:'',ID_Attivita:'',OreBattezzate:'',Note:''}];

  // Mostra sezione battesimo
  const cbatt=document.getElementById('cbatt');
  const bavanza=document.getElementById('bavanza');
  if(cbatt)cbatt.style.display='block';
  if(bavanza)bavanza.style.display='none';
  renderRighe();aggBar();
  aggRiepilogoGiorno();

  // Avviso
  if(msg)msg.innerHTML='<div class="alert awarn">⚠ Stai modificando il turno del '+g.DataInizio+' — il salvataggio sostituirà i battesimi esistenti. Le ore totali devono corrispondere agli orari.</div>';

  // Scroll al form
  document.querySelector('.card').scrollIntoView({behavior:'smooth'});
}

async function eliminaTurno(id){
  if(!confirm('Eliminare questo turno e tutti i suoi battesimi?'))return;
  await sb.from('BattesimiTurno').delete().eq('ID_Turno',id);
  await sb.from('TurniGiornalieri').delete().eq('ID_Turno',id);
  toast('Eliminato','warn');
  if(document.getElementById('riepilogo-giorno')){aggRiepilogoGiorno();caricaUltimiTurni();}
  else showTab('ti');
}

function aggTipiProd(){
  const id=document.getElementById('p-rep')?.value||'';
  const el=document.getElementById('p-tipo');
  if(el)el.innerHTML=`<option value="">— Seleziona —</option>${optTipiProd(id)}`;
}

async function salvaProdRep(){
  const DataProduzione=document.getElementById('p-data').value;
  const ID_Reparto=document.getElementById('p-rep').value;
  const ID_TipoProduzione=document.getElementById('p-tipo').value;
  const Quantita=parseFloat(document.getElementById('p-qty').value);
  const Notturno=document.getElementById('p-turno').value==='true';
  const msg=document.getElementById('pmsg');
  if(!DataProduzione||!ID_Reparto||!ID_TipoProduzione||!Quantita){
    msg.innerHTML='<div class="alert aerr">Compila tutti i campi.</div>';return;
  }
  const{error}=await sb.from('ProduzioneReparti').insert({DataProduzione,ID_Reparto,ID_TipoProduzione,Quantita,Notturno,ID_Magazzino:MAGAZZINO_ATTIVO});
  if(error){msg.innerHTML=`<div class="alert aerr">${error.message}</div>`;return;}
  toast('✔ Produzione salvata');showTab('tprod');
}

async function eliminaProdRep(id){
  if(!confirm('Eliminare?'))return;
  await sb.from('ProduzioneReparti').delete().eq('ID_Produzione',id);
  toast('Eliminato','warn');showTab('tprod');
}

async function importaProduzione(e){
  const file=e.target.files[0];if(!file)return;
  const msg=document.getElementById('import-msg');
  msg.innerHTML='<div class="alert awarn">Elaborazione file...</div>';
  try{
    const{read,utils}=await import('https://cdn.sheetjs.com/xlsx-0.20.1/package/xlsx.mjs');
    const ab=await file.arrayBuffer();
    const wb=read(ab);
    const ws=wb.Sheets[wb.SheetNames[0]];
    const rows=utils.sheet_to_json(ws);
    let ok=0,skip=0;
    for(const row of rows){
      const DataProduzione=row['DataProduzione']||row['Data']||row['data']||row['Giorno']||row['giorno'];
      // Operatore può arrivare come numero puro (CodiceVoice) o come stringa tipo
      // "0023063 NEXUS 23063" (export Tigros) — estrae il primo numero trovato
      const operatoreRaw=row['CodiceVoice']||row['codice_voice']||row['Operatore']||row['operatore'];
      let CodiceVoice=operatoreRaw;
      if(typeof operatoreRaw==='string'){
        const m=operatoreRaw.match(/\d+/);
        CodiceVoice=m?parseInt(m[0],10):null;
      } else if(typeof operatoreRaw==='number'){
        CodiceVoice=operatoreRaw;
      }
      // Colli: prende SOLO la colonna "Colli in uscita - Eterogenei" (colonna C del file Tigros)
      // Ignora deliberatamente le altre colonne extra del file (Omogenei, Volumi, Pallet, ecc.)
      let colliRaw=row['Colli']||row['colli']||row['Colli in uscita - Eterogenei'];
      if(colliRaw===undefined||colliRaw===null||colliRaw===''){skip++;continue;} // riga senza dato in colonna C: scarta
      let Colli=colliRaw;
      if(typeof colliRaw==='string'){
        Colli=parseFloat(colliRaw.replace(/\./g,'').replace(',','.'));
      }
      const ID_Attivita=row['ID_Attivita']||row['id_attivita']||15;
      if(!DataProduzione||!CodiceVoice){skip++;continue;}
      // normalizza data
      let dataNorm=DataProduzione;
      if(typeof DataProduzione==='number'){
        const d=new Date(Math.round((DataProduzione-25569)*86400*1000));
        dataNorm=d.toISOString().split('T')[0];
      } else if(typeof DataProduzione==='string'&&DataProduzione.includes('/')){
        const p=DataProduzione.split('/');
        dataNorm=`${p[2]}-${p[1].padStart(2,'0')}-${p[0].padStart(2,'0')}`;
      }
      const{error}=await sb.from('ProduzioneOperatori').insert({
        DataProduzione:dataNorm,
        CodiceVoice:parseInt(CodiceVoice),
        ID_Attivita:parseInt(ID_Attivita),
        Colli:parseFloat(Colli),
        ID_Magazzino:MAGAZZINO_ATTIVO
      });
      if(error)skip++;else ok++;
    }
    msg.innerHTML=`<div class="alert aok">✔ Importati ${ok} record. ${skip>0?`${skip} saltati.`:''}</div>`;
  }catch(err){
    msg.innerHTML=`<div class="alert aerr">Errore importazione: ${err.message}</div>`;
  }
}

async function caricaReportOperativo(){
  const dal=document.getElementById('op-dal').value;
  const al=document.getElementById('op-al').value;
  const frep=document.getElementById('op-rep').value;
  const cont=document.getElementById('op-content');
  cont.innerHTML='<div class="loading">⏳ Caricamento dati...</div>';

  // Carica turni del periodo con paginazione keyset
  let ggs=[];
  {
    let lastId=0;
    while(true){
      let q=sb.from('TurniGiornalieri').select('ID_Turno,DataInizio')
        .eq('ID_Magazzino',MAGAZZINO_ATTIVO)
        .gt('ID_Turno',lastId)
        .order('ID_Turno',{ascending:true})
        .limit(1000);
      if(dal)q=q.gte('DataInizio',dal);
      if(al)q=q.lte('DataInizio',al);
      const{data:batch,error}=await q;
      if(error||!batch||!batch.length)break;
      ggs=[...ggs,...batch];
      if(batch.length<1000)break;
      lastId=batch[batch.length-1].ID_Turno;
    }
  }
  if(!ggs.length){cont.innerHTML='<div class="empty">Nessun turno nel periodo selezionato.</div>';return;}

  // Mappa ID_Turno -> DataInizio per attribuire le ore al giorno del turno
  const dataDelTurno={};
  ggs.forEach(g=>dataDelTurno[g.ID_Turno]=g.DataInizio);
  const idTurni=ggs.map(g=>g.ID_Turno);

  // Carica battesimi a blocchi da 500 ID_Turno
  let batsAll=[];
  {
    const chunkSize=500;
    const chunks=[];
    for(let i=0;i<idTurni.length;i+=chunkSize)chunks.push(idTurni.slice(i,i+chunkSize));
    const results=await Promise.all(chunks.map(chunk=>sb.from('BattesimiTurno').select('ID_Turno,ID_Reparto,OreBattezzate').in('ID_Turno',chunk)));
    results.forEach(({data})=>{if(data&&data.length)batsAll=[...batsAll,...data];});
  }

  // Carica produzione reparti del periodo (esclude Economia rep.4)
  let qpr=sb.from('ProduzioneReparti').select('DataProduzione,ID_Reparto,Quantita,ID_TipoProduzione,Notturno').eq('ID_Magazzino',MAGAZZINO_ATTIVO).neq('ID_Reparto',4);
  if(dal)qpr=qpr.gte('DataProduzione',dal);
  if(al)qpr=qpr.lte('DataProduzione',al);
  if(frep)qpr=qpr.eq('ID_Reparto',frep);
  const{data:prods}=await qpr;

  const{data:tariffeProd}=await sb.from('TariffeProduzione').select('*').eq('ID_Magazzino',MAGAZZINO_ATTIVO);

  // Aggrega ORE per (data, reparto) — esclude Economia
  const oreMap={}; // key: data|reparto -> ore
  batsAll.forEach(b=>{
    if(b.ID_Reparto==4)return; // escludi Economia
    if(frep && b.ID_Reparto!=frep)return;
    const data=dataDelTurno[b.ID_Turno];
    if(!data)return;
    const k=data+'|'+b.ID_Reparto;
    oreMap[k]=(oreMap[k]||0)+(b.OreBattezzate||0);
  });

  // Aggrega QUANTITA e RICAVO per (data, reparto)
  const qtaMap={}, ricavoMap={};
  (prods||[]).forEach(p=>{
    const k=p.DataProduzione+'|'+p.ID_Reparto;
    qtaMap[k]=(qtaMap[k]||0)+(p.Quantita||0);
    // ricavo (stesso metodo del report principale: tariffa per tipo+giorno+turno)
    const t=tariffeProd?.filter(x=>x.ID_TipoProduzione==p.ID_TipoProduzione&&(!x.DataFine||x.DataFine>=p.DataProduzione)&&(!x.DataInizio||x.DataInizio<=p.DataProduzione));
    if(t&&t.length){
      const fest=_isFestivoFast(p.DataProduzione);
      const tg=fest?'Festivo':'Feriale';
      const tt=p.Notturno?'Notturno':'Diurno';
      const tf=t.find(x=>x.TipoGiorno===tg&&x.TipoTurno===tt)||t.find(x=>x.TipoGiorno===tg&&x.TipoTurno==='Tutti')||t.find(x=>x.TipoGiorno==='Tutti'&&x.TipoTurno===tt)||t.find(x=>x.TipoGiorno==='Tutti'&&x.TipoTurno==='Tutti')||t[0];
      if(tf)ricavoMap[k]=(ricavoMap[k]||0)+p.Quantita*tf.Tariffa;
    }
  });

  // Unione di tutte le chiavi data|reparto trovate (da ore o da produzione)
  const tutteChiavi=new Set([...Object.keys(oreMap),...Object.keys(qtaMap)]);
  const righeGiorno=[...tutteChiavi].map(k=>{
    const[data,rep]=k.split('|');
    const ore=oreMap[k]||0;
    const qta=qtaMap[k]||0;
    const ricavo=ricavoMap[k]||0;
    return{data,rep:Number(rep),ore,qta,euroOra:ore>0?ricavo/ore:0,colliOra:ore>0?qta/ore:0};
  }).filter(r=>r.rep!=4).sort((a,b)=>a.data.localeCompare(b.data)||a.rep-b.rep);

  if(!righeGiorno.length){cont.innerHTML='<div class="empty">Nessun dato nel periodo selezionato.</div>';return;}

  // Totali per reparto (aggregato sul periodo)
  const totPerRep={};
  righeGiorno.forEach(r=>{
    if(!totPerRep[r.rep])totPerRep[r.rep]={ore:0,qta:0,ricavo:0};
    totPerRep[r.rep].ore+=r.ore;
    totPerRep[r.rep].qta+=r.qta;
    totPerRep[r.rep].ricavo+=(ricavoMap[r.data+'|'+r.rep]||0);
  });

  const rigaGiornoHtml=righeGiorno.map(r=>`<tr>
    <td>${fmtDataIT(r.data)}</td>
    <td><span class="pill py">${nomeRep(r.rep)}</span></td>
    <td>${fmtN(r.ore,2)}h</td>
    <td>${fmtN(r.qta,0)}</td>
    <td><strong>${fmtN(r.colliOra,1)}</strong></td>
    <td><strong>${fmtEuro(r.euroOra)}</strong></td>
  </tr>`).join('');

  const totRepHtml=Object.entries(totPerRep).map(([rep,v])=>`<tr>
    <td><span class="pill pg">${nomeRep(Number(rep))}</span></td>
    <td>${fmtN(v.ore,2)}h</td>
    <td>${fmtN(v.qta,0)}</td>
    <td><strong>${v.ore>0?fmtN(v.qta/v.ore,1):'—'}</strong></td>
    <td><strong>${v.ore>0?fmtEuro(v.ricavo/v.ore):'—'}</strong></td>
  </tr>`).join('');

  cont.innerHTML=`
  <div class="card">
    <div class="ct">Totali per reparto <span style="font-weight:400;font-size:0.78rem;color:var(--grigio);">(periodo aggregato)</span></div>
    <div class="tw"><table>
      <thead><tr><th>Reparto</th><th>Ore tot.</th><th>Quantità tot.</th><th>Colli/ora</th><th>€/ora</th></tr></thead>
      <tbody>${totRepHtml}</tbody>
    </table></div>
  </div>
  <div class="card">
    <div class="ct">Dettaglio giornaliero <span style="font-weight:400;font-size:0.78rem;color:var(--grigio);">(${righeGiorno.length} righe)</span></div>
    <div class="tw"><table>
      <thead><tr><th>Data</th><th>Reparto</th><th>Ore</th><th>Quantità</th><th>Colli/ora</th><th>€/ora</th></tr></thead>
      <tbody>${rigaGiornoHtml}</tbody>
    </table></div>
  </div>`;
}

function fmtDataIT(d){
  if(!d)return '—';
  const[y,m,g]=d.split('-');
  return `${g}/${m}/${y}`;
}

// Calcola le ore per tipologia di un singolo battesimo
// basandosi sull'orario di inizio effettivo del battesimo nella timeline del turno
// Cache festivi per evitare ricalcoli ripetuti
const _festiviCache={};
function _isFestivoFast(dateStr){
  if(_festiviCache[dateStr]!==undefined)return _festiviCache[dateStr];
  const d=new Date(dateStr+'T00:00:00');
  if(d.getDay()===0){_festiviCache[dateStr]=true;return true;}
  const mm=String(d.getMonth()+1).padStart(2,'0');
  const dd=String(d.getDate()).padStart(2,'0');
  const fissi=['01-01','06-01','04-25','05-01','06-02','08-15','11-01','12-08','12-25','12-26'];
  if(fissi.includes(mm+'-'+dd)){_festiviCache[dateStr]=true;return true;}
  const y=d.getFullYear();
  const a=y%19,b=Math.floor(y/100),c=y%100,dv=Math.floor(b/4),e=b%4,f=Math.floor((b+8)/25),g=Math.floor((b-f+1)/3),h=(19*a+b-dv-g+15)%30,i=Math.floor(c/4),k=c%4,l=(32+2*e+2*i-h-k)%7,mv=Math.floor((a+11*h+22*l)/451),n=h+l-7*mv+114;
  const pasqua=new Date(y,Math.floor(n/31)-1,(n%31)+1);
  const pasquetta=new Date(pasqua);pasquetta.setDate(pasquetta.getDate()+1);
  const fmt=(dt)=>String(dt.getMonth()+1).padStart(2,'0')+'-'+String(dt.getDate()).padStart(2,'0');
  const r=(mm+'-'+dd)===fmt(pasqua)||(mm+'-'+dd)===fmt(pasquetta);
  _festiviCache[dateStr]=r;return r;
}

// Cache date offset per evitare new Date() ripetuti
const _dateOffsetCache={};
function _dateAddDays(baseStr, days){
  const k=baseStr+'_'+days;
  if(_dateOffsetCache[k])return _dateOffsetCache[k];
  const d=new Date(baseStr+'T00:00:00');
  d.setDate(d.getDate()+days);
  // Usa data locale (non UTC) per evitare sfasamento fuso orario
  const yy=d.getFullYear();
  const mm=String(d.getMonth()+1).padStart(2,'0');
  const dd=String(d.getDate()).padStart(2,'0');
  const r=`${yy}-${mm}-${dd}`;
  _dateOffsetCache[k]=r;return r;
}

// Calcolo algebrico per intersezione intervalli — sostituisce il loop minuto per minuto
// Stessa precisione, 100x più veloce
// Come calcolaOreBattesimoPerTipologia, ma restituisce il breakdown PER GIORNO
// (data, oreGiorno=diurne+festive, oreNotte=notturne+notte-festive) invece dei soli totali.
// Usata dall'Archivio Operativo per il dettaglio giornaliero diurno/notturno.
function _giorniDelBattesimo(turno, battesimi_turno_ordinati, idx_battesimo){
  const oraInizioTurno=turno.OraInizio;
  if(!oraInizioTurno){
    // fallback: nessun orario, tutto il battesimo viene attribuito a DataInizio del turno
    const bat=battesimi_turno_ordinati[idx_battesimo];
    return[{data:turno.DataInizio,oreGiorno:bat?.OreBattezzate||0,oreNotte:0}];
  }
  function toMin(hhmm){if(!hhmm)return 0;const[h,m]=(hhmm||'00:00').split(':').map(Number);return h*60+m;}
  let cur=toMin(oraInizioTurno);
  const offsets=battesimi_turno_ordinati.map(b=>{const s=cur;cur+=(b.OreBattezzate||0)*60;return{s,e:cur};});
  const myBat=offsets[idx_battesimo];
  if(!myBat)return[];

  const NOTTE_INI=22*60, NOTTE_FIN=6*60, DAY=24*60;
  function intersect(a,b,c,d){return Math.max(0,Math.min(b,d)-Math.max(a,c));}

  const dayStart=Math.floor(myBat.s/DAY);
  const dayEnd=Math.floor((myBat.e-0.001)/DAY);
  const risultato=[];

  for(let g=dayStart;g<=dayEnd;g++){
    const segS=Math.max(myBat.s,g*DAY), segE=Math.min(myBat.e,(g+1)*DAY);
    if(segS>=segE)continue;
    const dateStr=_dateAddDays(turno.DataInizio,g);
    const n1s=g*DAY+0, n1e=g*DAY+NOTTE_FIN;
    const n2s=g*DAY+NOTTE_INI, n2e=(g+1)*DAY;
    const minNotte=intersect(segS,segE,n1s,n1e)+intersect(segS,segE,n2s,n2e);
    const minGiorno=(segE-segS)-minNotte;
    risultato.push({data:dateStr,oreGiorno:minGiorno/60,oreNotte:minNotte/60});
  }
  return risultato;
}

function calcolaOreBattesimoPerTipologia(turno, battesimi_turno_ordinati, idx_battesimo, data_turno, periodoDal, periodoAl){
  const oraInizioTurno=turno.OraInizio;
  if(!oraInizioTurno)return calcolaOreBattesimoProporzione(turno,battesimi_turno_ordinati[idx_battesimo]);

  function toMin(hhmm){if(!hhmm)return 0;const[h,m]=(hhmm||'00:00').split(':').map(Number);return h*60+m;}

  // Posiziona ogni battesimo nella timeline (minuti assoluti dall'inizio turno)
  let cur=toMin(oraInizioTurno);
  const offsets=battesimi_turno_ordinati.map(b=>{
    const s=cur; cur+=(b.OreBattezzate||0)*60; return{s,e:cur};
  });
  const myBat=offsets[idx_battesimo];
  if(!myBat)return{ord:0,notte:0,fest:0,notteFest:0};

  const NOTTE_INI=22*60; // 1320
  const NOTTE_FIN=6*60;  // 360
  const DAY=24*60;        // 1440

  let oreOrd=0,oreNotte=0,oreFest=0,oreNotteFest=0;

  // Calcola intersezione tra due intervalli [a,b) e [c,d) → minuti di sovrapposizione
  function intersect(a,b,c,d){return Math.max(0,Math.min(b,d)-Math.max(a,c));}

  // Suddividi il battesimo in segmenti giornalieri e calcola algebricamente
  const dayStart=Math.floor(myBat.s/DAY);
  const dayEnd=Math.floor((myBat.e-0.001)/DAY);

  for(let g=dayStart;g<=dayEnd;g++){
    const segS=Math.max(myBat.s, g*DAY);
    const segE=Math.min(myBat.e,(g+1)*DAY);
    if(segS>=segE)continue;

    const dateStr=_dateAddDays(data_turno,g);

    // Filtra per data di competenza: include solo ore che cadono nel periodo richiesto
    if(periodoDal && dateStr<periodoDal)continue;
    if(periodoAl && dateStr>periodoAl)continue;

    const fest=_isFestivoFast(dateStr);

    // Minuti notturni in questo giorno: [0, NOTTE_FIN) e [NOTTE_INI, DAY)
    // espressi come minuti assoluti nel giorno g
    const n1s=g*DAY+0,      n1e=g*DAY+NOTTE_FIN;  // mezzanotte→06:00
    const n2s=g*DAY+NOTTE_INI, n2e=(g+1)*DAY;     // 22:00→mezzanotte

    const minNotte=intersect(segS,segE,n1s,n1e)+intersect(segS,segE,n2s,n2e);
    const minGiorno=(segE-segS)-minNotte;

    const oN=minNotte/60, oG=minGiorno/60;
    if(fest){oreFest+=oG; oreNotteFest+=oN;}
    else{oreOrd+=oG; oreNotte+=oN;}
  }
  return{ord:oreOrd,notte:oreNotte,fest:oreFest,notteFest:oreNotteFest};
}

function calcolaOreBattesimoProporzione(turno, battesimo){
  // fallback senza orario: proporziona le ore dettagliate del turno
  const totTurno=Math.max(1,(turno.Ore_A||0)+(turno.Ore_B||0));
  const ratio=(battesimo.OreBattezzate||0)/totTurno;
  const oreOrdTurno=Math.max(0,totTurno-(turno.OreNotte_A||0)-(turno.OreNotte_B||0)-(turno.OreFestive_A||0)-(turno.OreFestive_B||0)-(turno.OreNotteFestive_A||0)-(turno.OreNotteFestive_B||0));
  return {
    ord: oreOrdTurno*ratio,
    notte: ((turno.OreNotte_A||0)+(turno.OreNotte_B||0))*ratio,
    fest: ((turno.OreFestive_A||0)+(turno.OreFestive_B||0))*ratio,
    notteFest: ((turno.OreNotteFestive_A||0)+(turno.OreNotteFestive_B||0))*ratio
  };
}

async function caricaReport(){
  const dal=document.getElementById('rp-dal').value;
  const al=document.getElementById('rp-al').value;
  const frep=document.getElementById('rp-rep').value;
  const cont=document.getElementById('report-content');
  cont.innerHTML='<div class="loading">⏳ Elaborazione dati...</div>';

  // Numero di giorni del periodo
  const dataD=new Date(dal||'2026-01-01');
  const dataA=new Date(al||oggi());
  const numGiorni=Math.max(1,Math.round((dataA-dataD)/(1000*60*60*24))+1);

  // Carica dalla view BattesimiConData — allarga il filtro di 2 giorni per catturare
  // turni che iniziano prima del periodo ma hanno ore che cadono nel periodo (es. turno 30/04 con ore il 01/05)
  cont.innerHTML='<div class="loading">⏳ Caricamento dati...</div>';
  function addDays(dateStr, days){
    const d=new Date(dateStr+'T00:00:00');
    d.setDate(d.getDate()+days);
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  }
  const dalExt=dal?addDays(dal,-2):null;  // 2 giorni prima
  const alExt=al?addDays(al,1):null;       // 1 giorno dopo (turni notturni a cavallo)
  let batsAll=[];
  {
    let lastId=0;
    while(true){
      let q=sb.from('BattesimiConData')
        .select('*')
        .eq('ID_Magazzino',MAGAZZINO_ATTIVO)
        .gt('ID_Battesimo',lastId)
        .order('ID_Battesimo',{ascending:true})
        .limit(1000);
      if(dalExt)q=q.gte('DataInizio',dalExt);
      if(alExt)q=q.lte('DataInizio',alExt);
      const{data:batch,error}=await q;
      if(error){console.error('Errore BattesimiConData:',error);break;}
      if(!batch||!batch.length)break;
      batsAll=[...batsAll,...batch];
      if(batch.length<1000)break;
      lastId=batch[batch.length-1].ID_Battesimo;
    }
  }
  if(!batsAll.length){cont.innerHTML='<div class="empty">Nessun turno nel periodo selezionato.</div>';return;}

  // Ricostruisce ggs (turni unici) e batsByTurno dalla view
  const turniMap={};
  batsAll.forEach(b=>{
    if(!turniMap[b.ID_Turno])turniMap[b.ID_Turno]={
      ID_Turno:b.ID_Turno, ID_Dipendente:b.ID_Dipendente,
      DataInizio:b.DataInizio, OraInizio:b.OraInizio, OraFine:b.OraFine,
      Ore_A:b.Ore_A, Ore_B:b.Ore_B,
      OreNotte_A:b.OreNotte_A, OreNotte_B:b.OreNotte_B,
      OreFestive_A:b.OreFestive_A, OreFestive_B:b.OreFestive_B,
      OreNotteFestive_A:b.OreNotteFestive_A, OreNotteFestive_B:b.OreNotteFestive_B
    };
  });
  const ggs=Object.values(turniMap);
  console.log(`Turni:${ggs.length} Battesimi:${batsAll.length}`);

  // Tariffe e produzione in parallelo
  const[
    {data:tariffeEco},{data:tariffeProd},{data:costiMezzi},{data:prods},{data:prodOp}
  ]=await Promise.all([
    sb.from('TariffeEconomia').select('*'),
    sb.from('TariffeProduzione').select('*').eq('ID_Magazzino',MAGAZZINO_ATTIVO),
    sb.from('CostiMezziReparti').select('*').eq('ID_Magazzino',MAGAZZINO_ATTIVO),
    (()=>{let q=sb.from('ProduzioneReparti').select('*').eq('ID_Magazzino',MAGAZZINO_ATTIVO);if(dal)q=q.gte('DataProduzione',dal);if(al)q=q.lte('DataProduzione',al);if(frep)q=q.eq('ID_Reparto',frep);return q;})(),
    sb.from('ProduzioneOperatori').select('*').eq('ID_Magazzino',MAGAZZINO_ATTIVO).gte('DataProduzione',dal||'2020-01-01').lte('DataProduzione',al||oggi()).eq('ID_Attivita',15)
  ]);

  // Raggruppa battesimi per turno in ordine cronologico
  const batsByTurno={};
  (batsAll||[]).forEach(b=>{
    if(!batsByTurno[b.ID_Turno])batsByTurno[b.ID_Turno]=[];
    batsByTurno[b.ID_Turno].push(b);
  });
  Object.values(batsByTurno).forEach(arr=>arr.sort((a,b)=>a.OrdineRiga-b.OrdineRiga));

  // =============================================================
  // CALCOLO COSTO E RICAVO PER BATTESIMO (logica cronologica)
  // Ogni battesimo occupa una fetta temporale in sequenza nel turno.
  // Le fasce orarie (ordinaria 06-22, notturna 22-06, festiva, notte-festiva)
  // vengono assegnate minuto per minuto in base all'orario reale.
  // =============================================================
  const costoPerReparto={};
  const ricavoPerReparto={};
  const costoPerDipMap={};
  let costoTotale=0, ricavoTotale=0;

  (ggs||[]).forEach(turno=>{
    const bats=batsByTurno[turno.ID_Turno]||[];
    if(!bats.length)return;
    const d=_dips.find(x=>x.ID_Dipendente==turno.ID_Dipendente);
    if(!d)return;

    // Tariffa costo dipendente
    const lv=_livelli.filter(x=>
      x.ID_Livello==d.ID_Livello&&
      (!x.DataFine||x.DataFine>=turno.DataInizio)&&
      (!x.DataInizio||x.DataInizio<=turno.DataInizio)
    ).sort((a,b)=>(b.DataInizio||'').localeCompare(a.DataInizio||''))[0]||
    _livelli.find(x=>x.ID_Livello==d.ID_Livello);

    const contDip=_contratti.find(x=>x.ID_Contratto==d.ID_Contratto);
    const costoBase=lv?.CostoOrarioBase||0;
    const maggiorN=contDip?.MaggiorazioneNotturno||0;
    const maggiorF=contDip?.MaggiorazioneFestivo||0;
    const maggiorNF=contDip?.MaggiorazioneNotteFestivo||0;

    // Tariffa ricavo economia
    const te=tariffeEco?.filter(x=>
      x.ID_Contratto==d.ID_Contratto&&
      x.DataInizio<=turno.DataInizio&&
      (!x.DataFine||x.DataFine>=turno.DataInizio)
    ).sort((a,z)=>z.DataInizio.localeCompare(a.DataInizio))[0];

    // Calcolo algebrico per fascia oraria — preciso per turni multi-reparto
    const tipsCache=bats.map((_,idx)=>calcolaOreBattesimoPerTipologia(turno,bats,idx,turno.DataInizio,dal,al));

    bats.forEach((bat,idx)=>{
      const rep=bat.ID_Reparto;
      const tip=tipsCache[idx];

      // COSTO (tariffa contratto dipendente)
      const costo=tip.ord*costoBase+tip.notte*costoBase*(1+maggiorN)+tip.fest*costoBase*(1+maggiorF)+tip.notteFest*costoBase*(1+maggiorNF);

      // Accumula solo se reparto corrisponde al filtro (o nessun filtro)
      if(!frep||rep==frep){
        costoTotale+=costo;
        if(!costoPerReparto[rep])costoPerReparto[rep]={costo:0,ore:0,oreNotte:0,oreFest:0,oreNotteFest:0};
        costoPerReparto[rep].costo+=costo;
        const oreNelPeriodo=tip.ord+tip.notte+tip.fest+tip.notteFest; // solo ore che cadono nel periodo
        costoPerReparto[rep].ore+=oreNelPeriodo;
        costoPerReparto[rep].oreNotte+=tip.notte;
        costoPerReparto[rep].oreFest+=tip.fest;
        costoPerReparto[rep].oreNotteFest+=tip.notteFest;

        // Costo per dipendente
        if(!costoPerDipMap[d.ID_Dipendente])costoPerDipMap[d.ID_Dipendente]={nome:d.Nome,ore:0,oreNotte:0,oreFest:0,costo:0};
        costoPerDipMap[d.ID_Dipendente].ore+=oreNelPeriodo;
        costoPerDipMap[d.ID_Dipendente].oreNotte+=tip.notte;
        costoPerDipMap[d.ID_Dipendente].oreFest+=tip.fest;
        costoPerDipMap[d.ID_Dipendente].costo+=costo;
      }

      // RICAVO ECONOMIA (rep 4)
      if(rep==4 && te && (!frep||rep==frep)){
        const ric=tip.ord*(te.TariffaOrdinaria||0)+tip.notte*(te.TariffaNotturna||0)+tip.fest*(te.TariffaFestiva||0)+tip.notteFest*(te.TariffaNotteFestiva||0);
        if(!ricavoPerReparto[rep])ricavoPerReparto[rep]={ricavo:0};
        ricavoPerReparto[rep].ricavo+=ric;
        ricavoTotale+=ric;
      }
    });
  });

  // RICAVO PRODUZIONE (reparti non-economia)
  // Usa TipoGiorno (Feriale/Festivo) + TipoTurno (Diurno/Notturno) per trovare la tariffa corretta
  let fattProduzione=0;
  (prods||[]).forEach(p=>{
    const t=tariffeProd?.filter(x=>x.ID_TipoProduzione==p.ID_TipoProduzione&&(!x.DataFine||x.DataFine>=p.DataProduzione)&&(!x.DataInizio||x.DataInizio<=p.DataProduzione));
    if(!t||!t.length)return;
    const festivo=_isFestivoFast(p.DataProduzione);
    const tipoGiorno=festivo?'Festivo':'Feriale';
    const tipoTurno=p.Notturno?'Notturno':'Diurno';
    // priorità: corrispondenza esatta giorno+turno → giorno+Tutti → Tutti+turno → Tutti+Tutti → primo disponibile
    const tf=
      t.find(x=>x.TipoGiorno===tipoGiorno&&x.TipoTurno===tipoTurno)||
      t.find(x=>x.TipoGiorno===tipoGiorno&&x.TipoTurno==='Tutti')||
      t.find(x=>x.TipoGiorno==='Tutti'&&x.TipoTurno===tipoTurno)||
      t.find(x=>x.TipoGiorno==='Tutti'&&x.TipoTurno==='Tutti')||
      t[0];
    if(!tf)return;
    const val=p.Quantita*tf.Tariffa;
    fattProduzione+=val;
    if(!ricavoPerReparto[p.ID_Reparto])ricavoPerReparto[p.ID_Reparto]={ricavo:0};
    ricavoPerReparto[p.ID_Reparto].ricavo+=val;
  });
  ricavoTotale+=fattProduzione;

  // COSTO MEZZI ripartito sui giorni selezionati
  let costoMezziTot=0;
  const costoMezziPerRep={};
  (costiMezzi||[]).forEach(cm=>{
    if(frep && cm.ID_Reparto!=frep)return;
    if(cm.DataFine && cm.DataFine<dal)return;
    if(cm.DataInizio && cm.DataInizio>al)return;
    const costoRipartito=(cm.CostoGiornaliero||0)*numGiorni;
    costoMezziTot+=costoRipartito;
    if(!costoMezziPerRep[cm.ID_Reparto])costoMezziPerRep[cm.ID_Reparto]=0;
    costoMezziPerRep[cm.ID_Reparto]+=costoRipartito;
  });

  const margineOperativo=ricavoTotale-costoTotale-costoMezziTot;
  const totOre=Object.values(costoPerReparto).reduce((a,v)=>a+v.ore,0);

  // PRODUTTIVITA' att.15
  const totColliAtt15=(prodOp||[]).reduce((a,p)=>a+p.Colli,0);
  const oreAtt15=(batsAll||[]).filter(b=>b.ID_Attivita==15&&(!frep||b.ID_Reparto==frep)).reduce((a,b)=>a+(b.OreBattezzate||0),0);
  const produttivita=oreAtt15>0?Math.round(totColliAtt15/oreAtt15):0;

  // =============================================================
  // TABELLE
  // =============================================================
  const righeContoEco=Object.keys({...costoPerReparto,...ricavoPerReparto})
    .filter((v,i,a)=>a.indexOf(v)===i).sort((a,b)=>a-b).map(rep=>{
    const c=costoPerReparto[rep]||{costo:0,ore:0,oreNotte:0,oreFest:0};
    const r=ricavoPerReparto[rep]||{ricavo:0};
    const cm=costoMezziPerRep[rep]||0;
    const margRep=r.ricavo-c.costo-cm;
    return `<tr>
      <td><span class="pill py">${nomeRep(rep)}</span></td>
      <td>${fmtN(c.ore,2)}h</td>
      <td>${fmtN(c.oreNotte,2)}h</td>
      <td>${fmtN(c.oreFest,2)}h</td>
      <td>${fmtEuro(c.costo)}</td>
      <td>${fmtEuro(r.ricavo)}</td>
      <td>${fmtEuro(cm)}</td>
      <td><strong class="${margRep>=0?'cg':'cr'}">${fmtEuro(margRep)}</strong></td>
    </tr>`;
  }).join('')||'<tr><td colspan="8" class="empty">Nessun dato</td></tr>';

  const righeDip=Object.values(costoPerDipMap).sort((a,b)=>b.ore-a.ore).map(v=>`<tr>
    <td>${v.nome}</td>
    <td><strong>${fmtN(v.ore,2)}h</strong></td>
    <td>${fmtN(v.oreNotte,2)}h</td>
    <td>${fmtN(v.oreFest,2)}h</td>
    <td>${fmtEuro(v.costo)}</td>
  </tr>`).join('')||'<tr><td colspan="5" class="empty">Nessun dato</td></tr>';

  const righeProds=(prods||[]).slice(0,60).map(p=>{
    const t=tariffeProd?.filter(x=>x.ID_TipoProduzione==p.ID_TipoProduzione&&(!x.DataFine||x.DataFine>=p.DataProduzione)&&(!x.DataInizio||x.DataInizio<=p.DataProduzione));
    const fest2=_isFestivoFast(p.DataProduzione);
    const tg2=fest2?'Festivo':'Feriale';
    const tt2=p.Notturno?'Notturno':'Diurno';
    const tf=t?.find(x=>x.TipoGiorno===tg2&&x.TipoTurno===tt2)||t?.find(x=>x.TipoGiorno===tg2&&x.TipoTurno==='Tutti')||t?.find(x=>x.TipoGiorno==='Tutti'&&x.TipoTurno===tt2)||t?.find(x=>x.TipoGiorno==='Tutti'&&x.TipoTurno==='Tutti')||t?.[0];
    const val=tf?p.Quantita*tf.Tariffa:0;
    return `<tr>
      <td>${p.DataProduzione}</td>
      <td><span class="pill py">${nomeRep(p.ID_Reparto)}</span></td>
      <td>${nomeTipoProd(p.ID_TipoProduzione)}</td>
      <td>${fmtN(p.Quantita,0)}</td>
      <td>${p.Notturno?'<span class="pill pv">Notte</span>':'<span class="pill pb">Giorno</span>'}</td>
      <td>${fmtEuro(val)}</td>
    </tr>`;
  }).join('')||'<tr><td colspan="6" class="empty">Nessun dato</td></tr>';

  cont.innerHTML=`
  <div class="rep-grid">
    <div class="rep-card rc-blue">
      <div class="rc-title">Ore lavorate${frep?' — '+nomeRep(frep):''}</div>
      <div class="rc-val">${fmtN(totOre,1)}h</div>
      <div class="rc-sub">Periodo: ${numGiorni} giorni</div>
    </div>
    <div class="rep-card rc-orange">
      <div class="rc-title">Costo lavoro</div>
      <div class="rc-val">${fmtEuro(costoTotale)}</div>
      <div class="rc-sub">Tariffe contratto dipendente</div>
    </div>
    <div class="rep-card rc-green">
      <div class="rc-title">Ricavi</div>
      <div class="rc-val">${fmtEuro(ricavoTotale)}</div>
      <div class="rc-sub">Prod.: ${fmtEuro(fattProduzione)} | Eco.: ${fmtEuro(ricavoTotale-fattProduzione)}</div>
    </div>
    <div class="rep-card rc-orange">
      <div class="rc-title">Costo mezzi</div>
      <div class="rc-val">${fmtEuro(costoMezziTot)}</div>
      <div class="rc-sub">${numGiorni} gg × tariffa giornaliera</div>
    </div>
    <div class="rep-card ${margineOperativo>=0?'rc-green':'rc-red'}">
      <div class="rc-title">Margine operativo</div>
      <div class="rc-val">${fmtEuro(margineOperativo)}</div>
      <div class="rc-sub">Ricavi − Costo lavoro − Mezzi</div>
    </div>
    ${!frep?`<div class="rep-card rc-viola">
      <div class="rc-title">Produttività ortofrutta (att.15)</div>
      <div class="rc-val">${produttivita}</div>
      <div class="rc-sub">Colli/ora — ${fmtN(totColliAtt15,0)} colli su ${fmtN(oreAtt15,1)}h</div>
    </div>`:''}
  </div>

  <div class="card">
    <div class="ct">Conto economico per reparto</div>
    <p style="font-size:0.78rem;color:var(--grigio);margin-bottom:12px;">
      Ore e costi calcolati dalle ore battezzate in ciascun reparto, con fasce orarie assegnate cronologicamente.
    </p>
    <div class="tw"><table>
      <thead><tr><th>Reparto</th><th>Ore tot.</th><th>Ore notte</th><th>Ore fest.</th><th>Costo lavoro</th><th>Ricavi</th><th>Costo mezzi</th><th>Margine</th></tr></thead>
      <tbody>${righeContoEco}</tbody>
      <tfoot><tr>
        <td><strong>TOTALE</strong></td>
        <td><strong>${fmtN(totOre,1)}h</strong></td>
        <td></td><td></td>
        <td><strong>${fmtEuro(costoTotale)}</strong></td>
        <td><strong>${fmtEuro(ricavoTotale)}</strong></td>
        <td><strong>${fmtEuro(costoMezziTot)}</strong></td>
        <td><strong class="${margineOperativo>=0?'cg':'cr'}">${fmtEuro(margineOperativo)}</strong></td>
      </tr></tfoot>
    </table></div>
  </div>

  <div class="card">
    <div class="ct">Costo lavoro per dipendente${frep?' — '+nomeRep(frep):''}</div>
    <div class="tw"><table>
      <thead><tr><th>Nome</th><th>Ore tot.</th><th>Ore notte</th><th>Ore fest.</th><th>Costo</th></tr></thead>
      <tbody>${righeDip}</tbody>
    </table></div>
  </div>

  <div class="card">
    <div class="ct">Dettaglio produzione reparti</div>
    <div class="tw"><table>
      <thead><tr><th>Data</th><th>Reparto</th><th>Tipo</th><th>Quantità</th><th>Turno</th><th>Valore €</th></tr></thead>
      <tbody>${righeProds}</tbody>
    </table></div>
  </div>`;
}

  cont.innerHTML=`
  <div class="card">

async function filtraArch(){
  const fd=document.getElementById('f-dip')?.value||'';
  const dal=document.getElementById('f-dal')?.value||'';
  const al=document.getElementById('f-al')?.value||'';
  const freps=getCkValues('f-rep-ck'); // array di ID_Reparto selezionati (vuoto = tutti)
  const fatts=getCkValues('f-att-ck'); // array di ID_Attivita selezionati (vuoto = tutte)
  aggCkLabel('f-rep-trigger','f-rep-ck','Tutti');
  aggCkLabel('f-att-trigger','f-att-ck','Tutte');

  // Estende il filtro di 2gg prima e 1g dopo per catturare turni a cavallo di mezzanotte
  // (stesso criterio "data di competenza" usato nel Conto Economico e Archivio Operativo)
  function addDays(dateStr, days){
    const d=new Date(dateStr+'T00:00:00');
    d.setDate(d.getDate()+days);
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  }
  const dalExt=dal?addDays(dal,-2):null;
  const alExt=al?addDays(al,1):null;

  let ggs=[];
  {
    let lastId=0;
    while(true){
      let qgg=sb.from('TurniGiornalieri').select('*').eq('ID_Magazzino',MAGAZZINO_ATTIVO)
        .gt('ID_Turno',lastId).order('ID_Turno',{ascending:true}).limit(1000);
      if(fd)qgg=qgg.eq('ID_Dipendente',fd);
      if(dalExt)qgg=qgg.gte('DataInizio',dalExt);
      if(alExt)qgg=qgg.lte('DataInizio',alExt);
      const{data:batch,error}=await qgg;
      if(error){console.error('Errore paginazione turni archivio:',error);break;}
      if(!batch||!batch.length)break;
      ggs=[...ggs,...batch];
      if(batch.length<1000)break;
      lastId=batch[batch.length-1].ID_Turno;
    }
  }
  const turnoById={};
  ggs.forEach(g=>turnoById[g.ID_Turno]=g);
  const ids=ggs.map(g=>g.ID_Turno);
  const riep=document.getElementById('arch-riepilogo');
  if(!ids.length){
    document.getElementById('tbody-arch').innerHTML='<tr><td colspan="11" class="empty">Nessun risultato</td></tr>';
    document.getElementById('tfoot-arch').innerHTML='';
    if(riep)riep.innerHTML='';
    return;
  }

  // Carica TUTTI i battesimi dei turni (serve l'ordine completo del turno per calcolare gli offset, anche
  // se poi si filtra per reparto/attività solo sulle righe da mostrare)
  let batsAllTurno=[];
  {
    const chunkSize=300; // PostgREST ha un limite di lunghezza URL — chunk per evitare troncamenti silenziosi
    const chunks=[];
    for(let i=0;i<ids.length;i+=chunkSize)chunks.push(ids.slice(i,i+chunkSize));
    const results=await Promise.all(chunks.map(chunk=>
      sb.from('BattesimiTurno').select('*').in('ID_Turno',chunk)
    ));
    results.forEach(({data,error})=>{
      if(error)console.error('Errore chunk battesimi:',error);
      if(data&&data.length)batsAllTurno=[...batsAllTurno,...data];
    });
  }

  // Raggruppa per turno in ordine cronologico (necessario per calcolare l'offset di ciascun battesimo)
  const batsByTurno={};
  batsAllTurno.forEach(b=>{if(!batsByTurno[b.ID_Turno])batsByTurno[b.ID_Turno]=[];batsByTurno[b.ID_Turno].push(b);});
  Object.values(batsByTurno).forEach(arr=>arr.sort((a,b)=>a.OrdineRiga-b.OrdineRiga));

  // Spezza ogni battesimo in righe per data di competenza (stessa logica di Access: un turno
  // che attraversa la mezzanotte genera righe separate sui giorni toccati)
  const righe=[];
  Object.entries(batsByTurno).forEach(([idTurnoStr,bats])=>{
    const turno=turnoById[idTurnoStr];
    if(!turno)return;
    bats.forEach((bat,idx)=>{
      if(freps.length && !freps.includes(String(bat.ID_Reparto)))return;
      if(fatts.length && !fatts.includes(String(bat.ID_Attivita)))return;
      const giorniCoinvolti=_giorniDelBattesimo(turno,bats,idx);
      giorniCoinvolti.forEach(({data,oreGiorno,oreNotte})=>{
        if(dal&&data<dal)return;
        if(al&&data>al)return;
        const oreSegmento=oreGiorno+oreNotte;
        if(oreSegmento<=0)return;
        righe.push({
          dataCompetenza:data,
          turno,bat,
          ore:oreSegmento
        });
      });
    });
  });

  righe.sort((a,b)=>a.dataCompetenza.localeCompare(b.dataCompetenza)||a.turno.ID_Turno-b.turno.ID_Turno);

  const totOreFiltrate=righe.reduce((a,r)=>a+r.ore,0);

  // Riepilogo sopra
  if(riep)riep.innerHTML=`
  <div class="card" style="margin-bottom:14px;background:var(--sfondo);">
    <div style="font-size:0.85rem;color:var(--grigio);">Risultati filtrati: <strong>${righe.length}</strong> righe (per data di competenza)</div>
    <div style="font-size:1.6rem;font-weight:800;color:var(--verde);margin-top:4px;">${fmtN(totOreFiltrate,2)}h <span style="font-size:0.85rem;font-weight:500;color:var(--grigio);">ore totali nel filtro</span></div>
  </div>`;

  document.getElementById('tbody-arch').innerHTML=righe.map(r=>{
    const g=r.turno, b=r.bat;
    const orario=g?.OraInizio?`${g.OraInizio.slice(0,5)} - ${(g.OraFine||'').slice(0,5)}`:'—';
    return `<tr>
      <td><span class="bmov">${b.ID_Battesimo||b.id}</span></td>
      <td><span class="bid">${g?.ID_Dipendente||'—'}</span></td>
      <td>${nomeDip(g?.ID_Dipendente)}</td>
      <td>${fmtDataIT(r.dataCompetenza)}</td>
      <td style="font-size:0.78rem;white-space:nowrap;">${orario}</td>
      <td>${b.OrdineRiga}</td>
      <td><span class="pill py">${nomeRep(b.ID_Reparto)}</span></td>
      <td><span class="pill pg">${nomeAtt(b.ID_Attivita)}</span></td>
      <td><strong>${fmtN(r.ore,2)}h</strong></td>
      <td style="font-size:0.76rem;color:var(--grigio);">${b.Note||'—'}</td>
      <td style="display:flex;gap:4px;">
        <button class="btn bo bsm" onclick="modificaTurnoDaArchivio(${g?.ID_Turno})" title="Modifica turno">✏</button>
        <button class="btn br bsm" onclick="eliminaTurnoCompletoDaArchivio(${g?.ID_Turno})" title="Elimina turno completo">✕</button>
      </td>
    </tr>`;}).join('')||'<tr><td colspan="11" class="empty">Nessun risultato</td></tr>';

  document.getElementById('tfoot-arch').innerHTML=righe.length?`<tr style="background:var(--sfondo);font-weight:800;">
    <td colspan="8" style="text-align:right;">TOTALE ORE</td>
    <td>${fmtN(totOreFiltrate,2)}h</td>
    <td colspan="2"></td>
  </tr>`:'';
}
